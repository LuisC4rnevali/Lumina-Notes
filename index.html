<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nova Pro · Para ti 🖤</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,600&family=Caveat:wght@500;700&family=Playfair+Display:wght@400;700&family=Montserrat:wght@400;600&family=Roboto:wght@400;700&family=Lora:wght@400;700&family=Dancing+Script:wght@400;700&family=Pacifico&family=Indie+Flower&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <style>
        :root {
            --bg-body: #f4f7fe;
            --surface: #ffffff;
            --primary: #FF4B72;
            --text-main: #2b3674;
            --text-muted: #a3aed1;
            --border: #e2e8f0;
            --shadow: 0 10px 30px rgba(255, 75, 114, 0.12);
            --transition: 0.25s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            --menu-bg: #111111;
            --menu-text: #ffffff;
        }

        [data-theme="dark"] {
            --bg-body: #070b19;
            --surface: #0e152e;
            --primary: #FF708F;
            --text-main: #f0f2f8;
            --text-muted: #7483a8;
            --border: #1a2342;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            --menu-bg: #1e1e2e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            transition: background-color 0.3s, color 0.3s;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        /* ── bienvenida ── */
        .welcome-modal {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }

        [data-theme="dark"] .welcome-modal {
            background: rgba(7, 11, 25, 0.7);
        }

        .welcome-modal.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .welcome-content {
            background: var(--surface);
            padding: 40px 30px;
            border-radius: 30px;
            text-align: center;
            max-width: 90%;
            width: 380px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% {
                opacity: 0;
                transform: scale(0.8) translateY(20px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .heart-icon {
            font-size: 4.5rem;
            color: #000000;
            animation: heartbeat 1.5s infinite;
            filter: drop-shadow(0 0 10px rgba(0, 0, 0, 0.3));
            margin-bottom: 15px;
        }

        [data-theme="dark"] .heart-icon {
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.2));
        }

        @keyframes heartbeat {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.15);
            }
        }

        .welcome-text {
            font-family: 'Caveat', cursive;
            font-size: 2rem;
            color: var(--text-main);
            margin-bottom: 30px;
            line-height: 1.2;
        }

        .btn-enter {
            background: #111111;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: var(--shadow);
            width: 100%;
            transition: transform 0.2s;
        }

        .btn-enter:active {
            transform: scale(0.95);
        }

        /* ── sidebar ── */
        .sidebar {
            width: 300px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 20;
            transition: all 0.3s ease;
        }

        .sidebar-header {
            padding: 20px;
            background: #111111;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            font-size: 1.3rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .theme-toggle,
        .menu-toggle {
            background: transparent;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .theme-toggle:active {
            transform: rotate(45deg);
        }

        .btn-new {
            background: #111111;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            width: calc(100% - 30px);
            margin: 15px auto;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s;
        }

        .btn-new:active {
            transform: scale(0.95);
        }

        .note-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 15px 15px 15px;
        }

        .note-item {
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 12px;
            cursor: pointer;
            background: var(--bg-body);
            transition: var(--transition);
            border: 1px solid transparent;
            position: relative;
            user-select: none;
        }

        .note-item.active {
            background: var(--surface);
            border-left: 4px solid #111111;
            border-color: var(--border);
            box-shadow: var(--shadow);
        }

        [data-theme="dark"] .note-item.active {
            border-left: 4px solid #ffffff;
        }

        @keyframes insertAnim {
            from {
                opacity: 0;
                transform: translateY(-20px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .note-item.creating {
            animation: insertAnim 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes deleteAnim {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(0.9) translateX(-10px);
                opacity: 0.8;
            }
            100% {
                transform: scale(0.5) translateX(100%);
                opacity: 0;
            }
        }

        .note-item.deleting {
            animation: deleteAnim 0.4s ease-in forwards;
            pointer-events: none;
        }

        .note-title-list {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-main);
        }

        .pinned-icon {
            color: #111111;
            font-size: 1.1rem;
        }

        [data-theme="dark"] .pinned-icon {
            color: #ffffff;
        }

        .sidebar-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 15;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            backdrop-filter: blur(2px);
        }

        .sidebar-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        /* ── contenido principal ── */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* barra de herramientas principal (sin subrayado inferior) */
        .toolbar {
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 10;
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            transition: var(--transition);
            border-bottom: none; /* quitamos subrayado */
        }

        [data-theme="dark"] .toolbar {
            background: rgba(14, 21, 46, 0.85);
        }

        .toolbar::-webkit-scrollbar {
            display: none;
        }

        .tool-group {
            display: flex;
            align-items: center;
            gap: 2px;
            background: var(--surface);
            padding: 4px 6px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .tool-btn {
            background: transparent;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-main);
            font-size: 1.1rem;
            transition: background 0.2s, transform 0.15s;
        }

        .tool-btn:active {
            transform: scale(0.85);
            background: var(--border);
        }

        .tool-select {
            border: none;
            background: transparent;
            color: var(--text-main);
            outline: none;
            padding: 2px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
        }

        .color-picker-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            overflow: hidden;
            border-radius: 5px;
            cursor: pointer;
            border: 1px solid var(--border);
            margin-left: 5px;
        }

        .color-picker-wrapper input[type="color"] {
            position: absolute;
            top: -10px;
            left: -10px;
            width: 50px;
            height: 50px;
            cursor: pointer;
            padding: 0;
            border: none;
        }

        .editor-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            justify-content: center;
            transition: background 0.5s;
            position: relative;
            scroll-behavior: smooth;
        }

        .editor-wrapper {
            width: 100%;
            max-width: 800px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            min-height: calc(100vh - 40px);
            height: fit-content;
            transition: all 0.5s;
            background: var(--surface);
            position: relative;
        }

        .title-input {
            width: 100%;
            border: none;
            outline: none;
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 20px;
            background: transparent;
            line-height: 1.2;
            transition: color 0.3s, background-color 0.3s;
            padding: 5px 10px;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
        }

        .editor-area {
            min-height: 50vh;
            outline: none;
            font-size: 0.95rem; /* texto predeterminado más pequeño */
            line-height: 1.6;
            color: var(--text-main);
            transition: color 0.3s;
            padding-bottom: 150px;
            word-wrap: break-word;
            overflow-wrap: break-word;
            word-break: break-word;
            hyphens: auto;
            user-select: text;
        }

        .editor-area img,
        .editor-area video {
            border-radius: 12px;
            transition: box-shadow 0.2s;
            cursor: pointer;
            max-width: 100%;
            height: auto;
        }

        .editor-area img.selected-img,
        .editor-area video.selected-img {
            box-shadow: 0 0 0 4px #111111;
        }

        /* ── barra flotante de texto ── */
        .floating-text-menu {
            position: absolute;
            display: none;
            background: var(--menu-bg);
            color: var(--menu-text);
            border-radius: 30px;
            padding: 4px 8px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            align-items: center;
            gap: 2px;
            transition: opacity 0.2s ease;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            white-space: nowrap;
            overflow-x: auto;
            max-width: 90vw;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .floating-text-menu::-webkit-scrollbar {
            display: none;
        }

        /* flecha hacia arriba */
        .floating-text-menu::after {
            content: '';
            position: absolute;
            top: -5px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 0 5px 5px;
            border-style: solid;
            border-color: transparent transparent var(--menu-bg) transparent;
        }

        /* ── barra flotante de inserción (long press en vacío) ── */
        .floating-insert-menu {
            position: absolute;
            display: none;
            background: var(--menu-bg);
            color: var(--menu-text);
            border-radius: 16px;
            padding: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.35);
            z-index: 1000;
            flex-direction: column;
            align-items: stretch;
            gap: 10px;
            white-space: normal;
            max-width: 320px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .insert-row {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .emoji-row,
        .symbol-row {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
            padding-top: 5px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .emoji-btn,
        .symbol-btn {
            background: transparent;
            border: none;
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 8px;
            transition: transform 0.1s, background 0.2s;
            line-height: 1;
        }

        .emoji-btn:active,
        .symbol-btn:active {
            transform: scale(1.2);
            background: rgba(255, 255, 255, 0.2);
        }

        .ft-btn {
            background: transparent;
            border: none;
            color: white;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.15s, background 0.2s;
            flex-shrink: 0;
        }

        .ft-btn:active {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(0.85);
        }

        .ft-divider {
            width: 1px;
            height: 14px;
            background: rgba(255, 255, 255, 0.2);
            margin: 0 3px;
            flex-shrink: 0;
        }

        .ft-select {
            background: none;
            color: white;
            border: none;
            font-size: 0.75rem;
            cursor: pointer;
            margin: 0 2px;
            flex-shrink: 0;
        }

        .ft-select option {
            background: #111;
        }

        .ft-color-wrapper {
            position: relative;
            width: 20px;
            height: 20px;
            overflow: hidden;
            border-radius: 50%;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.3);
            flex-shrink: 0;
        }

        .ft-color-wrapper input[type="color"] {
            position: absolute;
            top: -6px;
            left: -6px;
            width: 32px;
            height: 32px;
            border: none;
            padding: 0;
            cursor: pointer;
        }

        /* ── temas ── */
        .theme-sakura {
            background: linear-gradient(to bottom right, #ffe1e8, #ffb3c6) !important;
            color: #5c1a2d;
        }
        .theme-papel {
            background: #fdf5e6 !important;
            color: #3d3122;
            background-image: repeating-linear-gradient(transparent, transparent 31px, #d8d0c1 31px, #d8d0c1 32px);
        }
        .theme-amor {
            background: radial-gradient(circle, #fcfcfc 0%, #e6e6e6 100%) !important;
            color: #111111;
        }
        .theme-noche {
            background: linear-gradient(135deg, #1a1a2e, #16213e) !important;
            color: #e1e1e6;
        }
        .theme-fuego {
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('assets/themes/fuego.jpg');
            background-size: cover;
            background-position: center;
            color: #ffffff !important;
        }
        .theme-tortugas {
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('assets/themes/tortugas.jpg');
            background-size: cover;
            background-position: center;
            color: #ffffff !important;
        }
        .theme-neon {
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('assets/themes/perfil.jpg');
            background-size: cover;
            background-position: center;
            color: #ffffff !important;
        }

        .theme-fuego .title-input,
        .theme-fuego .editor-area,
        .theme-tortugas .title-input,
        .theme-tortugas .editor-area,
        .theme-neon .title-input,
        .theme-neon .editor-area {
            color: #ffffff !important;
        }

        [data-theme="dark"] .theme-sakura {
            background: linear-gradient(to bottom right, #2c131a, #4a1c2a) !important;
            color: #ffccd5;
            border: 1px solid #5c2033;
        }
        [data-theme="dark"] .theme-papel {
            background: #1a1714 !important;
            color: #d8d0c1;
            background-image: repeating-linear-gradient(transparent, transparent 31px, #362f27 31px, #362f27 32px);
            border: 1px solid #362f27;
        }
        [data-theme="dark"] .theme-amor {
            background: radial-gradient(circle, #1a1a1a 0%, #0d0d0d 100%) !important;
            color: #e6e6e6;
            border: 1px solid #333333;
        }
        [data-theme="dark"] .theme-noche {
            background: linear-gradient(135deg, #0b0b14, #080b12) !important;
            color: #e1e1e6;
            border: 1px solid #1c1c33;
        }

        /* ── barra de herramientas para imágenes ── */
        .image-toolbar {
            position: fixed;
            opacity: 0;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            padding: 8px 10px;
            border-radius: 30px;
            display: flex;
            gap: 6px;
            align-items: center;
            transition: opacity 0.25s ease;
            z-index: 1001;
            white-space: nowrap;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.15);
            max-width: calc(100vw - 20px);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .image-toolbar::-webkit-scrollbar {
            display: none;
        }

        .image-toolbar.show {
            opacity: 1;
            pointer-events: auto;
        }

        .img-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
            transition: transform 0.1s;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .img-btn:active {
            transform: scale(0.85);
            background: rgba(255, 255, 255, 0.15);
        }

        .img-slider {
            width: 55px;
            accent-color: #ffffff;
            flex-shrink: 0;
        }

        .img-slider-label {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.65rem;
            margin: 0 -3px;
            font-weight: 500;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .img-spacer {
            width: 1px;
            height: 20px;
            background: rgba(255, 255, 255, 0.2);
            margin: 0 2px;
            flex-shrink: 0;
        }

        .theme-palette {
            display: none;
            position: absolute;
            top: 60px;
            right: 20px;
            background: var(--surface);
            padding: 10px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            z-index: 50;
            gap: 8px;
        }

        .theme-palette.show {
            display: flex;
            animation: insertAnim 0.3s forwards;
        }

        .color-dot {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.2s;
        }

        .color-dot:hover {
            transform: scale(1.1);
        }

        .sheet-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            backdrop-filter: blur(3px);
        }

        .sheet-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .bottom-sheet {
            position: fixed;
            bottom: -100%;
            left: 0;
            width: 100%;
            background: var(--surface);
            border-radius: 25px 25px 0 0;
            z-index: 1000;
            transition: bottom 0.3s cubic-bezier(0.175, 0.885, 0.32, 1);
            padding: 20px 20px 40px 20px;
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.2);
        }

        .bottom-sheet.show {
            bottom: 0;
        }

        .sheet-handle {
            width: 40px;
            height: 5px;
            background: var(--border);
            border-radius: 5px;
            margin: 0 auto 20px auto;
        }

        .sheet-title {
            text-align: center;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .sheet-option {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 16px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 500;
            transition: background 0.2s, transform 0.1s;
            color: var(--text-main);
        }

        .sheet-option:hover {
            background: var(--bg-body);
        }

        .sheet-option:active {
            transform: scale(0.98);
        }

        .sheet-option i {
            font-size: 1.4rem;
            color: #111111;
        }

        [data-theme="dark"] .sheet-option i {
            color: #ffffff;
        }

        .sheet-option.danger {
            color: #ff4757;
        }

        .sheet-option.danger i {
            color: #ff4757 !important;
        }

        .url-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .url-modal.show {
            display: flex;
        }

        .url-modal-content {
            background: var(--surface);
            padding: 20px;
            border-radius: 16px;
            box-shadow: var(--shadow);
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .url-modal-content input {
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            outline: none;
            background: var(--bg-body);
            color: var(--text-main);
        }

        .url-modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .url-modal-actions button {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-cancel {
            background: #ccc;
        }

        .btn-insert {
            background: #111;
            color: white;
        }

        /* ── animaciones de texto ── */
        @keyframes anim-bounce {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-8px);
            }
        }
        @keyframes anim-shake {
            0%,
            100% {
                transform: translateX(0);
            }
            25% {
                transform: translateX(-4px);
            }
            75% {
                transform: translateX(4px);
            }
        }
        @keyframes anim-pulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.08);
            }
        }
        @keyframes anim-rotate {
            0%,
            100% {
                transform: rotate(0deg);
            }
            25% {
                transform: rotate(3deg);
            }
            75% {
                transform: rotate(-3deg);
            }
        }
        @keyframes anim-fade {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.4;
            }
        }
        @keyframes anim-glow {
            0%,
            100% {
                text-shadow: 0 0 5px currentColor;
            }
            50% {
                text-shadow: 0 0 15px currentColor, 0 0 25px var(--primary);
            }
        }

        .anim-bounce {
            animation: anim-bounce 0.8s ease-in-out infinite;
        }
        .anim-shake {
            animation: anim-shake 0.5s ease-in-out infinite;
        }
        .anim-pulse {
            animation: anim-pulse 1s ease-in-out infinite;
        }
        .anim-rotate {
            animation: anim-rotate 1.2s ease-in-out infinite;
        }
        .anim-fade {
            animation: anim-fade 1s ease-in-out infinite;
        }
        .anim-glow {
            animation: anim-glow 1.2s ease-in-out infinite;
        }

        /* ── responsive ── */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -100%;
                height: 100%;
                width: 280px;
                box-shadow: 10px 0 30px rgba(0, 0, 0, 0.1);
            }
            .sidebar.open {
                left: 0;
            }
            .menu-toggle {
                display: block;
                color: var(--text-main);
            }
            .editor-wrapper {
                padding: 20px 15px;
                border-radius: 12px;
            }
            .title-input {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>

                        <option value="Montserrat, sans-serif" style="font-family: 'Montserrat', sans-serif">Montserrat</option>
                        <option value="Roboto, sans-serif" style="font-family: 'Roboto', sans-serif">Roboto</option>
                        <option value="Lora, serif" style="font-family: 'Lora', serif">Lora</option>
                        <option value="Dancing Script, cursive" style="font-family: 'Dancing Script', cursive">Dancing</option>

                    <button class="ft-btn" onmousedown="restoreSelection(); event.preventDefault();" onclick="safeExec(() => execFloating('bold'))" title="Negrita"><i class='bx bx-bold'></i></button>
                    <button class="ft-btn" onmousedown="restoreSelection(); event.preventDefault();" onclick="safeExec(() => execFloating('italic'))" title="Cursiva"><i class='bx bx-italic'></i></button>
                    <button class="ft-btn" onmousedown="restoreSelection(); event.preventDefault();" onclick="safeExec(() => execFloating('underline'))" title="Subrayado"><i class='bx bx-underline'></i></button>
                    <button class="ft-btn" onmousedown="restoreSelection(); event.preventDefault();" onclick="safeExec(() => execFloating('removeFormat'))" title="Quitar formato"><i class='bx bx-eraser'></i></button>
                    <div class="ft-divider"></div>

    <script>
        // ── utilidades seguras ──
        function safeExec(fn) {
            try { fn(); } catch (e) { console.warn(e); }
        }
        function safeGet(key, def) {
            try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch (e) { return def; }
        }
        function safeSet(key, val) {
            try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) {}
        }

        // ── datos ──
        const cartasAmor = [
            "Hola, Gabriela preciosa. Solo quería tomarme un momento para decirte lo increíblemente afortunado que me siento de tenerte en mi vida...",
            "Mi amor, hoy me desperté pensando en ti, como todos los días...",
            "Sé que a veces los días se vuelven grises...",
            "¿Sabes qué es lo que más admiro de ti? Tu corazón inmenso..."
        ];

        let notes = safeGet('nova_romance', []);
        let currentNoteId = null;
        let saveTimeout;
        let selectedMedia = null;
        let savedRange = null;
        let savedTitleSelection = null;
        let contextNoteId = null;
        let pendingMediaType = null;
        let extrasEnabled = safeGet('nova_extras_enabled', true); // activado por defecto

        // elementos del DOM
        const titleEl = document.getElementById('noteTitle');
        const editorEl = document.getElementById('noteEditor');
        const listEl = document.getElementById('noteList');
        const wrapperEl = document.getElementById('editorWrapper');
        const imgToolbar = document.getElementById('imageToolbar');
        const sheet = document.getElementById('bottomSheet');
        const overlaySheet = document.getElementById('sheetOverlay');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        const floatMenu = document.getElementById('floatingTextMenu');
        const insertMenu = document.getElementById('insertMenu');
        const animSubmenu = document.getElementById('animSubmenu');
        const animBtn = document.getElementById('animBtn');
        const editorContainer = document.getElementById('editorContainer');
        const urlModal = document.getElementById('urlModal');
        const urlInput = document.getElementById('urlInput');
        const urlModalTitle = document.getElementById('urlModalTitle');
        const toggleExtrasBtn = document.getElementById('toggleExtrasBtn');

        // sliders de imagen
        const imgSizeSlider = document.getElementById('imgSizeSlider');
        const imgMarginHSlider = document.getElementById('imgMarginHSlider');
        const imgMarginVSlider = document.getElementById('imgMarginVSlider');

        let pointerDownTime = 0;
        let pointerDownTarget = null;
        let isMediaLongPress = false;
        let longPressTimer = null;

        // ── inicialización ──
        function initApp() {
            try {
                if (safeGet('nova_global_theme', 'light') === 'dark') toggleGlobalTheme(true);

                const randomLetter = cartasAmor[Math.floor(Math.random() * cartasAmor.length)];
                const formattedLetter = `<div style="font-family: Caveat, cursive; font-size: 1.65rem; line-height: 1.7; text-align: center; padding: 20px 10px;">${randomLetter}<br><br><span style="color: #000000; font-size: 2.5rem; animation: heartbeat 1.5s infinite; display: inline-block;">🖤</span></div>`;

                let magicIndex = notes.findIndex(n => n.id === 'nota_magica_diaria');
                if (magicIndex === -1) {
                    notes.unshift({ id: 'nota_magica_diaria', title: '💌 Para ti, hoy...', content: formattedLetter, theme: 'theme-amor', pinned: true, timestamp: Date.now() + 9999999 });
                } else {
                    notes[magicIndex].content = formattedLetter;
                    notes[magicIndex].timestamp = Date.now() + 9999999;
                }
                saveData();
                renderList();
                openNote('nota_magica_diaria', false);
                checkMobileMenu();
                updateExtrasUI();

                editorEl.addEventListener('paste', handlePaste);
                editorEl.addEventListener('pointerdown', handlePointerDown);
                editorEl.addEventListener('pointerup', handlePointerUp);
                editorEl.addEventListener('pointerleave', handlePointerLeave);
                editorEl.addEventListener('pointercancel', handlePointerLeave);
                editorEl.addEventListener('contextmenu', e => e.preventDefault());

                // long press en área vacía del editor
                editorEl.addEventListener('pointerdown', startLongPressCheck);
                editorEl.addEventListener('pointermove', cancelLongPressCheck);
                editorEl.addEventListener('pointerup', cancelLongPressCheck);
                editorEl.addEventListener('pointercancel', cancelLongPressCheck);

                editorContainer.addEventListener('scroll', () => { if (selectedMedia) updateMediaToolbarPosition(selectedMedia); });

                    return;

                editorEl.focus();
                document.execCommand('styleWithCSS', true, null);
                if (command === 'fontName') {
                    document.execCommand('fontName', false, value);

                    document.execCommand(command, false, value);
                }
                triggerSave();
            } catch (e) { console.warn(e); }

        function execFloating(command, value = null) {

                const active = document.activeElement;
                if (active === titleEl && titleEl.selectionStart !== titleEl.selectionEnd) {
                    if (command === 'foreColor') titleEl.style.color = value;
                    else if (command === 'hiliteColor') titleEl.style.backgroundColor = value === 'transparent' ? 'transparent' : value;
                    else if (command === 'fontName') titleEl.style.fontFamily = value;

                    else if (command === 'italic') titleEl.style.fontStyle = titleEl.style.fontStyle === 'italic' ? 'normal' : 'italic';
                    else if (command === 'underline') titleEl.style.textDecoration = titleEl.style.textDecoration === 'underline' ? 'none' : 'underline';
                    else if (command === 'copy') document.execCommand('copy');
                    else if (command === 'cut') document.execCommand('cut');

            span.appendChild(contents);
            if (animClass) {

        function handlePointerUp(e) {

                e.preventDefault();

            const body = document.body;
            const icon = document.getElementById('themeIcon');
            if(forceDark || body.getAttribute('data-theme')!=='dark'){
                body.setAttribute('data-theme','dark'); icon.className='bx bx-sun'; safeSet('nova_global_theme','dark');
            } else {
                body.removeAttribute('data-theme'); icon.className='bx bx-moon'; safeSet('nova_global_theme','light');
            }
        }
        function toggleSidebar() {
            sidebar.classList.toggle('open');
            if(sidebar.classList.contains('open')) sidebarOverlay.classList.add('show');
            else sidebarOverlay.classList.remove('show');
            checkMobileMenu();
        }
        function checkMobileMenu() {
            const btn = document.getElementById('closeSidebarBtn');
            if(window.innerWidth<=768){
                btn.style.display = sidebar.classList.contains('open') ? 'block' : 'none';
                if(!sidebar.classList.contains('open')) sidebarOverlay.classList.remove('show');
            } else {
                btn.style.display = 'none';
                sidebarOverlay.classList.remove('show');
            }
        }
        window.addEventListener('resize', checkMobileMenu);
        initApp();
    </script>
</body>
</html>
