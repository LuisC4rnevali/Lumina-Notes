<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nova Pro · Para ti 🖤</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,600&family=Caveat:wght@500;700&family=Playfair+Display:wght@400;700&family=Montserrat:wght@400;600&family=Roboto:wght@400;700&family=Lora:wght@400;700&family=Dancing+Script:wght@400;700&family=Pacifico&family=Indie+Flower&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <style>
        :root {
            --bg-body: #f4f7fe;
            --surface: #ffffff;
            --primary: #FF4B72;
            --text-main: #2b3674;
            --text-muted: #a3aed1;
            --border: #e2e8f0;
            --shadow: 0 10px 30px rgba(255, 75, 114, 0.12);
            --menu-bg: #111111;
            --menu-text: #ffffff;
        }

        [data-theme="dark"] {
            --bg-body: #070b19;
            --surface: #0e152e;
            --primary: #FF708F;
            --text-main: #f0f2f8;
            --text-muted: #7483a8;
            --border: #1a2342;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            --menu-bg: #1e1e2e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-body); color: var(--text-main);
            display: flex; height: 100dvh; overflow: hidden;
            font-family: 'Poppins', sans-serif;
            transition: background-color 0.3s, color 0.3s;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .welcome-modal {
            position: fixed; inset: 0; background: rgba(255,255,255,0.4);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            z-index: 9999; display: flex; align-items: center; justify-content: center;
            transition: opacity 0.5s;
        }
        .welcome-modal.hidden { opacity: 0; pointer-events: none; }
        .welcome-content {
            background: var(--surface); padding: 40px 30px; border-radius: 30px;
            text-align: center; max-width: 90%; width: 380px; box-shadow: var(--shadow);
            border: 1px solid var(--border);
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .heart-icon { font-size: 4.5rem; color: #000; animation: heartbeat 1.5s infinite; filter: drop-shadow(0 0 10px rgba(0,0,0,0.3)); margin-bottom: 15px; }
        [data-theme="dark"] .heart-icon { filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); }
        @keyframes heartbeat { 0%,100%{transform:scale(1);} 50%{transform:scale(1.15);} }
        .welcome-text { font-family: 'Caveat', cursive; font-size: 2rem; color: var(--text-main); margin-bottom: 30px; }
        .btn-enter {
            background: #111; color: white; border: none; padding: 15px 30px;
            border-radius: 50px; font-size: 1.1rem; font-weight: 600; cursor: pointer;
            box-shadow: var(--shadow); width: 100%; transition: transform 0.2s;
        }
        .btn-enter:active { transform: scale(0.95); }

        .sidebar {
            width: 300px; background: var(--surface); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; z-index: 20; transition: 0.3s;
        }
        .sidebar-header { padding: 20px; background: #111; color: white; display: flex; justify-content: space-between; align-items: center; }
        .brand { font-size: 1.3rem; font-weight: 700; }
        .theme-toggle, .menu-toggle { background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; }
        .theme-toggle:active { transform: rotate(45deg); }
        .btn-new {
            background: #111; color: white; border: none; padding: 12px; border-radius: 12px;
            width: calc(100% - 30px); margin: 15px auto; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        .btn-new:active { transform: scale(0.95); }
        .note-list { flex: 1; overflow-y: auto; padding: 0 15px 15px; }
        .note-item {
            padding: 15px; margin-bottom: 10px; border-radius: 12px; cursor: pointer;
            background: var(--bg-body); transition: all 0.25s; border: 1px solid transparent;
        }
        .note-item.active { background: var(--surface); border-left: 4px solid #111; box-shadow: var(--shadow); }
        [data-theme="dark"] .note-item.active { border-left-color: #fff; }
        @keyframes insertAnim { from{opacity:0;transform:translateY(-20px) scale(0.9);} to{opacity:1;transform:translateY(0) scale(1);} }
        .note-item.creating { animation: insertAnim 0.4s forwards; }
        @keyframes deleteAnim { 0%{transform:scale(1);opacity:1;} 100%{transform:scale(0.5) translateX(100%);opacity:0;} }
        .note-item.deleting { animation: deleteAnim 0.4s forwards; }
        .note-title-list { font-weight: 600; font-size: 0.95rem; margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; }
        .pinned-icon { color: #111; font-size: 1.1rem; }
        [data-theme="dark"] .pinned-icon { color: #fff; }
        .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 15; opacity: 0; pointer-events: none; transition: 0.3s; }
        .sidebar-overlay.show { opacity: 1; pointer-events: auto; }

        .main-content { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; }

        .toolbar {
            padding: 8px 12px;
            background: rgba(255,255,255,0.85); backdrop-filter: blur(12px);
            display: flex; align-items: center; gap: 6px; z-index: 10;
            overflow-x: auto; white-space: nowrap; scrollbar-width: none;
            border-bottom: none;
        }
        [data-theme="dark"] .toolbar { background: rgba(14,21,46,0.85); }
        .toolbar::-webkit-scrollbar { display: none; }
        .tool-group {
            display: flex; align-items: center; gap: 2px;
            background: var(--surface); padding: 4px 6px; border-radius: 8px; border: 1px solid var(--border);
        }
        .tool-btn {
            background: none; border: none; width: 32px; height: 32px; border-radius: 6px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            color: var(--text-main); font-size: 1.1rem; transition: 0.15s;
        }
        .tool-btn:active { transform: scale(0.85); background: var(--border); }
        .tool-select { border: none; background: none; color: var(--text-main); outline: none; padding: 2px; font-size: 0.85rem; cursor: pointer; }
        .color-picker-wrapper {
            position: relative; width: 28px; height: 28px; overflow: hidden; border-radius: 5px;
            cursor: pointer; border: 1px solid var(--border); margin-left: 5px;
        }
        .color-picker-wrapper input[type="color"] {
            position: absolute; top: -10px; left: -10px; width: 50px; height: 50px;
            padding: 0; border: none; cursor: pointer;
        }

        .editor-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; justify-content: center; position: relative; scroll-behavior: smooth; }
        .editor-wrapper {
            width: 100%; max-width: 800px; padding: 30px; border-radius: 20px;
            box-shadow: var(--shadow); min-height: calc(100vh - 40px); height: fit-content;
            transition: 0.5s; background: var(--surface); position: relative;
        }
        .title-input {
            width: 100%; border: none; outline: none; font-size: 2rem; font-weight: 700;
            color: var(--text-main); margin-bottom: 20px; background: transparent;
            line-height: 1.2; padding: 5px 10px; border-radius: 8px;
        }
        .editor-area {
            min-height: 50vh; outline: none; font-size: 0.95rem; line-height: 1.6;
            color: var(--text-main); padding-bottom: 150px;
            word-wrap: break-word; overflow-wrap: break-word; user-select: text;
        }
        .editor-area img, .editor-area video { border-radius: 12px; cursor: pointer; max-width: 100%; height: auto; }
        .editor-area img.selected-img, .editor-area video.selected-img { box-shadow: 0 0 0 4px #111; }

        /* flotante texto */
        .floating-text-menu {
            position: absolute; display: none; background: var(--menu-bg); color: var(--menu-text);
            border-radius: 30px; padding: 4px 8px; box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            z-index: 1000; align-items: center; gap: 2px; transition: opacity 0.2s;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
            white-space: nowrap; overflow-x: auto; max-width: 90vw;
        }
        .floating-text-menu::after {
            content: ''; position: absolute; top: -5px; left: 50%; transform: translateX(-50%);
            border-width: 0 5px 5px; border-style: solid;
            border-color: transparent transparent var(--menu-bg) transparent;
        }
        .floating-insert-menu {
            position: absolute; display: none; background: var(--menu-bg); color: var(--menu-text);
            border-radius: 16px; padding: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.35);
            z-index: 1000; flex-direction: column; gap: 10px; max-width: 320px;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .insert-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
        .emoji-row, .symbol-row { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; padding-top: 5px; border-top: 1px solid rgba(255,255,255,0.1); }
        .emoji-btn, .symbol-btn {
            background: none; border: none; color: white; font-size: 1.3rem;
            cursor: pointer; padding: 2px 6px; border-radius: 8px; transition: 0.1s;
        }
        .emoji-btn:active, .symbol-btn:active { transform: scale(1.2); background: rgba(255,255,255,0.2); }
        .ft-btn {
            background: none; border: none; color: white; width: 26px; height: 26px;
            border-radius: 50%; font-size: 0.9rem; cursor: pointer; display: flex;
            align-items: center; justify-content: center; transition: 0.15s; flex-shrink: 0;
        }
        .ft-btn:active { background: rgba(255,255,255,0.25); transform: scale(0.85); }
        .ft-divider { width: 1px; height: 14px; background: rgba(255,255,255,0.2); margin: 0 3px; flex-shrink: 0; }
        .ft-select { background: none; color: white; border: none; font-size: 0.75rem; cursor: pointer; margin: 0 2px; flex-shrink: 0; }
        .ft-select option { background: #111; }
        .ft-color-wrapper { position: relative; width: 20px; height: 20px; overflow: hidden; border-radius: 50%; cursor: pointer; border: 1px solid rgba(255,255,255,0.3); flex-shrink: 0; }
        .ft-color-wrapper input[type="color"] { position: absolute; top: -6px; left: -6px; width: 32px; height: 32px; border: none; cursor: pointer; }

        /* temas */
        .theme-sakura { background: linear-gradient(to bottom right, #ffe1e8, #ffb3c6) !important; color: #5c1a2d; }
        .theme-papel { background: #fdf5e6 !important; color: #3d3122; background-image: repeating-linear-gradient(transparent, transparent 31px, #d8d0c1 31px, #d8d0c1 32px); }
        .theme-amor { background: radial-gradient(circle, #fcfcfc 0%, #e6e6e6 100%) !important; color: #111; }
        .theme-noche { background: linear-gradient(135deg, #1a1a2e, #16213e) !important; color: #e1e1e6; }
        .theme-fuego { background-image: linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),url('assets/themes/fuego.jpg'); background-size:cover; color:#fff!important; }
        .theme-tortugas { background-image: linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),url('assets/themes/tortugas.jpg'); background-size:cover; color:#fff!important; }
        .theme-neon { background-image: linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),url('assets/themes/perfil.jpg'); background-size:cover; color:#fff!important; }
        .theme-fuego .title-input, .theme-tortugas .title-input, .theme-neon .title-input,
        .theme-fuego .editor-area, .theme-tortugas .editor-area, .theme-neon .editor-area { color: #fff !important; }

        .image-toolbar {
            position: fixed; opacity: 0; pointer-events: none; background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px); padding: 8px 10px; border-radius: 30px; display: flex;
            gap: 6px; align-items: center; transition: opacity 0.25s; z-index: 1001;
            box-shadow: 0 8px 25px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.15);
            max-width: calc(100vw - 20px); overflow-x: auto;
        }
        .image-toolbar.show { opacity: 1; pointer-events: auto; }
        .img-btn { background: none; border: none; color: white; font-size: 1.3rem; cursor: pointer; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .img-btn:active { transform: scale(0.85); background: rgba(255,255,255,0.15); }
        .img-slider { width: 55px; accent-color: #fff; flex-shrink: 0; }
        .img-slider-label { color: rgba(255,255,255,0.8); font-size: 0.65rem; margin: 0 -3px; font-weight: 500; }
        .img-spacer { width: 1px; height: 20px; background: rgba(255,255,255,0.2); margin: 0 2px; flex-shrink: 0; }

        .theme-palette { display: none; position: absolute; top: 60px; right: 20px; background: var(--surface); padding: 10px; border-radius: 12px; box-shadow: var(--shadow); border: 1px solid var(--border); z-index: 50; gap: 8px; }
        .theme-palette.show { display: flex; animation: insertAnim 0.3s forwards; }
        .color-dot { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .color-dot:hover { transform: scale(1.1); }

        .sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 999; opacity: 0; pointer-events: none; transition: 0.3s; }
        .sheet-overlay.show { opacity: 1; pointer-events: auto; }
        .bottom-sheet { position: fixed; bottom: -100%; left: 0; width: 100%; background: var(--surface); border-radius: 25px 25px 0 0; z-index: 1000; transition: 0.3s; padding: 20px 20px 40px; box-shadow: 0 -10px 40px rgba(0,0,0,0.2); }
        .bottom-sheet.show { bottom: 0; }
        .sheet-handle { width: 40px; height: 5px; background: var(--border); border-radius: 5px; margin: 0 auto 20px; }
        .sheet-title { text-align: center; font-weight: 600; margin-bottom: 20px; color: var(--text-muted); font-size: 0.9rem; }
        .sheet-option { display: flex; align-items: center; gap: 15px; padding: 16px; border-radius: 15px; cursor: pointer; font-size: 1.1rem; font-weight: 500; transition: 0.2s; color: var(--text-main); }
        .sheet-option:hover { background: var(--bg-body); }
        .sheet-option:active { transform: scale(0.98); }
        .sheet-option i { font-size: 1.4rem; color: #111; }
        [data-theme="dark"] .sheet-option i { color: #fff; }
        .sheet-option.danger { color: #ff4757; }
        .sheet-option.danger i { color: #ff4757 !important; }

        .url-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 2000; }
        .url-modal.show { display: flex; }
        .url-modal-content { background: var(--surface); padding: 20px; border-radius: 16px; box-shadow: var(--shadow); width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 10px; }
        .url-modal-content input { padding: 10px; border: 1px solid var(--border); border-radius: 8px; outline: none; background: var(--bg-body); color: var(--text-main); }
        .url-modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
        .url-modal-actions button { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; }
        .btn-cancel { background: #ccc; }
        .btn-insert { background: #111; color: white; }

        /* animaciones de texto */
        @keyframes anim-bounce { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-8px);} }
        @keyframes anim-shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-4px);} 75%{transform:translateX(4px);} }
        @keyframes anim-pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.08);} }
        @keyframes anim-rotate { 0%,100%{transform:rotate(0);} 25%{transform:rotate(3deg);} 75%{transform:rotate(-3deg);} }
        @keyframes anim-fade { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
        @keyframes anim-glow { 0%,100%{text-shadow:0 0 5px currentColor;} 50%{text-shadow:0 0 15px currentColor,0 0 25px var(--primary);} }
        .anim-bounce { animation: anim-bounce 0.8s ease-in-out infinite; }
        .anim-shake { animation: anim-shake 0.5s ease-in-out infinite; }
        .anim-pulse { animation: anim-pulse 1s ease-in-out infinite; }
        .anim-rotate { animation: anim-rotate 1.2s ease-in-out infinite; }
        .anim-fade { animation: anim-fade 1s ease-in-out infinite; }
        .anim-glow { animation: anim-glow 1.2s ease-in-out infinite; }

        @media (max-width:768px) {
            .sidebar { position: fixed; left: -100%; height: 100%; width: 280px; box-shadow: 10px 0 30px rgba(0,0,0,0.1); }
            .sidebar.open { left: 0; }
            .menu-toggle { display: block; color: var(--text-main); }
            .editor-wrapper { padding: 20px 15px; border-radius: 12px; }
            .title-input { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

<div id="welcomeModal" class="welcome-modal">
    <div class="welcome-content">
        <i class='bx bxs-heart heart-icon'></i>
        <div class="welcome-text" style="font-family:'Poppins',sans-serif;font-size:1.3rem;font-weight:600;">Hola, mi amor. 🖤</div>
        <p style="color:var(--text-muted);margin-bottom:20px;font-size:0.9rem;">Tienes una nueva carta esperándote...</p>
        <button class="btn-enter" onclick="closeWelcome()">Leer mi carta ✨</button>
    </div>
</div>

<div id="urlModal" class="url-modal">
    <div class="url-modal-content">
        <span id="urlModalTitle" style="font-weight:600;">Pegar URL</span>
        <input type="text" id="urlInput" placeholder="https://...">
        <div class="url-modal-actions">
            <button class="btn-cancel" onclick="closeUrlModal()">Cancelar</button>
            <button class="btn-insert" onclick="confirmInsertUrl()">Insertar</button>
        </div>
    </div>
</div>

<div class="sheet-overlay" id="sheetOverlay" onclick="closeContextMenu()"></div>
<div class="bottom-sheet" id="bottomSheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="sheetTitle">Opciones de la Nota</div>
    <div class="sheet-option" onclick="actionPinNote()"><i class='bx bx-pin' id="sheetPinIcon"></i> <span id="sheetPinText">Fijar arriba</span></div>
    <div class="sheet-option" onclick="actionDuplicateNote()"><i class='bx bx-copy'></i> Duplicar nota</div>
    <div class="sheet-option danger" onclick="actionDeleteNote()"><i class='bx bx-trash'></i> Eliminar nota</div>
</div>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div class="brand">Nova Notes 🖤</div>
        <button class="theme-toggle" onclick="toggleGlobalTheme()"><i class='bx bx-moon' id="themeIcon"></i></button>
        <button class="menu-toggle" onclick="toggleSidebar()" style="display:none;color:white;" id="closeSidebarBtn"><i class='bx bx-x'></i></button>
    </div>
    <button class="btn-new" onclick="createNewNote()"><i class='bx bx-plus'></i> Escribir algo nuevo</button>
    <div class="note-list" id="noteList"></div>
</aside>

<main class="main-content">
    <header class="toolbar">
        <button class="menu-toggle" onclick="toggleSidebar()"><i class='bx bx-menu'></i></button>

        <div class="tool-group">
            <select class="tool-select" onchange="handleFontChange('fontName', this.value)">
                <option value="Poppins">Normal</option>
                <option value="Caveat, cursive">Marcador</option>
                <option value="Georgia">Elegante</option>
                <option value="Playfair Display, serif">Playfair</option>
                <option value="Montserrat, sans-serif">Montserrat</option>
                <option value="Roboto, sans-serif">Roboto</option>
                <option value="Lora, serif">Lora</option>
                <option value="Dancing Script, cursive">Dancing</option>
                <option value="Pacifico, cursive">Pacifico</option>
                <option value="Indie Flower, cursive">Indie</option>
            </select>
            <select class="tool-select" onchange="handleFontSizeChange(this.value)">
                <option value="3">Tamaño</option>
                <option value="1">Súper pequeño</option>
                <option value="2">Pequeño</option>
                <option value="4">Grande</option>
                <option value="5">Súper grande</option>
                <option value="6">Gigante</option>
            </select>
        </div>

        <div class="tool-group">
            <button class="tool-btn" onclick="applyFormatting('bold')" title="Negrita"><i class='bx bx-bold'></i></button>
            <button class="tool-btn" onclick="applyFormatting('italic')" title="Cursiva"><i class='bx bx-italic'></i></button>
            <div class="color-picker-wrapper" title="Color del texto">
                <input type="color" onchange="applyFormatting('foreColor', this.value)">
            </div>
        </div>

        <div class="tool-group">
            <button class="tool-btn" onclick="applyFormatting('justifyLeft')" title="Alinear izquierda"><i class='bx bx-align-left'></i></button>
            <button class="tool-btn" onclick="applyFormatting('justifyCenter')" title="Centrar"><i class='bx bx-align-middle'></i></button>
            <button class="tool-btn" onclick="applyFormatting('justifyRight')" title="Alinear derecha"><i class='bx bx-align-right'></i></button>
        </div>

        <div class="tool-group" style="margin-left:auto;">
            <input type="file" id="mediaInput" accept="image/*,video/*,image/gif" style="display:none;" onchange="insertMedia(event)">
            <button class="tool-btn" onclick="document.getElementById('mediaInput').click()" title="Insertar imagen/video"><i class='bx bx-image-add'></i></button>
            <button class="tool-btn" onclick="openUrlModal('image')" title="Sticker/GIF URL"><i class='bx bx-happy-heart-eyes'></i></button>
            <button class="tool-btn" onclick="openUrlModal('video')" title="Video URL"><i class='bx bx-video-plus'></i></button>
            <button class="tool-btn" onclick="toggleThemePalette()" title="Fondo"><i class='bx bx-palette'></i></button>
            <button class="tool-btn" id="toggleExtrasBtn" onclick="toggleExtras()" title="Activar/Desactivar extras"><i class='bx bxs-magic-wand'></i></button>
        </div>
    </header>

    <div class="theme-palette" id="themePalette">

        <div class="color-dot" style="background:#e6dac3;" onclick="setNoteTheme('theme-papel')"></div>
        <div class="color-dot" style="background:#d4d4d4;" onclick="setNoteTheme('theme-amor')"></div>

        <div class="color-dot" style="background-image:url('assets/themes/fuego.jpg');background-size:cover;" onclick="setNoteTheme('theme-fuego')"></div>
        <div class="color-dot" style="background-image:url('assets/themes/tortugas.jpg');background-size:cover;" onclick="setNoteTheme('theme-tortugas')"></div>
        <div class="color-dot" style="background-image:url('assets/themes/perfil.jpg');background-size:cover;" onclick="setNoteTheme('theme-neon')"></div>
    </div>

    <div class="editor-container" id="editorContainer">
        <div class="editor-wrapper" id="editorWrapper">
            <input type="text" class="title-input" id="noteTitle" placeholder="Título..." oninput="triggerSave()">
            <div class="editor-area" id="noteEditor" contenteditable="true" placeholder="Escribe aquí, mi amor..." oninput="triggerSave()"></div>

            <!-- Barra flotante de texto (formato) -->
            <div class="floating-text-menu" id="floatingTextMenu">
                <button class="ft-btn" onmousedown="event.preventDefault(); restoreSelection();" onclick="safeExec(() => execFloating('copy'))"><i class='bx bx-copy'></i></button>
                <button class="ft-btn" onmousedown="event.preventDefault(); restoreSelection();" onclick="safeExec(() => execFloating('cut'))"><i class='bx bx-cut'></i></button>
                <div class="ft-divider"></div>
                <select class="ft-select" onmousedown="restoreSelection()" onchange="safeExec(() => applyFontNameFloating(this.value))">
                    <option value="Poppins">Fuente</option>
                    <option value="Caveat, cursive">Marcador</option>
                    <option value="Georgia">Elegante</option>
                    <option value="Playfair Display, serif">Playfair</option>
                    <option value="Montserrat, sans-serif">Montserrat</option>
                    <option value="Roboto, sans-serif">Roboto</option>
                    <option value="Lora, serif">Lora</option>
                    <option value="Dancing Script, cursive">Dancing</option>
                    <option value="Pacifico, cursive">Pacifico</option>
                    <option value="Indie Flower, cursive">Indie</option>
                </select>
                <select class="ft-select" onmousedown="restoreSelection()" onchange="safeExec(() => applyFontSizeFloating(this.value))">
                    <option value="1">S</option><option value="3" selected>M</option>
                    <option value="5">L</option><option value="7">XL</option>
                </select>
                <button class="ft-btn" onmousedown="event.preventDefault(); restoreSelection();" onclick="safeExec(() => execFloating('bold'))"><i class='bx bx-bold'></i></button>
                <button class="ft-btn" onmousedown="event.preventDefault(); restoreSelection();" onclick="safeExec(() => execFloating('italic'))"><i class='bx bx-italic'></i></button>
                <button class="ft-btn" onmousedown="event.preventDefault(); restoreSelection();" onclick="safeExec(() => execFloating('underline'))"><i class='bx bx-underline'></i></button>
                <button class="ft-btn" onmousedown="event.preventDefault(); restoreSelection();" onclick="safeExec(() => execFloating('removeFormat'))"><i class='bx bx-eraser'></i></button>
                <div class="ft-divider"></div>
                <div class="ft-color-wrapper"><input type="color" onmousedown="event.preventDefault(); restoreSelection();" onchange="safeExec(() => execFloating('foreColor', this.value))"></div>
                <div class="ft-color-wrapper"><input type="color" onmousedown="event.preventDefault(); restoreSelection();" onchange="safeExec(() => execFloating('hiliteColor', this.value))" value="#ffff00"></div>
                <button class="ft-btn" onmousedown="event.preventDefault(); restoreSelection();" onclick="safeExec(() => execFloating('hiliteColor', 'transparent'))" title="Quitar resaltado"><i class='bx bx-highlight'></i></button>
                <div class="ft-divider"></div>
                <button class="ft-btn" id="animBtn" onmousedown="event.preventDefault();" onclick="toggleAnimSubmenu(event)"><i class='bx bx-movie-play'></i></button>
            </div>

            <!-- Submenú de animaciones -->
            <div class="floating-insert-menu" id="animSubmenu" style="display:none; max-width:200px;">
                <span style="color:white;font-weight:600;">Animaciones</span>
                <div class="symbol-row">
                    <button class="symbol-btn" onmousedown="event.preventDefault(); restoreSelection();" onclick="applyTextAnimation('anim-bounce')">Rebote</button>
                    <button class="symbol-btn" onmousedown="event.preventDefault(); restoreSelection();" onclick="applyTextAnimation('anim-shake')">Temblor</button>
                    <button class="symbol-btn" onmousedown="event.preventDefault(); restoreSelection();" onclick="applyTextAnimation('anim-pulse')">Pulso</button>
                    <button class="symbol-btn" onmousedown="event.preventDefault(); restoreSelection();" onclick="applyTextAnimation('anim-rotate')">Giro</button>
                    <button class="symbol-btn" onmousedown="event.preventDefault(); restoreSelection();" onclick="applyTextAnimation('anim-fade')">Opaco</button>
                    <button class="symbol-btn" onmousedown="event.preventDefault(); restoreSelection();" onclick="applyTextAnimation('anim-glow')">Brillo</button>
                    <button class="symbol-btn" onmousedown="event.preventDefault(); restoreSelection();" onclick="applyTextAnimation('')">Ninguna</button>
                </div>
            </div>

            <!-- Barra flotante de inserción (long press en vacío) -->
            <div class="floating-insert-menu" id="insertMenu">
                <div class="insert-row">
                    <button class="ft-btn" onclick="safeExec(() => document.execCommand('paste'))"><i class='bx bx-paste'></i></button>
                    <button class="ft-btn" onclick="safeExec(() => document.execCommand('undo'))"><i class='bx bx-undo'></i></button>
                    <button class="ft-btn" onclick="safeExec(() => document.execCommand('redo'))"><i class='bx bx-redo'></i></button>
                    <div class="ft-color-wrapper"><input type="color" onchange="insertMenuCommand('foreColor', this.value)"></div>
                    <input type="file" id="insertMenuFileInput" accept="image/*,video/*,image/gif" style="display:none;" onchange="insertMediaFromMenu(event)">
                    <button class="ft-btn" onclick="document.getElementById('insertMenuFileInput').click()"><i class='bx bx-image-add'></i></button>
                    <button class="ft-btn" onclick="openUrlModalFromInsert('image')"><i class='bx bx-happy-heart-eyes'></i></button>
                    <button class="ft-btn" onclick="openUrlModalFromInsert('video')"><i class='bx bx-video-plus'></i></button>
                </div>
                <div class="symbol-row">
                    <button class="symbol-btn" onclick="insertSymbol('←')">←</button>
                    <button class="symbol-btn" onclick="insertSymbol('→')">→</button>
                    <button class="symbol-btn" onclick="insertSymbol('↑')">↑</button>
                    <button class="symbol-btn" onclick="insertSymbol('↓')">↓</button>
                    <button class="symbol-btn" onclick="insertSymbol('↔')">↔</button>
                    <button class="symbol-btn" onclick="insertSymbol('↕')">↕</button>
                    <button class="symbol-btn" onclick="insertSymbol('★')">★</button>
                    <button class="symbol-btn" onclick="insertSymbol('❤')">❤</button>
                    <button class="symbol-btn" onclick="insertSymbol('☀')">☀</button>
                    <button class="symbol-btn" onclick="insertSymbol('☁')">☁</button>
                    <button class="symbol-btn" onclick="insertSymbol('♫')">♫</button>
                    <button class="symbol-btn" onclick="insertSymbol('✓')">✓</button>
                </div>
            </div>
        </div>
    </div>

    <div class="image-toolbar" id="imageToolbar">
        <span class="img-slider-label">An</span>
        <input type="range" class="img-slider" id="imgSizeSlider" min="20" max="100" value="50" onchange="resizeMedia(this.value)">
        <span class="img-slider-label">H</span>
        <input type="range" class="img-slider" id="imgMarginHSlider" min="0" max="40" value="15" onchange="changeMargin('horizontal', this.value)">
        <span class="img-slider-label">V</span>
        <input type="range" class="img-slider" id="imgMarginVSlider" min="0" max="40" value="10" onchange="changeMargin('vertical', this.value)">
        <div class="img-spacer"></div>
        <button class="img-btn" onclick="alignMedia('left')"><i class='bx bx-align-left'></i></button>
        <button class="img-btn" onclick="alignMedia('center')"><i class='bx bx-align-middle'></i></button>
        <button class="img-btn" onclick="alignMedia('right')"><i class='bx bx-align-right'></i></button>
        <div class="img-spacer"></div>
        <button class="img-btn" onclick="copyMedia()"><i class='bx bx-copy'></i></button>
        <button class="img-btn" onclick="duplicateMedia()"><i class='bx bx-duplicate'></i></button>
        <button class="img-btn" onclick="deleteMedia()"><i class='bx bx-trash'></i></button>
    </div>
</main>

<script>
    // ── Utilidades seguras ──
    function safeExec(fn) { try { fn(); } catch(e) {} }
    function safeGet(key, def) { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch(e) { return def; } }
    function safeSet(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {} }

    // ── Datos ──
    const cartasAmor = [
        "Hola, Gabriela preciosa. Solo quería tomarme un momento para decirte lo increíblemente afortunado que me siento de tenerte en mi vida...",
        "Mi amor, hoy me desperté pensando en ti, como todos los días...",
        "Sé que a veces los días se vuelven grises...",
        "¿Sabes qué es lo que más admiro de ti? Tu corazón inmenso..."
    ];

    let notes = safeGet('nova_romance', []);
    let currentNoteId = null;
    let saveTimeout;
    let selectedMedia = null;
    let savedRange = null;
    let contextNoteId = null;
    let pendingMediaType = null;
    let extrasEnabled = safeGet('nova_extras_enabled', true);
    let lastFocusedEditable = null;

    // ── DOM ──
    const titleEl = document.getElementById('noteTitle');
    const editorEl = document.getElementById('noteEditor');
    const listEl = document.getElementById('noteList');
    const wrapperEl = document.getElementById('editorWrapper');
    const imgToolbar = document.getElementById('imageToolbar');
    const sheet = document.getElementById('bottomSheet');
    const overlaySheet = document.getElementById('sheetOverlay');
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    const floatMenu = document.getElementById('floatingTextMenu');
    const insertMenu = document.getElementById('insertMenu');
    const animSubmenu = document.getElementById('animSubmenu');
    const animBtn = document.getElementById('animBtn');
    const editorContainer = document.getElementById('editorContainer');
    const urlModal = document.getElementById('urlModal');
    const urlInput = document.getElementById('urlInput');
    const urlModalTitle = document.getElementById('urlModalTitle');
    const toggleExtrasBtn = document.getElementById('toggleExtrasBtn');
    const imgSizeSlider = document.getElementById('imgSizeSlider');
    const imgMarginHSlider = document.getElementById('imgMarginHSlider');
    const imgMarginVSlider = document.getElementById('imgMarginVSlider');

    // ── Foco ──
    titleEl.addEventListener('focus', () => lastFocusedEditable = 'title');
    editorEl.addEventListener('focus', () => lastFocusedEditable = 'editor');

    function getTargetForFormatting() {
        return lastFocusedEditable === 'title' ? titleEl : editorEl;
    }

    function restoreSelection() {
        if (savedRange) {
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(savedRange);
        }
    }

    // ── Formateo principal (sin cambiar fuente en negrita/cursiva) ──
    function applyFormatting(command, value = null) {
        const target = getTargetForFormatting();
        if (target === titleEl) {
            if (command === 'foreColor') titleEl.style.color = value;
            else if (command === 'bold') titleEl.style.fontWeight = titleEl.style.fontWeight === '700' ? '400' : '700';
            else if (command === 'italic') titleEl.style.fontStyle = titleEl.style.fontStyle === 'italic' ? 'normal' : 'italic';
            else if (command === 'justifyLeft') titleEl.style.textAlign = 'left';
            else if (command === 'justifyCenter') titleEl.style.textAlign = 'center';
            else if (command === 'justifyRight') titleEl.style.textAlign = 'right';
            triggerSave();
            return;
        }
        editorEl.focus();
        if (command === 'fontName' || command === 'fontSize') {
            applyFontStyle(command, value);
        } else {
            document.execCommand('styleWithCSS', false, true);
            document.execCommand(command, false, value);
            triggerSave();
        }
    }

    function applyFontStyle(type, value) {
        const sel = window.getSelection();
        if (!sel.rangeCount || sel.isCollapsed || !editorEl.contains(sel.anchorNode)) return;
        const range = sel.getRangeAt(0);
        const contents = range.extractContents();
        if (!contents.textContent.trim()) { range.insertNode(contents); return; }
        const span = document.createElement('span');
        span.appendChild(contents);
        if (type === 'fontName') span.style.fontFamily = value;
        else if (type === 'fontSize') {
            const sizes = {1:'0.7rem',2:'0.85rem',3:'1rem',4:'1.2rem',5:'1.5rem',6:'2rem'};
            span.style.fontSize = sizes[value] || '1rem';
        }
        range.insertNode(span);
        sel.removeAllRanges();
        const newRange = document.createRange();
        newRange.selectNodeContents(span);
        sel.addRange(newRange);
        editorEl.focus();
        triggerSave();
    }

    function handleFontChange(type, value) {
        if (getTargetForFormatting() === titleEl) { titleEl.style.fontFamily = value; triggerSave(); return; }
        applyFontStyle('fontName', value);
    }
    function handleFontSizeChange(value) {
        if (getTargetForFormatting() === titleEl) {
            const sizes = {1:'1.2rem',2:'1.5rem',3:'2rem',4:'2.4rem',5:'3rem',6:'3.8rem'};
            titleEl.style.fontSize = sizes[value] || '2rem';
            triggerSave(); return;
        }
        applyFontStyle('fontSize', value);
    }

    // ── Formateo flotante ──
    function execFloating(command, value = null) {
        restoreSelection();
        const target = getTargetForFormatting();
        if (target === titleEl && titleEl.selectionStart !== titleEl.selectionEnd) {
            if (command === 'foreColor') titleEl.style.color = value;
            else if (command === 'hiliteColor') titleEl.style.backgroundColor = value === 'transparent' ? 'transparent' : value;
            else if (command === 'bold') titleEl.style.fontWeight = titleEl.style.fontWeight === '700' ? '400' : '700';
            else if (command === 'italic') titleEl.style.fontStyle = titleEl.style.fontStyle === 'italic' ? 'normal' : 'italic';
            else if (command === 'underline') titleEl.style.textDecoration = titleEl.style.textDecoration === 'underline' ? 'none' : 'underline';
            else if (command === 'copy') document.execCommand('copy');
            else if (command === 'cut') document.execCommand('cut');
            else if (command === 'removeFormat') {
                titleEl.style.fontWeight = '400';
                titleEl.style.fontStyle = 'normal';
                titleEl.style.textDecoration = 'none';
                titleEl.style.color = '';
                titleEl.style.backgroundColor = '';
            }
            triggerSave();
            return;
        }
        if (command === 'copy' || command === 'cut') { document.execCommand(command); return; }
        if (command === 'removeFormat') { document.execCommand('removeFormat', false, null); triggerSave(); return; }
        editorEl.focus();
        document.execCommand('styleWithCSS', false, true);
        document.execCommand(command, false, value);
        triggerSave();
    }

    function applyFontNameFloating(value) {
        restoreSelection();
        if (getTargetForFormatting() === titleEl && titleEl.selectionStart !== titleEl.selectionEnd) {
            titleEl.style.fontFamily = value; triggerSave(); return;
        }
        editorEl.focus();
        applyFontStyle('fontName', value);
    }
    function applyFontSizeFloating(value) {
        restoreSelection();
        if (getTargetForFormatting() === titleEl && titleEl.selectionStart !== titleEl.selectionEnd) {
            const sizes = {1:'1.2rem',3:'2rem',5:'2.8rem',7:'3.5rem'};
            titleEl.style.fontSize = sizes[value] || '2rem';
            triggerSave(); return;
        }
        editorEl.focus();
        applyFontStyle('fontSize', value);
    }

    // ── Animaciones de texto ──
    function applyTextAnimation(animClass) {
        restoreSelection();
        const sel = window.getSelection();
        if (!sel.rangeCount || sel.isCollapsed || !editorEl.contains(sel.anchorNode)) return;
        const range = sel.getRangeAt(0);
        const contents = range.extractContents();
        if (!contents.textContent.trim()) { range.insertNode(contents); return; }
        const span = document.createElement('span');
        span.appendChild(contents);
        if (animClass) span.className = animClass;
        range.insertNode(span);
        sel.removeAllRanges();
        const newRange = document.createRange();
        newRange.selectNodeContents(span);
        sel.addRange(newRange);
        editorEl.focus();
        triggerSave();
        animSubmenu.style.display = 'none';
    }

    function toggleAnimSubmenu(e) {
        e.stopPropagation();
        if (!extrasEnabled) return;
        const rect = animBtn.getBoundingClientRect();
        const containerRect = editorContainer.getBoundingClientRect();
        animSubmenu.style.display = animSubmenu.style.display === 'flex' ? 'none' : 'flex';
        animSubmenu.style.position = 'absolute';
        animSubmenu.style.left = (rect.left - containerRect.left + editorContainer.scrollLeft - 60) + 'px';
        animSubmenu.style.top = (rect.bottom - containerRect.top + editorContainer.scrollTop + 8) + 'px';
    }

    // ── Long press en vacío ──
    let longPressTimer = null;
    editorEl.addEventListener('pointerdown', (e) => {
        if (!extrasEnabled) return;
        if (e.target.closest('img, video')) return;
        const sel = window.getSelection();
        if (sel.rangeCount && !sel.isCollapsed) return;
        longPressTimer = setTimeout(() => {
            showInsertMenuAt(e);
            if (navigator.vibrate) navigator.vibrate(20);
        }, 600);
    });
    editorEl.addEventListener('pointermove', () => clearTimeout(longPressTimer));
    editorEl.addEventListener('pointerup', () => clearTimeout(longPressTimer));
    editorEl.addEventListener('pointercancel', () => clearTimeout(longPressTimer));

    function showInsertMenuAt(e) {
        floatMenu.style.display = 'none';
        const containerRect = editorContainer.getBoundingClientRect();
        const x = e.clientX - containerRect.left + editorContainer.scrollLeft;
        const y = e.clientY - containerRect.top + editorContainer.scrollTop;
        insertMenu.style.display = 'flex';
        insertMenu.style.visibility = 'hidden';
        requestAnimationFrame(() => {
            const mw = insertMenu.offsetWidth;
            let left = x - mw/2;
            left = Math.max(0, Math.min(left, containerRect.width - mw));
            insertMenu.style.left = left + 'px';
            let top = y - 70;
            if (top < 10) top = 10;
            insertMenu.style.top = top + 'px';
            insertMenu.style.visibility = 'visible';
        });
        editorEl.focus();
    }

    function hideInsertMenu() { insertMenu.style.display = 'none'; }
    function insertSymbol(sym) { document.execCommand('insertText', false, sym); triggerSave(); hideInsertMenu(); }
    function insertMenuCommand(cmd, val) { document.execCommand(cmd, false, val); triggerSave(); editorEl.focus(); }

    // ── Actualizar menú flotante ──
    document.addEventListener('selectionchange', () => {
        const sel = window.getSelection();
        if (!sel.rangeCount || !sel.anchorNode) {
            floatMenu.style.display = 'none';
            savedRange = null;
            return;
        }
        if (titleEl.contains(sel.anchorNode) && titleEl.selectionStart !== titleEl.selectionEnd) {
            const rect = titleEl.getBoundingClientRect();
            const containerRect = editorContainer.getBoundingClientRect();
            floatMenu.style.display = 'flex';
            floatMenu.style.top = (rect.bottom - containerRect.top + editorContainer.scrollTop + 8) + 'px';
            let left = (rect.left - containerRect.left) + rect.width/2 - floatMenu.offsetWidth/2;
            left = Math.max(0, Math.min(left, containerRect.width - floatMenu.offsetWidth));
            floatMenu.style.left = left + 'px';
            animSubmenu.style.display = 'none';
            return;
        }
        if (editorEl.contains(sel.anchorNode) && !sel.isCollapsed && !selectedMedia) {
            savedRange = sel.getRangeAt(0).cloneRange();
            const range = sel.getRangeAt(0);
            const rect = range.getBoundingClientRect();
            const containerRect = editorContainer.getBoundingClientRect();
            floatMenu.style.display = 'flex';
            let topPos = (rect.bottom - containerRect.top) + editorContainer.scrollTop + 8;
            if (topPos + floatMenu.offsetHeight > editorContainer.scrollHeight - 20)
                topPos = (rect.top - containerRect.top) + editorContainer.scrollTop - floatMenu.offsetHeight - 8;
            floatMenu.style.top = topPos + 'px';
            let left = (rect.left - containerRect.left) + rect.width/2 - floatMenu.offsetWidth/2;
            left = Math.max(0, Math.min(left, containerRect.width - floatMenu.offsetWidth));
            floatMenu.style.left = left + 'px';
            animSubmenu.style.display = 'none';
            return;
        }
        floatMenu.style.display = 'none';
        savedRange = null;
    });

    // ── Medios ──
    function selectMediaElement(el) {
        if (selectedMedia && selectedMedia !== el) selectedMedia.classList.remove('selected-img');
        selectedMedia = el;
        selectedMedia.classList.add('selected-img');
        imgSizeSlider.value = parseInt(selectedMedia.style.width) || (el.tagName === 'VIDEO' ? 50 : 80);
        imgMarginHSlider.value = parseInt(selectedMedia.style.marginLeft) || 15;
        imgMarginVSlider.value = parseInt(selectedMedia.style.marginTop) || 10;
        updateMediaToolbarPosition(el);
        imgToolbar.classList.add('show');
        floatMenu.style.display = 'none';
        insertMenu.style.display = 'none';
    }
    function deselectMedia() {
        if (selectedMedia) { selectedMedia.classList.remove('selected-img'); selectedMedia = null; }
        imgToolbar.classList.remove('show');
    }
    function updateMediaToolbarPosition(el) {
        const rect = el.getBoundingClientRect();
        const tw = imgToolbar.offsetWidth, th = imgToolbar.offsetHeight;
        let top = rect.bottom + 12, left = rect.left + rect.width/2 - tw/2;
        if (top + th > window.innerHeight - 20) top = rect.top - th - 12;
        left = Math.max(10, Math.min(left, window.innerWidth - tw - 10));
        imgToolbar.style.top = top + 'px';
        imgToolbar.style.left = left + 'px';
    }
    function resizeMedia(v) { if(selectedMedia){ selectedMedia.style.width = v+'%'; updateMediaToolbarPosition(selectedMedia); triggerSave(); } deselectMedia(); editorEl.focus(); }
    function changeMargin(type, v) { if(!selectedMedia) return; if(type==='horizontal'){ selectedMedia.style.marginLeft = v+'px'; selectedMedia.style.marginRight = v+'px'; } else { selectedMedia.style.marginTop = v+'px'; selectedMedia.style.marginBottom = v+'px'; } updateMediaToolbarPosition(selectedMedia); triggerSave(); deselectMedia(); editorEl.focus(); }
    function alignMedia(pos) {
        if(!selectedMedia) return;
        const vm = imgMarginVSlider.value, hm = imgMarginHSlider.value;
        if(pos==='left'){ selectedMedia.style.display='inline'; selectedMedia.style.float='left'; selectedMedia.style.margin=vm+'px '+hm+'px'; }
        else if(pos==='right'){ selectedMedia.style.display='inline'; selectedMedia.style.float='right'; selectedMedia.style.margin=vm+'px '+hm+'px'; }
        else { selectedMedia.style.display='block'; selectedMedia.style.float='none'; selectedMedia.style.margin=vm+'px auto'; }
        updateMediaToolbarPosition(selectedMedia); triggerSave(); deselectMedia(); editorEl.focus();
    }
    function copyMedia() { if(!selectedMedia) return; const clone=selectedMedia.cloneNode(true); const r=document.createRange(); r.selectNode(clone); window.getSelection().removeAllRanges(); window.getSelection().addRange(r); document.execCommand('copy'); window.getSelection().removeAllRanges(); deselectMedia(); editorEl.focus(); }
    function duplicateMedia() { if(!selectedMedia) return; const clone=selectedMedia.cloneNode(true); clone.classList.remove('selected-img'); selectedMedia.parentNode.insertBefore(clone, selectedMedia.nextSibling); triggerSave(); deselectMedia(); editorEl.focus(); }
    function deleteMedia() { if(!selectedMedia) return; selectedMedia.remove(); triggerSave(); deselectMedia(); editorEl.focus(); }

    editorEl.addEventListener('pointerdown', (e) => {
        const t = e.target.closest('img, video');
        if (!t || !editorEl.contains(t)) return;
        e._mediaTarget = t;
        e._mediaTime = Date.now();
    });
    editorEl.addEventListener('pointerup', (e) => {
        if (!e._mediaTarget) return;
        const duration = Date.now() - e._mediaTime;
        if (duration > 400) {
            e.preventDefault();
            selectMediaElement(e._mediaTarget);
            if (navigator.vibrate) navigator.vibrate(50);
        } else {
            selectMediaElement(e._mediaTarget);
        }
    });
    editorEl.addEventListener('click', (e) => {
        const t = e.target.closest('img, video');
        if (!t) { deselectMedia(); editorEl.focus(); }
    });
    editorEl.addEventListener('contextmenu', e => e.preventDefault());

    // ── Insertar medios ──
    function insertMedia(e) {
        const file = e.target.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            const html = file.type.startsWith('video/')
                ? `<video src="${ev.target.result}" controls style="width:50%;display:block;margin:15px auto;"></video>`
                : `<img src="${ev.target.result}" style="width:80%;display:block;margin:15px auto;clear:both;">`;
            insertHtmlAtCursor(html);
        };
        reader.readAsDataURL(file);
        e.target.value = '';
    }
    function insertHtmlAtCursor(html) {
        const sel = window.getSelection();
        if (sel.rangeCount && editorEl.contains(sel.anchorNode)) {
            const range = sel.getRangeAt(0);
            range.deleteContents();
            const frag = range.createContextualFragment(html);
            range.insertNode(frag);
            range.collapse(false);
            sel.removeAllRanges();
            sel.addRange(range);
        } else {
            editorEl.focus();
            document.execCommand('insertHTML', false, html);
        }
        triggerSave(); editorEl.focus();
    }
    function openUrlModal(type) { pendingMediaType=type; urlInput.value=''; urlModalTitle.textContent=type==='image'?'Pega la URL del GIF/Sticker':'Pega la URL del video'; urlModal.classList.add('show'); setTimeout(()=>urlInput.focus(),100); }
    function closeUrlModal() { urlModal.classList.remove('show'); pendingMediaType=null; }
    function confirmInsertUrl() { const u=urlInput.value.trim(); if(!u)return; closeUrlModal(); insertMediaFromUrl(pendingMediaType,u); }
    function insertMediaFromUrl(type,url) {
        let html;
        if(type==='image') html = `<img src="${url}" style="width:80%;display:block;margin:15px auto;" onerror="this.style.display='none'">`;
        else {
            const yt=url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|v\/))([\w-]{11})/);
            html = yt
                ? `<div style="position:relative;padding-bottom:56.25%;height:0;"><iframe src="https://www.youtube.com/embed/${yt[1]}" frameborder="0" allowfullscreen style="position:absolute;top:0;left:0;width:100%;height:100%;"></iframe></div>`
                : `<video src="${url}" controls style="width:50%;display:block;margin:15px auto;"></video>`;
        }
        insertHtmlAtCursor(html);
    }
    function openUrlModalFromInsert(type) { hideInsertMenu(); openUrlModal(type); }
    function insertMediaFromMenu(e) { insertMedia(e); hideInsertMenu(); }

    // ── Notas ──
    function renderList() {
        listEl.innerHTML = '';
        const sorted = [...notes].sort((a,b) => (a.pinned===b.pinned ? b.timestamp-a.timestamp : a.pinned?-1:1));
        sorted.forEach(note => {
            const div = document.createElement('div');
            div.className = `note-item ${note.id===currentNoteId?'active':''}`;
            div.id = `note-${note.id}`;
            let timer;
            const start = () => { timer = setTimeout(()=>{ openContextMenu(note.id); if(navigator.vibrate)navigator.vibrate(30); }, 500); };
            const cancel = () => clearTimeout(timer);
            div.addEventListener('touchstart', start, {passive:true});
            div.addEventListener('touchend', cancel);
            div.addEventListener('touchmove', cancel);
            div.addEventListener('mousedown', start);
            div.addEventListener('mouseup', cancel);
            div.addEventListener('mouseleave', cancel);
            div.addEventListener('click', (e) => { cancel(); openNote(note.id); });
            div.addEventListener('contextmenu', e => { e.preventDefault(); openContextMenu(note.id); });
            const plain = note.content.replace(/<[^>]+>/g,'') || '';
            div.innerHTML = `<div class="note-title-list"><span>${note.title||'Nueva nota'}</span>${note.pinned?'<i class="bx bxs-pin pinned-icon"></i>':''}</div><div style="font-size:0.8rem;color:var(--text-muted);">${plain.substring(0,35)}...</div>`;
            listEl.appendChild(div);
        });
    }
    function openContextMenu(id) {
        contextNoteId = id;
        const note = notes.find(n => n.id === id);
        document.getElementById('sheetTitle').innerText = `Opciones: ${note.title||'Nota sin título'}`;
        const icon = document.getElementById('sheetPinIcon');
        const txt = document.getElementById('sheetPinText');
        if (note.pinned) { icon.className = 'bx bx-pin'; txt.innerText = 'Desfijar nota'; }
        else { icon.className = 'bx bxs-pin'; txt.innerText = 'Fijar arriba'; }
        sheet.classList.add('show');
        overlaySheet.classList.add('show');
    }
    function closeContextMenu() { sheet.classList.remove('show'); overlaySheet.classList.remove('show'); contextNoteId = null; }
    function actionPinNote() {
        const idx = notes.findIndex(n => n.id === contextNoteId);
        if (idx !== -1) { notes[idx].pinned = !notes[idx].pinned; saveData(); renderList(); }
        closeContextMenu();
    }
    function actionDuplicateNote() {
        const orig = notes.find(n => n.id === contextNoteId);
        if (orig) {
            const copy = JSON.parse(JSON.stringify(orig));
            copy.id = Date.now().toString();
            copy.title = orig.title + ' (Copia)';
            copy.timestamp = Date.now();
            copy.pinned = false;
            notes.push(copy);
            saveData(); renderList(); openNote(copy.id);
        }
        closeContextMenu();
    }
    function actionDeleteNote() {
        if (contextNoteId === 'nota_magica_diaria') { alert('¡Esta es mi carta diaria! No puedes borrarla. 🖤'); closeContextMenu(); return; }
        if (confirm('¿Eliminar esta nota?')) {
            const idDel = contextNoteId; closeContextMenu();
            const el = document.getElementById(`note-${idDel}`);
            if (el) {
                el.classList.add('deleting');
                setTimeout(() => {
                    notes = notes.filter(n => n.id !== idDel);
                    saveData();
                    if (currentNoteId === idDel) openNote(notes[0]?.id || null);
                    renderList();
                }, 400);
            } else {
                notes = notes.filter(n => n.id !== idDel);
                saveData();
                if (currentNoteId === idDel) openNote(notes[0]?.id || null);
                renderList();
            }
        }
    }

    function openNote(id, autoClose = true) {
        currentNoteId = id;
        const note = notes.find(n => n.id === id);
        if (note) {
            titleEl.value = note.title;
            editorEl.innerHTML = note.content;
            wrapperEl.className = 'editor-wrapper';
            if (note.theme && note.theme !== 'default') wrapperEl.classList.add(note.theme);
        }
        deselectMedia();
        renderList();
        if (autoClose && window.innerWidth <= 768 && sidebar.classList.contains('open')) toggleSidebar();
    }
    function createNewNote() {
        const nn = { id: Date.now().toString(), title: '', content: '', theme: 'default', pinned: false, timestamp: Date.now() };
        notes.push(nn);
        currentNoteId = nn.id;
        saveData();
        openNote(nn.id);
        titleEl.focus();
        setTimeout(() => { const el = document.getElementById(`note-${nn.id}`); if(el) el.classList.add('creating'); }, 50);
    }
    function triggerSave() {
        if (!currentNoteId || currentNoteId === 'nota_magica_diaria') return;
        clearTimeout(saveTimeout);
        saveTimeout = setTimeout(() => {
            const idx = notes.findIndex(n => n.id === currentNoteId);
            if (idx !== -1) {
                notes[idx].title = titleEl.value;
                notes[idx].content = editorEl.innerHTML;
                notes[idx].timestamp = Date.now();
                saveData();
                renderList();
            }
        }, 500);
    }
    function saveData() { safeSet('nova_romance', notes); }

    function toggleGlobalTheme(forceDark = false) {
        const body = document.body, icon = document.getElementById('themeIcon');
        if (forceDark || body.getAttribute('data-theme') !== 'dark') {
            body.setAttribute('data-theme', 'dark'); icon.className = 'bx bx-sun';
            safeSet('nova_global_theme', 'dark');
        } else {
            body.removeAttribute('data-theme'); icon.className = 'bx bx-moon';
            safeSet('nova_global_theme', 'light');
        }
    }
    function toggleSidebar() {
        sidebar.classList.toggle('open');
        sidebarOverlay.classList.toggle('show', sidebar.classList.contains('open'));
        checkMobileMenu();
    }
    function checkMobileMenu() {
        const btn = document.getElementById('closeSidebarBtn');
        if (window.innerWidth <= 768) {
            btn.style.display = sidebar.classList.contains('open') ? 'block' : 'none';
            if (!sidebar.classList.contains('open')) sidebarOverlay.classList.remove('show');
        } else {
            btn.style.display = 'none';
            sidebarOverlay.classList.remove('show');
        }
    }
    function toggleExtras() {
        extrasEnabled = !extrasEnabled;
        safeSet('nova_extras_enabled', extrasEnabled);
        updateExtrasUI();
    }
    function updateExtrasUI() {
        toggleExtrasBtn.style.color = extrasEnabled ? 'var(--primary)' : 'var(--text-muted)';
        animBtn.style.display = extrasEnabled ? 'flex' : 'none';
        if (!extrasEnabled) animSubmenu.style.display = 'none';
    }
    function toggleThemePalette() { document.getElementById('themePalette').classList.toggle('show'); }
    function setNoteTheme(cls) {
        wrapperEl.className = 'editor-wrapper';
        if (cls !== 'default') wrapperEl.classList.add(cls);
        const idx = notes.findIndex(n => n.id === currentNoteId);
        if (idx !== -1) { notes[idx].theme = cls; saveData(); }
        document.getElementById('themePalette').classList.remove('show');
    }
    function closeWelcome() { document.getElementById('welcomeModal').classList.add('hidden'); }

    // ── Inicio ──
    function init() {
        if (safeGet('nova_global_theme', 'light') === 'dark') toggleGlobalTheme(true);

        const letter = cartasAmor[Math.floor(Math.random() * cartasAmor.length)];
        const formatted = `<div style="font-family:Caveat,cursive;font-size:1.65rem;line-height:1.7;text-align:center;padding:20px;">${letter}<br><br><span style="font-size:2.5rem;animation:heartbeat 1.5s infinite;display:inline-block;">🖤</span></div>`;

        let magicIdx = notes.findIndex(n => n.id === 'nota_magica_diaria');
        if (magicIdx === -1) {
            notes.unshift({ id: 'nota_magica_diaria', title: '💌 Para ti, hoy...', content: formatted, theme: 'theme-amor', pinned: true, timestamp: Date.now() + 9999999 });
        } else {
            notes[magicIdx].content = formatted;
            notes[magicIdx].timestamp = Date.now() + 9999999;
        }
        saveData();
        renderList();
        openNote('nota_magica_diaria', false);
        updateExtrasUI();
        checkMobileMenu();

        editorEl.addEventListener('paste', (e) => {
            const items = (e.clipboardData || window.clipboardData).items;
            for (let item of items) {
                if (item.type.indexOf('image') !== -1) {
                    e.preventDefault();
                    const blob = item.getAsFile();
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        const img = document.createElement('img');
                        img.src = ev.target.result;
                        img.style.width = '80%';
                        img.style.display = 'block';
                        img.style.margin = '15px auto';
                        insertHtmlAtCursor(img.outerHTML);
                    };
                    reader.readAsDataURL(blob);
                    break;
                }
            }
        });

        document.addEventListener('click', (e) => {
            if (!insertMenu.contains(e.target) && e.target !== editorEl) hideInsertMenu();
            if (!animSubmenu.contains(e.target) && e.target !== animBtn) animSubmenu.style.display = 'none';
            if (!floatMenu.contains(e.target) && !titleEl.contains(e.target) && !editorEl.contains(e.target)) floatMenu.style.display = 'none';
            if (!imgToolbar.contains(e.target) && !editorEl.contains(e.target)) deselectMedia();
        });
        window.addEventListener('resize', checkMobileMenu);
    }

    init();
</script>
</body>
