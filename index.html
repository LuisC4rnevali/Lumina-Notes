<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nova Pro | Para Ti 🖤</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,600&family=Caveat:wght@500;700&family=Playfair+Display:wght@400;700&family=Montserrat:wght@400;600&family=Roboto:wght@400;700&family=Lora:wght@400;700&family=Dancing+Script:wght@400;700&family=Pacifico&family=Indie+Flower&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <style>
        /* --- CONFIGURACIÓN GENERAL --- */
        :root {
            --bg-body: #f4f7fe;
            --surface: #ffffff;
            --text-main: #2b3674;
            --text-muted: #a3aed1;
            --border: #e2e8f0;
            --sidebar-w: 300px;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        [data-theme="dark"] {
            --bg-body: #070b19;
            --surface: #0e152e;
            --text-main: #f0f2f8;
            --text-muted: #7483a8;
            --border: #1a2342;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg-body); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; transition: var(--transition); }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        /* --- WELCOME MODAL --- */
        .welcome-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(20px); z-index: 9999; display: flex; align-items: center; justify-content: center; transition: opacity 0.6s ease; }
        .welcome-modal.hidden { opacity: 0; pointer-events: none; }
        .welcome-content { background: var(--surface); padding: 40px 30px; border-radius: 30px; text-align: center; max-width: 90%; width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); animation: popIn 0.6s ease; border: 1px solid var(--border); }
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.9) translateY(20px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
        .heart-icon { font-size: 4.5rem; color: #ff4b72; animation: heartbeat 1.5s infinite; margin-bottom: 15px; }
        @keyframes heartbeat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
        .btn-enter { background: #111; color: white; border: none; padding: 15px 30px; border-radius: 50px; font-size: 1.1rem; font-weight: 600; cursor: pointer; width: 100%; transition: transform 0.2s; }
        .btn-enter:active { transform: scale(0.95); }

        /* --- SIDEBAR --- */
        .sidebar { width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 20; transition: transform 0.3s ease; }
        .sidebar-header { padding: 20px; background: #111; color: white; display: flex; justify-content: space-between; align-items: center; }
        .brand { font-size: 1.3rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .theme-toggle, .menu-toggle { background: transparent; border: none; color: white; font-size: 1.5rem; cursor: pointer; transition: transform 0.3s; }
        .theme-toggle:active { transform: rotate(45deg); }

        .sidebar-tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--bg-body); }
        .sidebar-tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; font-size: 0.85rem; font-weight: 500; transition: var(--transition); border-bottom: 2px solid transparent; color: var(--text-muted); }
        .sidebar-tab.active { border-bottom-color: #111; color: var(--text-main); background: var(--surface); }

        .btn-new { background: #111; color: white; border: none; padding: 12px; border-radius: 12px; width: calc(100% - 30px); margin: 15px auto; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: transform 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .btn-new:active { transform: scale(0.95); }

        .note-list { flex: 1; overflow-y: auto; padding: 0 15px 15px 15px; display: none; }
        .note-list.active { display: block; }
        .note-item { padding: 15px; margin-bottom: 10px; border-radius: 12px; cursor: pointer; background: var(--bg-body); transition: var(--transition); border: 1px solid transparent; position: relative; }
        .note-item.active { background: var(--surface); border-left: 4px solid #111; border-color: var(--border); box-shadow: var(--shadow); }
        .note-title-list { font-weight: 600; font-size: 0.95rem; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; justify-content: space-between; align-items: center; color: var(--text-main); }
        .pinned-icon { color: #111; font-size: 1.1rem; }

        .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 15; opacity: 0; pointer-events: none; transition: opacity 0.3s; backdrop-filter: blur(2px); }
        .sidebar-overlay.show { opacity: 1; pointer-events: auto; }

        /* --- MAIN CONTENT --- */
        .main-content { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; }

        .toolbar { padding: 10px 15px; background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; z-index: 10; overflow-x: auto; white-space: nowrap; transition: var(--transition); }
        [data-theme="dark"] .toolbar { background: rgba(14, 21, 46, 0.85); }
        .toolbar::-webkit-scrollbar { display: none; }
        .tool-group { display: flex; align-items: center; gap: 2px; background: var(--surface); padding: 4px 6px; border-radius: 8px; border: 1px solid var(--border); }
        .tool-btn { background: transparent; border: none; width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-main); font-size: 1.1rem; transition: background 0.2s, transform 0.1s; }
        .tool-btn:active { transform: scale(0.85); background: var(--border); }
        .tool-select { border: none; background: transparent; color: var(--text-main); outline: none; padding: 2px; font-size: 0.85rem; font-weight: 500; cursor: pointer; }
        .color-picker-wrapper { position: relative; display: flex; align-items: center; justify-content: center; width: 28px; height: 28px; overflow: hidden; border-radius: 5px; cursor: pointer; border: 1px solid var(--border); }
        .color-picker-wrapper input[type="color"] { position: absolute; top: -10px; left: -10px; width: 50px; height: 50px; cursor: pointer; padding: 0; border: none; }

        /* --- EDITOR Y DIARIO --- */
        .editor-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; justify-content: center; transition: background 0.5s; position: relative; }
        .editor-wrapper { width: 100%; max-width: 800px; padding: 30px; border-radius: 20px; box-shadow: var(--shadow); min-height: calc(100vh - 40px); background: var(--surface); transition: var(--transition); position: relative; }
        .title-input { width: 100%; border: none; outline: none; font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 20px; background: transparent; line-height: 1.2; transition: color 0.3s; padding: 5px 10px; border-radius: 8px; }
        .editor-area { min-height: 50vh; outline: none; font-size: 1rem; line-height: 1.6; color: var(--text-main); transition: color 0.3s; padding-bottom: 150px; word-wrap: break-word; overflow-wrap: break-word; word-break: break-word; hyphens: auto; }
        .editor-area img, .editor-area video { border-radius: 12px; cursor: pointer; max-width: 100%; height: auto; transition: all 0.2s; }
        .editor-area img.selected-img, .editor-area video.selected-img { box-shadow: 0 0 0 4px #111; }

        /* --- MODO DIARIO (CUADERNO) --- */
        .diary-mode .editor-wrapper {
            all: initial; /* Reinicia estilos del wrapper */
            display: flex;
            flex-direction: column;
            align-items: center;
            background: transparent !important;
            box-shadow: none !important;
            padding: 0 !important;
            width: 100% !important;
            height: 100% !important;
            max-width: 100% !important;
        }
        .diary-mode .title-input { display: none !important; }
        .diary-mode .editor-area { display: none !important; }

        .diary-notebook {
            position: relative;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 3/4;
            background-color: #fdf5e6;
            background-image: repeating-linear-gradient(transparent, transparent 31px, #d8d0c1 31px, #d8d0c1 32px);
            border: 1px solid #d8d0c1;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            border-radius: 4px;
            font-family: 'Caveat', cursive;
            font-size: 1.2rem;
            line-height: 2.1rem;
            color: #3d3122;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
        }
        .diary-notebook .page-container {
            display: flex;
            flex-wrap: nowrap;
            flex: 1;
            width: 100%;
            transition: transform 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
            will-change: transform;
        }
        .diary-notebook .page {
            flex: 0 0 100%;
            height: 100%;
            padding: 40px 50px;
            overflow-y: auto;
            outline: none;
            word-wrap: break-word;
            overflow-wrap: break-word;
            word-break: break-word;
            hyphens: auto;
            font-family: 'Caveat', cursive;
            font-size: 1.2rem;
            line-height: 2.1rem;
            color: #3d3122;
            background: transparent;
        }
        .diary-notebook .page:focus { outline: none; }
        .diary-nav {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 10;
        }
        .diary-nav button {
            background: rgba(255,255,255,0.9);
            border: 1px solid #d8d0c1;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            font-size: 0.85rem;
            font-weight: 600;
            color: #3d3122;
        }
        .diary-nav button:hover { background: #fff; transform: translateY(-2px); }
        .diary-tools {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 6px;
            z-index: 10;
            flex-wrap: wrap;
        }
        .diary-tools button {
            background: rgba(255,255,255,0.9);
            border: 1px solid #d8d0c1;
            padding: 4px 10px;
            border-radius: 15px;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.75rem;
            color: #3d3122;
        }
        .diary-tools button:hover { background: #fff; }

        .diary-grid {
            border-collapse: collapse;
            width: 100%;
            margin: 15px 0;
            font-family: 'Caveat', cursive;
            font-size: 1rem;
            line-height: 1.8rem;
        }
        .diary-grid td, .diary-grid th {
            border: 1px solid #b0a090;
            padding: 6px;
            min-width: 30px;
            height: 28px;
            text-align: center;
            background: rgba(253, 245, 230, 0.3);
            word-wrap: break-word;
        }
        .diary-grid th { background: rgba(200, 190, 180, 0.2); font-weight: 700; }

        /* --- BARRA FLOTANTE (ARRIBA) --- */
        .floating-text-menu {
            position: absolute; display: none; background: #111; color: white; border-radius: 30px;
            padding: 4px 8px; box-shadow: 0 8px 30px rgba(0,0,0,0.3); z-index: 1000;
            align-items: center; gap: 3px; transition: opacity 0.2s ease, transform 0.2s ease;
            backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1);
            white-space: nowrap; overflow-x: auto; max-width: 90vw;
            transform-origin: top center;
            scrollbar-width: none;
        }
        .floating-text-menu::-webkit-scrollbar { display: none; }
        .floating-text-menu::after {
            content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%);
            border-width: 6px 6px 0; border-style: solid; border-color: #111 transparent transparent transparent;
        }

        .ft-btn { background: transparent; border: none; color: white; width: 24px; height: 24px; border-radius: 50%; font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.1s; flex-shrink: 0; }
        .ft-btn:active { transform: scale(0.85); background: rgba(255,255,255,0.2); }
        .ft-btn-wide { width: 32px; height: 32px; font-size: 1rem; }
        .ft-divider { width: 1px; height: 14px; background: rgba(255,255,255,0.2); margin: 0 2px; flex-shrink: 0; }
        .ft-select { background: none; color: white; border: none; font-size: 0.7rem; cursor: pointer; margin: 0 1px; flex-shrink: 0; }
        .ft-select option { background: #111; }
        .ft-color-wrapper { position: relative; width: 18px; height: 18px; overflow: hidden; border-radius: 50%; cursor: pointer; border: 1px solid rgba(255,255,255,0.3); flex-shrink: 0; }
        .ft-color-wrapper input[type="color"] { position: absolute; top: -6px; left: -6px; width: 30px; height: 30px; border: none; padding: 0; cursor: pointer; }

        /* --- IMÁGENES Y MEDIA --- */
        .image-toolbar {
            position: fixed; opacity: 0; pointer-events: none;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            padding: 8px 12px; border-radius: 30px; display: flex; gap: 6px; align-items: center;
            transition: opacity 0.2s; z-index: 1001; white-space: nowrap;
            box-shadow: 0 8px 25px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.15);
            max-width: calc(100vw - 20px); overflow-x: auto;
        }
        .image-toolbar.show { opacity: 1; pointer-events: auto; }
        .img-btn { background: none; border: none; color: white; font-size: 1.2rem; cursor: pointer; transition: transform 0.1s; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .img-btn:active { transform: scale(0.85); background: rgba(255,255,255,0.15); }
        .img-slider { width: 50px; accent-color: #fff; flex-shrink: 0; }
        .img-slider-label { color: rgba(255,255,255,0.8); font-size: 0.6rem; font-weight: 500; flex-shrink: 0; }

        /* --- TEMAS --- */
        .theme-sakura { background: linear-gradient(to bottom right, #ffe1e8, #ffb3c6) !important; color: #5c1a2d; }
        .theme-papel { background: #fdf5e6 !important; color: #3d3122; background-image: repeating-linear-gradient(transparent, transparent 31px, #d8d0c1 31px, #d8d0c1 32px); }
        .theme-amor { background: radial-gradient(circle, #fcfcfc 0%, #e6e6e6 100%) !important; color: #111; }
        .theme-noche { background: linear-gradient(135deg, #1a1a2e, #16213e) !important; color: #e1e1e6; }
        .theme-fuego { background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('assets/themes/fuego.jpg'); background-size: cover; background-position: center; color: #fff !important; }
        .theme-tortugas { background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('assets/themes/tortugas.jpg'); background-size: cover; background-position: center; color: #fff !important; }
        .theme-neon { background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('assets/themes/perfil.jpg'); background-size: cover; background-position: center; color: #fff !important; }
        .theme-snow { background: linear-gradient(135deg, #1a1a2e, #2a2a4e) !important; position: relative; color: #e0e0e0 !important; }
        .theme-snow::before { content: ''; position: absolute; inset: 0; background-image: radial-gradient(white 1px, transparent 1px); background-size: 30px 30px; opacity: 0.2; pointer-events: none; animation: snow 8s linear infinite; }
        @keyframes snow { 0% { background-position: 0 0; } 100% { background-position: 0 100px; } }
        .theme-bubbles { background: linear-gradient(135deg, #0f2027, #2c5364) !important; color: #d0e0e0 !important; }
        .theme-bubbles::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 20% 80%, rgba(255,255,255,0.1) 2px, transparent 2px); background-size: 40px 40px; pointer-events: none; animation: bubbles 6s ease-in-out infinite; }
        @keyframes bubbles { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        .theme-waves { background: linear-gradient(135deg, #1a1a2e, #2c3e50) !important; color: #d8d8e0 !important; }
        .theme-waves::before { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,255,255,0.03) 40px, rgba(255,255,255,0.03) 80px); pointer-events: none; animation: waves 10s linear infinite; }
        @keyframes waves { 0% { transform: translateX(0); } 100% { transform: translateX(-80px); } }
        .theme-sparkle { background: #1a1a2e !important; color: #e0e0f0 !important; }
        .theme-sparkle::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.4) 0, transparent 20%), radial-gradient(circle at 70% 60%, rgba(255,255,255,0.2) 0, transparent 30%), radial-gradient(circle at 50% 90%, rgba(255,255,255,0.3) 0, transparent 25%); pointer-events: none; animation: sparkle 4s ease-in-out infinite; }
        @keyframes sparkle { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
        .theme-aurora { background: linear-gradient(135deg, #0d0d1a, #1a1a3e, #0d1a2e) !important; background-size: 400% 400%; animation: aurora 8s ease-in-out infinite; color: #d0d0e8 !important; }
        @keyframes aurora { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .theme-palette { display: none; position: absolute; top: 60px; right: 20px; background: var(--surface); padding: 10px; border-radius: 12px; box-shadow: var(--shadow); border: 1px solid var(--border); z-index: 50; gap: 6px; flex-wrap: wrap; }
        .theme-palette.show { display: flex; animation: insertAnim 0.3s forwards; }
        .color-dot { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.2s; }
        .color-dot:hover { transform: scale(1.1); }

        /* --- ANIMACIONES DE TEXTO (PRESERVANDO FUENTES) --- */
        .anim-float { display: inline-block; animation: floatText 3s ease-in-out infinite; }
        @keyframes floatText { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .anim-heart { display: inline-block; animation: heartbeat 1.5s ease-in-out infinite; color: #ff4757; }
        .anim-rainbow { background: linear-gradient(45deg, #ff6b6b, #feca57, #48dbfb, #1dd1a1, #ff9ff3); background-size: 300% 300%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: rainbowMove 4s ease infinite; font-weight: bold; }
        @keyframes rainbowMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .anim-typewriter { overflow: hidden; white-space: nowrap; border-right: 2px solid var(--text-main); animation: typewriter 2s steps(30) 1s both, blink 0.8s step-end infinite; display: inline-block; }
        @keyframes typewriter { from { width: 0; } to { width: 100%; } }
        @keyframes blink { 0%, 100% { border-color: transparent; } 50% { border-color: var(--text-main); } }
        .anim-shake { display: inline-block; animation: shake 0.5s ease-in-out infinite; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
        .anim-spin { display: inline-block; animation: spin 2s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .anim-fade-in { display: inline-block; animation: fadeIn 2s ease-in forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .anim-bounce { display: inline-block; animation: bounce 1s ease infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-18px); } }
        .anim-pulse { display: inline-block; animation: pulse 1.5s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
        .anim-glow { display: inline-block; animation: glow 2s ease-in-out infinite; text-shadow: 0 0 5px rgba(255,255,255,0.5); }
        @keyframes glow { 0%, 100% { text-shadow: 0 0 5px rgba(255,255,255,0.5); } 50% { text-shadow: 0 0 20px rgba(255,255,255,0.8); } }
        .anim-wiggle { display: inline-block; animation: wiggle 1s ease-in-out infinite; }
        @keyframes wiggle { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-5deg); } 75% { transform: rotate(5deg); } }

        /* --- RECUADRO PARA PARÉNTESIS --- */
        .parenthesis-box {
            display: inline-block;
            border: 1px solid #aaa;
            border-radius: 12px;
            padding: 2px 8px;
            background: rgba(0,0,0,0.03);
            transition: var(--transition);
            font-family: inherit;
            font-size: inherit;
        }

        /* --- CHECKLIST ESTILO WORD --- */
        .task-list-container { margin: 15px 0; }
        .task-list { list-style: none; padding: 0; margin: 0; }
        .task-list li {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 0;
            border-bottom: 1px solid rgba(0,0,0,0.04);
            transition: var(--transition);
            font-size: 1rem;
        }
        .task-list li input[type="checkbox"] {
            appearance: none; -webkit-appearance: none;
            width: 18px; height: 18px;
            border: 2px solid var(--border);
            border-radius: 50%;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
            flex-shrink: 0;
            background: var(--surface);
        }
        .task-list li input[type="checkbox"]:checked {
            background: #111;
            border-color: #111;
        }
        .task-list li input[type="checkbox"]:checked::after {
            content: '✓';
            color: white;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 0.7rem;
            font-weight: bold;
        }
        .task-list li .task-text {
            flex: 1; padding: 2px 5px; border-radius: 4px; outline: none;
            cursor: text; word-break: break-word;
        }
        .task-list li .task-text:focus { background: rgba(0,0,0,0.03); }
        .task-list li.done .task-text {
            text-decoration: line-through;
            opacity: 0.5;
        }
        .task-list li .delete-task {
            background: transparent; border: none;
            color: #ff4757; cursor: pointer;
            font-size: 0.8rem; padding: 2px 4px;
            border-radius: 4px;
            transition: background 0.2s;
            flex-shrink: 0;
        }

    <script>
        // --- SEGURIDAD Y UTILIDADES ---
        function safeExec(fn) { try { fn(); } catch (e) { console.warn(e); } }
        function safeGetStorage(key, def) { try { const v = localStorage.getItem(key); return v !== null ? JSON.parse(v) : def; } catch (e) { return def; } }
        function safeSetStorage(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) {} }

        // --- DATOS ---
        const cartasAmor = [
            "Hola, Gabriela preciosa. Solo quería tomarme un momento para decirte lo increíblemente afortunado que me siento de tenerte en mi vida. 🖤",
            "Mi amor, cada pequeño detalle tuyo se ha vuelto esencial para mí. Eres la estrella que guía mis pasos. ✨",
            "Sé que a veces los días se vuelven grises, pero aquí estoy yo, incondicional, para secar tus lágrimas. 🥰",
            "¿Sabes qué es lo que más admiro de ti? Tu corazón inmenso, tu capacidad de amar sin medida. 💕",
            "Gabi, cada vez que te veo sonreír, el mundo se detiene y solo existes tú.",
            "Si pudiera pedir un deseo cada noche, sería despertar a tu lado cada mañana, Gabi.",
            "Gabi, eres la musa de mis sueños y la estrella que guía mi camino.",
            "Tu risa, Gabi, es la melodía más dulce que mis oídos han escuchado.",
            "Gabi, contigo aprendí que el amor no se busca, se encuentra. Y yo te encontré a ti.",
            "Eres mi lugar seguro, Gabi. Donde todo está bien.",
            "Gabi, tu amor es el faro que ilumina mi oscuridad.",
            "Cada latido de mi corazón lleva tu nombre, Gabi.",
            "Gabi, no hay verso que pueda describir lo que siento por ti.",
            "Eres la parte más bonita de mi vida, Gabi.",
            "Gabi, contigo el tiempo vuela y cada segundo es eterno.",
            "Si el amor tuviera un nombre, Gabi, sería el tuyo.",
            "Gabi, eres mi razón para sonreír cada día.",
            "A tu lado, Gabi, todo es posible.",
            "Gabi, eres el sueño que nunca quiero dejar de soñar."
        ];

        let notes = safeGetStorage('nova_romance', []);
        let currentNoteId = null;
        let saveTimeout;
        let selectedMedia = null;
        let savedRange = null;
        let pressTimer;
        let isLongPressing = false;
        let contextNoteId = null;
        let pendingMediaType = null;
        let currentTab = 'notes';

        // Referencias DOM
        const titleEl = document.getElementById('noteTitle');
        const editorEl = document.getElementById('noteEditor');
        const listNotes = document.getElementById('noteList-notes');
        const listDiaries = document.getElementById('noteList-diaries');
        const wrapperEl = document.getElementById('editorWrapper');
        const imgToolbar = document.getElementById('imageToolbar');
        const sheet = document.getElementById('bottomSheet');
        const overlaySheet = document.getElementById('sheetOverlay');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        const floatMenu = document.getElementById('floatingTextMenu');
        const insertMenu = document.getElementById('insertMenu');
        const editorContainer = document.getElementById('editorContainer');
        const emojiPanel = document.getElementById('emojiPanel');
        const imgSizeSlider = document.getElementById('imgSizeSlider');
        const imgMarginHSlider = document.getElementById('imgMarginHSlider');
        const imgMarginVSlider = document.getElementById('imgMarginVSlider');
        const urlModal = document.getElementById('urlModal');
        const urlInput = document.getElementById('urlInput');
        const urlModalTitle = document.getElementById('urlModalTitle');

        const emojis = ['❤️', '😊', '🌟', '🎉', '🔥', '😢', '😂', '💕', '✨', '🥰', '😍', '💔', '👍', '🙏', '💪', '🤗', '🎂', '💋', '🌈', '🦋'];

        // --- INICIO ---
        function initApp() {
            try {
                if (safeGetStorage('nova_global_theme', 'light') === 'dark') toggleGlobalTheme(true);
                // Carta mágica diaria
                const randomLetter = cartasAmor[Math.floor(Math.random() * cartasAmor.length)];
                const formattedLetter = `<div style="font-family: Caveat, cursive; font-size: 1.65rem; line-height: 1.7; text-align: center; padding: 20px 10px;">${randomLetter}<br><br><span style="color: #000; font-size: 2.5rem; animation: heartbeat 1.5s infinite; display: inline-block;">🖤</span></div>`;
                let magicNoteIndex = notes.findIndex(n => n.id === 'nota_magica_diaria');
                if (magicNoteIndex === -1) {
                    notes.unshift({ id: 'nota_magica_diaria', title: '💌 Para ti, hoy...', content: formattedLetter, theme: 'theme-amor', pinned: true, diaryMode: false, timestamp: Date.now() + 9999999 });
                } else {
                    notes[magicNoteIndex].content = formattedLetter;
                    notes[magicNoteIndex].timestamp = Date.now() + 9999999;
                }
                saveData();
                renderList();
                openNote('nota_magica_diaria', false);
                checkMobileMenu();

                editorEl.addEventListener('paste', handlePaste);
                emojis.forEach(emoji => {
                    const btn = document.createElement('button');
                    btn.className = 'emoji-btn';
                    btn.textContent = emoji;
                    btn.addEventListener('click', () => { insertEmojiAtCursor(emoji); hideInsertMenu(); });
                    emojiPanel.appendChild(btn);
                });

                // Eventos para selección de medios
                editorEl.addEventListener('pointerdown', handlePointerDown);
                editorEl.addEventListener('pointerup', handlePointerUp);
                editorEl.addEventListener('pointerleave', handlePointerLeave);
                editorEl.addEventListener('contextmenu', e => { e.preventDefault(); return false; });
                editorContainer.addEventListener('scroll', () => { if (selectedMedia) updateMediaToolbarPosition(selectedMedia); });
                window.addEventListener('resize', () => { if (selectedMedia) updateMediaToolbarPosition(selectedMedia); });
            } catch (e) { console.error(e); document.getElementById('welcomeModal').classList.add('hidden'); }
        }

        function closeWelcome() { document.getElementById('welcomeModal').classList.add('hidden'); }

        // --- FUNCIONES DE SELECCIÓN Y RANGO ---
        function restoreSelection() {
            if (savedRange) {
                try {
                    const sel = window.getSelection();
                    sel.removeAllRanges();
                    sel.addRange(savedRange);
                } catch (e) {}
            }
        }

        function handlePointerDown(e) {
            const target = e.target.closest('img, video');
            if (!target || !editorEl.contains(target)) return;
            pointerDownTime = Date.now();
            pointerDownTarget = target;
            isMediaLongPress = false;
        }
        function handlePointerUp(e) {
            if (!pointerDownTarget) return;
            const duration = Date.now() - pointerDownTime;
            const target = pointerDownTarget;
            pointerDownTarget = null;
            pointerDownTime = 0;
            if (duration > 400) {
                e.preventDefault();
                isMediaLongPress = true;
                selectMediaElement(target);
                if (navigator.vibrate) navigator.vibrate(50);
            } else {
                isMediaLongPress = false;
                editorEl.focus();
            }
        }
        function handlePointerLeave(e) { pointerDownTarget = null; pointerDownTime = 0; }

        editorEl.addEventListener('click', (e) => {
            const target = e.target.closest('img, video');
            if (target && editorEl.contains(target)) {
                if (!isMediaLongPress) selectMediaElement(target);
                isMediaLongPress = false;
                e.stopPropagation();
            } else {
                deselectMedia();
                editorEl.focus();
            }
        });

        function insertHtmlAtCursor(html) {
            const sel = window.getSelection();
            if (sel.rangeCount) {
                const range = sel.getRangeAt(0);
                range.deleteContents();
                const marker = document.createElement('span');
                marker.id = '__cursor_marker__';
                marker.style.display = 'none';
                range.insertNode(marker);
                const fragment = range.createContextualFragment(html);
                marker.parentNode.insertBefore(fragment, marker);
                const newRange = document.createRange();
                newRange.setStartAfter(marker);
                newRange.collapse(true);
                sel.removeAllRanges();
                sel.addRange(newRange);
                marker.remove();
                editorEl.focus();
                triggerSave();
            } else {
                editorEl.focus();
                document.execCommand('insertHTML', false, html);
                triggerSave();
                focusEditorAtEnd();
            }
        }

        function focusEditorAtEnd() {
            editorEl.focus();
            const range = document.createRange();
            range.selectNodeContents(editorEl);
            range.collapse(false);
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
            editorEl.click();
        }

        function placeCursorAfterElement(element) {
            if (!element || !editorEl.contains(element)) return;
            const range = document.createRange();
            range.setStartAfter(element);
            range.collapse(true);
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);

        function insertEmojiAtCursor(emoji) {
            const sel = window.getSelection();
            if (sel.rangeCount) {
                const range = sel.getRangeAt(0);
                range.deleteContents();
                const textNode = document.createTextNode(emoji);
                range.insertNode(textNode);
                range.setStartAfter(textNode);
                range.collapse(true);
                sel.removeAllRanges();
                sel.addRange(range);
            } else { editorEl.focus(); document.execCommand('insertText', false, emoji); }
            triggerSave();
            editorEl.focus();
        }

        // --- FORMATO DE DOCUMENTO ---
        function formatDoc(command, value = null) {
            try {
                const active = document.activeElement;
                // Título
                if (active === titleEl) {
                    if (command === 'foreColor') titleEl.style.color = value;
                    else if (command === 'hiliteColor') titleEl.style.backgroundColor = value;
                    else if (command === 'fontName') titleEl.style.fontFamily = value;
                    else if (command === 'fontSize') {
                        const sizes = {1: '1.2rem', 2: '1.5rem', 3: '2rem', 4: '2.4rem', 5: '3rem', 6: '3.8rem'};
                        titleEl.style.fontSize = sizes[parseInt(value)] || '2rem';
                    }
                    return;
                }
                // Editor normal o diario
                editorEl.focus();
                document.execCommand('styleWithCSS', true, null);
                // Preservar la fuente actual aplicando el formato sin cambiar la fuente
                const currentFont = document.queryCommandValue('fontName');
                if (command === 'bold' || command === 'italic' || command === 'underline') {
                    document.execCommand(command, false, null);
                    // Reaplicar la fuente si se perdió
                    if (currentFont && currentFont !== 'Poppins') {
                        document.execCommand('fontName', false, currentFont);
                    }
                } else if (command === 'fontName') {
                    document.execCommand('fontName', false, value);
                } else {
                    document.execCommand(command, false, value);
                }
                triggerSave();
            } catch (e) { console.warn(e); }
        }

        function execFloating(command, value = null) {
            restoreSelection();
            try {
                // Aplicar formato preservando fuente
                const currentFont = document.queryCommandValue('fontName');
                if (command === 'bold' || command === 'italic' || command === 'underline') {
                    document.execCommand(command, false, null);
                    if (currentFont && currentFont !== 'Poppins') {
                        document.execCommand('fontName', false, currentFont);
                    }
                } else if (command === 'fontName') {
                    document.execCommand('fontName', false, value);
                } else {
                    document.execCommand(command, false, value);
                }
                triggerSave();
                editorEl.focus();
            } catch (e) {}
        }

        // --- PASTE ---
        function handlePaste(e) {
            const items = (e.clipboardData || window.clipboardData).items;
            for (let i = 0; i < items.length; i++) {
                if (items[i].type.indexOf('image') !== -1) {
                    e.preventDefault();
                    const blob = items[i].getAsFile();
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        const img = document.createElement('img');
                        img.src = event.target.result;
                        img.style.width = '80%';
                        img.style.display = 'block';
                        img.style.margin = '15px auto';
                        const sel = window.getSelection();
                        if (sel.rangeCount) {
                            const range = sel.getRangeAt(0);
                            range.deleteContents();
                            range.insertNode(img);
                            range.setStartAfter(img);
                            range.collapse(true);
                            sel.removeAllRanges();
                            sel.addRange(range);
                        } else {
                            editorEl.appendChild(img);
                            focusEditorAtEnd();
                        }
                        triggerSave();
                        editorEl.focus();
                    };
                    reader.readAsDataURL(blob);
                    break;
                }
            }
        }

            const rect = mediaEl.getBoundingClientRect();
            const toolbarW = imgToolbar.offsetWidth;
            const toolbarH = imgToolbar.offsetHeight;
            let top = rect.bottom + 12;
            let left = rect.left + rect.width / 2 - toolbarW / 2;
            if (top + toolbarH > window.innerHeight - 20) top = rect.top - toolbarH - 12;
            if (left < 10) left = 10;
            if (left + toolbarW > window.innerWidth - 10) left = window.innerWidth - toolbarW - 10;

            imgToolbar.style.left = left + 'px';

        function resizeMedia(val) { if (selectedMedia) { selectedMedia.style.width = val + '%'; updateMediaToolbarPosition(selectedMedia); triggerSave(); } deselectMedia(); focusEditorAtEnd(); }
        function changeMargin(type, val) {

            else { selectedMedia.style.marginTop = val + 'px'; selectedMedia.style.marginBottom = val + 'px'; }

        function alignMedia(position) {

            if (position === 'left') { selectedMedia.style.display = 'inline'; selectedMedia.style.float = 'left'; selectedMedia.style.margin = vMargin + 'px ' + hMargin + 'px'; }
            else if (position === 'right') { selectedMedia.style.display = 'inline'; selectedMedia.style.float = 'right'; selectedMedia.style.margin = vMargin + 'px ' + hMargin + 'px'; }
            else { selectedMedia.style.display = 'block'; selectedMedia.style.float = 'none'; selectedMedia.style.margin = vMargin + 'px auto'; }

        function copyMedia() { if (selectedMedia) { const clone = selectedMedia.cloneNode(true); const range = document.createRange(); range.selectNode(clone); window.getSelection().removeAllRanges(); window.getSelection().addRange(range); try { document.execCommand('copy'); } catch (e) {} window.getSelection().removeAllRanges(); deselectMedia(); focusEditorAtEnd(); } }
        function duplicateMedia() {
            if (!selectedMedia) return;
            const clone = selectedMedia.cloneNode(true);
            clone.classList.remove('selected-img');

        function insertMedia(event) {
            const file = event.target.files[0];
            if (file) {

                    let mediaHtml = '';

                    else mediaHtml = `<img src="${e.target.result}" style="width: 80%; display: block; margin: 15px auto; clear: both;">`;

        function insertMediaFromUrl(type, url) {
            let mediaHtml = '';
            if (type === 'image') {
                mediaHtml = `<img src="${url}" style="width: 80%; display: block; margin: 15px auto; clear: both;" onerror="this.style.display='none'">`;
            } else if (type === 'video') {
                const ytMatch = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|v\/))([\w-]{11})/);
                const vimeoMatch = url.match(/vimeo\.com\/(\d+)/);
                if (ytMatch) mediaHtml = `<div style="position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; max-width: 100%;"><iframe src="https://www.youtube.com/embed/${ytMatch[1]}" frameborder="0" allowfullscreen style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;"></iframe></div>`;
                else if (vimeoMatch) mediaHtml = `<div style="position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; max-width: 100%;"><iframe src="https://player.vimeo.com/video/${vimeoMatch[1]}" frameborder="0" allowfullscreen style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;"></iframe></div>`;

        document.addEventListener('selectionchange', () => {

            if (selectedMedia) { floatMenu.style.display = 'none'; savedRange = null; return; }

            // Verificar si la selección está en el título, el editor o en una página del diario
            const isInTitle = titleEl.contains(selection.anchorNode);

            const isInDiaryPage = selection.anchorNode ? selection.anchorNode.closest && selection.anchorNode.closest('.page') : false;

            if (selection.rangeCount > 0 && !selection.isCollapsed && (isInEditor || isInTitle || isInDiaryPage)) {

                    pages.forEach(page => {
                        page.addEventListener('input', triggerSave);
                        page.addEventListener('blur', triggerSave);
                        // Manejar Enter para mantener formato
                        page.addEventListener('keydown', function(e) {
                            if (e.key === 'Enter') {
                                // Insertar un salto de línea que mantiene el estilo
                                document.execCommand('insertLineBreak');
                                e.preventDefault();
                            }
                        });
                    });
                }

                // Cargar contenido desde la nota
                const note = notes.find(n => n.id === currentNoteId);
                if (note) {

                        if (Array.isArray(pagesData) && pagesData.length > 0) {

                                        }
                                    });
                                });

                                container.style.transform = 'translateX(0)';
                            }
                        }

                            page0.innerHTML = note.content;

        }

        function saveDiaryPages() {
            const container = document.getElementById('pageContainer');
            if (!container) return;
            const pages = container.querySelectorAll('.page');
            const data = Array.from(pages).map(page => page.innerHTML);
            const noteIndex = notes.findIndex(n => n.id === currentNoteId);
            if (noteIndex !== -1) {
                notes[noteIndex].content = JSON.stringify(data);
                saveData();
            }
        }

        function insertGrid() {
            const container = document.getElementById('pageContainer');
            if (!container) return;
            const currentPage = container.children[currentPageIndex];
            if (!currentPage) return;
            
            const gridHtml = `
                <table class="diary-grid">
                    <tr><td></td><td></td><td></td><td></td><td></td></tr>
                    <tr><td></td><td></td><td></td><td></td><td></td></tr>
                    <tr><td></td><td></td><td></td><td></td><td></td></tr>
                    <tr><td></td><td></td><td></td><td></td><td></td></tr>
                    <tr><td></td><td></td><td></td><td></td><td></td></tr>
                </table>
            `;
            // Insertar en la posición del cursor o al final
            const sel = window.getSelection();
            if (currentPage.contains(sel.anchorNode)) {
                const range = sel.getRangeAt(0);
                range.deleteContents();
                const fragment = range.createContextualFragment(gridHtml);
                range.insertNode(fragment);
                range.setStartAfter(fragment);
                range.collapse(true);
                sel.removeAllRanges();
                sel.addRange(range);
            } else {
                currentPage.insertAdjacentHTML('beforeend', gridHtml);
                currentPage.scrollTop = currentPage.scrollHeight;
            }
            setTimeout(() => {
                currentPage.querySelectorAll('.diary-grid td').forEach(td => {
                    td.setAttribute('contenteditable', 'true');
                    td.style.cursor = 'text';
                });
            }, 50);
            saveDiaryPages();
        }

        // --- PESTAÑAS DE LA BARRA LATERAL ---
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.sidebar-tab').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            document.getElementById('notes-actions').style.display = tab === 'notes' ? 'block' : 'none';
            document.getElementById('diaries-actions').style.display = tab === 'diaries' ? 'block' : 'none';
            document.getElementById('noteList-notes').classList.toggle('active', tab === 'notes');
            document.getElementById('noteList-diaries').classList.toggle('active', tab === 'diaries');
        }

        // --- RENDERIZADO DE LISTA ---
        function renderList() {
            listNotes.innerHTML = '';
            listDiaries.innerHTML = '';
            let sortedNotes = notes.sort((a, b) => {
                if (a.pinned === b.pinned) return b.timestamp - a.timestamp;
                return a.pinned ? -1 : 1;
            });
            sortedNotes.forEach(note => {
                const div = document.createElement('div');
                div.className = `note-item ${note.id === currentNoteId ? 'active' : ''}`;
                div.id = `note-${note.id}`;
                const startPress = (e) => {
                    isLongPressing = false;
                    pressTimer = setTimeout(() => { isLongPressing = true; if (navigator.vibrate) navigator.vibrate(50); openContextMenu(note.id); }, 500);
                };
                const cancelPress = () => { clearTimeout(pressTimer); };
                div.addEventListener('touchstart', startPress, {passive: true});
                div.addEventListener('touchend', cancelPress);
                div.addEventListener('touchmove', cancelPress);
                div.addEventListener('mousedown', startPress);
                div.addEventListener('mouseup', cancelPress);
                div.addEventListener('mouseleave', cancelPress);
                div.addEventListener('click', (e) => {
                    cancelPress();
                    if (isLongPressing) { e.preventDefault(); isLongPressing = false; return; }
                    openNote(note.id);
                });
                div.addEventListener('contextmenu', (e) => { e.preventDefault(); openContextMenu(note.id); });
                const plainText = (note.content || '').replace(/<[^>]+>/g, '');
                const preview = plainText.substring(0, 35) + (plainText.length > 35 ? '...' : '');
                const pinHtml = note.pinned ? `<i class='bx bxs-pin pinned-icon'></i>` : ``;
                div.innerHTML = `<div class="note-title-list"><span style="overflow: hidden; text-overflow: ellipsis;">${note.title || 'Nueva nota'}</span>${pinHtml}</div><div style="font-size: 0.8rem; color: var(--text-muted);">${preview}</div>`;
                if (note.diaryMode) listDiaries.appendChild(div);
                else listNotes.appendChild(div);
            });
        }

        // --- MENÚ CONTEXTUAL (BOTTOM SHEET) ---
        function openContextMenu(id) {
            contextNoteId = id;
            const note = notes.find(n => n.id === id);
            document.getElementById('sheetTitle').innerText = `Opciones: ${note.title || 'Nota sin título'}`;
            const pinIcon = document.getElementById('sheetPinIcon');
            const pinText = document.getElementById('sheetPinText');
            if (note.pinned) { pinIcon.className = 'bx bx-pin'; pinText.innerText = 'Desfijar nota'; }
            else { pinIcon.className = 'bx bxs-pin'; pinText.innerText = 'Fijar arriba'; }
            sheet.classList.add('show');
            overlaySheet.classList.add('show');
        }
        function closeContextMenu() { sheet.classList.remove('show'); overlaySheet.classList.remove('show'); setTimeout(() => { contextNoteId = null; }, 300); }
        function actionPinNote() { const idx = notes.findIndex(n => n.id === contextNoteId); if (idx !== -1) { notes[idx].pinned = !notes[idx].pinned; saveData(); renderList(); } closeContextMenu(); }
        function actionDuplicateNote() {
            const original = notes.find(n => n.id === contextNoteId);
            if (original) {
                const copy = JSON.parse(JSON.stringify(original));
                copy.id = Date.now().toString();
                copy.title = `${original.title} (Copia)`;
                copy.timestamp = Date.now();
                copy.pinned = false;
                notes.push(copy);
                saveData(); renderList(); openNote(copy.id);
            }
            closeContextMenu();
        }
        function actionDeleteNote() {
            if (contextNoteId === 'nota_magica_diaria') { alert("¡Esta es mi carta diaria para ti! No puedes borrarla, amor. 🖤"); closeContextMenu(); return; }
            if (confirm('¿Estás segura de eliminarla, amor?')) {
                const idToDelete = contextNoteId;
                closeContextMenu();
                notes = notes.filter(n => n.id !== idToDelete);
                saveData();
                if (currentNoteId === idToDelete) {
                    if (notes.length > 0) openNote(notes[0].id);
                    else { currentNoteId = null; titleEl.value = ''; editorEl.innerHTML = ''; wrapperEl.className = 'editor-wrapper'; }
                }
                renderList();
            } else { closeContextMenu(); }
        }

        // --- ABRIR NOTA ---
        function openNote(id, autoCloseMenu = true) {
            currentNoteId = id;
            const note = notes.find(n => n.id === id);
            if (note) {
                titleEl.value = note.title || '';
                if (note.diaryMode) {
                    toggleDiaryMode(true);
                } else {
                    toggleDiaryMode(false);
                    editorEl.innerHTML = note.content || '';
                }
                wrapperEl.className = 'editor-wrapper';
                if (note.theme && note.theme !== 'default') wrapperEl.classList.add(note.theme);
            }
            deselectMedia();
            renderList();
            if (autoCloseMenu && window.innerWidth <= 768 && sidebar.classList.contains('open')) toggleSidebar();
        }

        // --- CREAR NOTA / DIARIO ---
        function createNewNote() {
            const newNote = { id: Date.now().toString(), title: '', content: '', theme: 'default', pinned: false, diaryMode: false, timestamp: Date.now() };
            notes.push(newNote);
            currentNoteId = newNote.id;
            saveData();
            openNote(newNote.id);
            titleEl.focus();
        }
        function createNewDiaryNote() {
            const newNote = { id: Date.now().toString(), title: '📓 Mi Diario', content: '[]', theme: 'default', pinned: false, diaryMode: true, timestamp: Date.now() };
            notes.push(newNote);
            currentNoteId = newNote.id;
            saveData();
            openNote(newNote.id);
        }

        // --- GUARDADO ---
        function triggerSave() {
            if (!currentNoteId || currentNoteId === 'nota_magica_diaria') return;
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                const noteIndex = notes.findIndex(n => n.id === currentNoteId);
                if (noteIndex !== -1) {
                    const note = notes[noteIndex];
                    note.title = titleEl.value;
                    if (note.diaryMode) {
                        saveDiaryPages();
                    } else {
                        note.content = editorEl.innerHTML;
                    }
                    note.timestamp = Date.now();
                    saveData();
                    renderList();
                }
            }, 500);
        }
        function saveData() { safeSetStorage('nova_romance', notes); }

        // --- TEMAS Y PALETA ---
        function toggleThemePalette() { document.getElementById('themePalette').classList.toggle('show'); }
        function setNoteTheme(themeClass) {
            wrapperEl.className = 'editor-wrapper';
            if (themeClass !== 'default') wrapperEl.classList.add(themeClass);
            const idx = notes.findIndex(n => n.id === currentNoteId);
            if (idx !== -1) { notes[idx].theme = themeClass; saveData(); }
            document.getElementById('themePalette').classList.remove('show');
        }

        // --- GLOBAL THEME ---
        function toggleGlobalTheme(forceDark = false) {
            const body = document.body;
            const icon = document.getElementById('themeIcon');
            if (forceDark || body.getAttribute('data-theme') !== 'dark') {
                body.setAttribute('data-theme', 'dark'); icon.className = 'bx bx-sun';
                safeSetStorage('nova_global_theme', 'dark');
            } else {
                body.removeAttribute('data-theme'); icon.className = 'bx bx-moon';
                safeSetStorage('nova_global_theme', 'light');
            }
        }

        // --- SIDEBAR ---
        function toggleSidebar() {
            sidebar.classList.toggle('open');
            sidebarOverlay.classList.toggle('show', sidebar.classList.contains('open'));
            checkMobileMenu();
        }
        function checkMobileMenu() {
            const closeBtn = document.getElementById('closeSidebarBtn');
            if (window.innerWidth <= 768) {
                closeBtn.style.display = sidebar.classList.contains('open') ? 'block' : 'none';
                if (!sidebar.classList.contains('open')) sidebarOverlay.classList.remove('show');
            } else { closeBtn.style.display = 'none'; sidebarOverlay.classList.remove('show'); }
        }
        window.addEventListener('resize', checkMobileMenu);

        // --- INSERCIÓN MENÚ ---
        function showInsertMenu(e) {
            floatMenu.style.display = 'none';
            const containerRect = editorContainer.getBoundingClientRect();
            const x = e.clientX - containerRect.left + editorContainer.scrollLeft;
            const y = e.clientY - containerRect.top + editorContainer.scrollTop;
            insertMenu.style.display = 'flex';
            insertMenu.style.visibility = 'hidden';
            requestAnimationFrame(() => {
                const menuWidth = insertMenu.offsetWidth;
                let left = x - menuWidth / 2;
                if (left < 0) left = 0;
                if (left + menuWidth > containerRect.width) left = containerRect.width - menuWidth;
                insertMenu.style.left = left + 'px';
                let topPos = y - 60;
                if (topPos < 10) topPos = 10;
                insertMenu.style.top = topPos + 'px';
                insertMenu.style.visibility = 'visible';
                insertMenu.style.transform = 'none';
            });
            editorEl.focus();
        }
        function hideInsertMenu() { insertMenu.style.display = 'none'; }
        document.addEventListener('click', function(e) {
            if (!insertMenu.contains(e.target) && e.target !== editorEl) hideInsertMenu();
            if (!imgToolbar.contains(e.target) && !editorEl.contains(e.target)) deselectMedia();
        });
        function insertMenuCommand(command, value) {
            try {
                if (command === 'fontName') { document.execCommand('styleWithCSS', true, null); document.execCommand('fontName', false, value); }
                else { document.execCommand(command, false, value); }
                editorEl.focus(); triggerSave();
            } catch (e) {}
        }

        // --- URL MODAL ---
        function confirmInsertUrl() {
            const url = urlInput.value.trim();
            if (!url) { alert('Por favor pega una URL válida.'); return; }
            closeUrlModal();
            insertMediaFromUrl(pendingMediaType, url);
        }

        // --- INICIALIZACIÓN ---
        initApp();

        // --- SOBRESCRITURA DE FUNCIONES PARA DIARIO ---
        const originalOpenNote = openNote;
        openNote = function(id, autoCloseMenu = true) {
            currentNoteId = id;
            const note = notes.find(n => n.id === id);
            if (note) {
                titleEl.value = note.title || '';
                if (note.diaryMode) {
                    toggleDiaryMode(true);
                } else {
                    toggleDiaryMode(false);
                    editorEl.innerHTML = note.content || '';
                }
                wrapperEl.className = 'editor-wrapper';
                if (note.theme && note.theme !== 'default') wrapperEl.classList.add(note.theme);
            }
            deselectMedia();
            renderList();
            if (autoCloseMenu && window.innerWidth <= 768 && sidebar.classList.contains('open')) toggleSidebar();
        };
    </script>
</body>
