<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nova Pro | Para Ti</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <style>
        :root {
            --bg-body: #f4f7fe;
            --surface: #ffffff;
            --primary: #FF4B72; 
            --text-main: #2b3674;
            --text-muted: #a3aed1;
            --border: #e2e8f0;
            --sidebar-w: 300px;
            --gradient: linear-gradient(135deg, #FF8CA1 0%, #FF4B72 100%);
            --shadow: 0 10px 30px rgba(255, 75, 114, 0.15);
            --transition: all 0.3s ease;
        }

        [data-theme="dark"] {
            --bg-body: #0b1437;
            --surface: #111c44;
            --primary: #FF708F;
            --text-main: #ffffff;
            --text-muted: #8f9bba;
            --border: #2b3674;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-body); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        /* --- PANTALLA DE BIENVENIDA --- */
        .welcome-modal {
            position: fixed; inset: 0; background: rgba(255,255,255,0.4); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            z-index: 9999; display: flex; align-items: center; justify-content: center; transition: opacity 0.6s ease;
        }
        [data-theme="dark"] .welcome-modal { background: rgba(11,20,55,0.6); }
        .welcome-modal.hidden { opacity: 0; pointer-events: none; }
        .welcome-content { background: var(--surface); padding: 40px 30px; border-radius: 30px; text-align: center; max-width: 90%; width: 380px; box-shadow: var(--shadow); border: 1px solid var(--border); animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.8) translateY(20px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
        .heart-icon { font-size: 4.5rem; color: var(--primary); animation: heartbeat 1.5s infinite; text-shadow: 0 0 20px rgba(255,75,114,0.4); margin-bottom: 15px;}
        @keyframes heartbeat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
        .welcome-text { font-family: 'Caveat', cursive; font-size: 2rem; color: var(--text-main); margin-bottom: 30px; line-height: 1.2; }
        .btn-enter { background: var(--gradient); color: white; border: none; padding: 15px 30px; border-radius: 50px; font-size: 1.1rem; font-weight: 600; cursor: pointer; box-shadow: var(--shadow); width: 100%; transition: transform 0.2s; }
        .btn-enter:active { transform: scale(0.95); }

        /* --- SIDEBAR --- */
        .sidebar { width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 20; }
        .sidebar-header { padding: 20px; background: var(--gradient); color: white; display: flex; justify-content: space-between; align-items: center; }
        .brand { font-size: 1.3rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .theme-toggle, .menu-toggle { background: transparent; border: none; color: white; font-size: 1.5rem; cursor: pointer; }
        .btn-new { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 12px; width: calc(100% - 30px); margin: 15px auto; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 10px rgba(255, 75, 114, 0.2); }
        .note-list { flex: 1; overflow-y: auto; padding: 0 15px 15px 15px; }
        
        /* Ajuste crucial para móviles: Bloquear selección nativa para permitir Pulsación Larga */
        .note-item { 
            padding: 15px; margin-bottom: 10px; border-radius: 12px; cursor: pointer; 
            background: var(--bg-body); transition: var(--transition); border: 1px solid transparent; 
            position: relative;
            -webkit-user-select: none; /* Bloquea la lupa en iOS */
            user-select: none;
            -webkit-touch-callout: none; /* Bloquea el menú de safari */
        }
        .note-item.active { background: var(--surface); border-left: 4px solid var(--primary); border-color: var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .note-title-list { font-weight: 600; font-size: 0.95rem; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; justify-content: space-between; align-items: center; }
        .pinned-icon { color: var(--primary); font-size: 1.1rem; }

        /* --- MAIN AREA & TOOLBAR --- */
        .main-content { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        .toolbar { padding: 10px 15px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; z-index: 10; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        [data-theme="dark"] .toolbar { background: rgba(17,28,68,0.9); }
        .toolbar::-webkit-scrollbar { display: none; }
        .tool-group { display: flex; align-items: center; gap: 2px; background: var(--surface); padding: 4px 6px; border-radius: 8px; border: 1px solid var(--border); }
        .tool-btn { background: transparent; border: none; width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-main); font-size: 1.1rem; }
        .tool-select { border: none; background: transparent; color: var(--text-main); outline: none; padding: 2px; font-size: 0.85rem; font-weight: 500;}

        /* --- EDITOR & TEMAS DE NOTA --- */
        .editor-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; justify-content: center; transition: background 0.5s; }
        .editor-wrapper { width: 100%; max-width: 800px; padding: 30px; border-radius: 20px; box-shadow: var(--shadow); min-height: 100%; transition: all 0.5s; background: var(--surface); }
        .title-input { width: 100%; border: none; outline: none; font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 20px; background: transparent; line-height: 1.2;}
        .editor-area { min-height: 50vh; outline: none; font-size: 1.05rem; line-height: 1.6; color: var(--text-main); }
        .editor-area img { border-radius: 12px; transition: box-shadow 0.2s; cursor: pointer; max-width: 100%; height: auto; }
        .editor-area img:hover { box-shadow: 0 0 0 3px var(--primary); }
        .editor-area img.selected-img { box-shadow: 0 0 0 4px var(--primary); }

        /* Clases para Temas de Notas */
        .theme-sakura { background: linear-gradient(to bottom right, #ffe1e8, #ffb3c6) !important; color: #5c1a2d; }
        .theme-sakura .title-input { color: #5c1a2d; }
        .theme-papel { background: #fdf5e6 !important; color: #3d3122; background-image: repeating-linear-gradient(transparent, transparent 31px, #d8d0c1 31px, #d8d0c1 32px); }
        .theme-papel .title-input { color: #3d3122; }
        .theme-noche { background: linear-gradient(135deg, #1a1a2e, #16213e) !important; color: #e1e1e6; }
        .theme-noche .title-input { color: #ffffff; }
        .theme-amor { background: radial-gradient(circle, #fff0f3 0%, #ffccd5 100%) !important; color: #800f2f; }
        .theme-amor .title-input { color: #800f2f; }

        /* --- MENÚS FLOTANTES --- */
        .image-toolbar { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); padding: 10px 15px; border-radius: 50px; display: flex; gap: 15px; align-items: center; transition: bottom 0.3s; z-index: 100; }
        .image-toolbar.show { bottom: 30px; }
        .img-btn { background: none; border: none; color: white; font-size: 1.4rem; cursor: pointer; }
        .img-slider { width: 100px; accent-color: var(--primary); }
        .theme-palette { display: none; position: absolute; top: 60px; right: 20px; background: var(--surface); padding: 10px; border-radius: 12px; box-shadow: var(--shadow); border: 1px solid var(--border); z-index: 50; gap: 8px;}
        .theme-palette.show { display: flex; }
        .color-dot { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .color-dot:hover { transform: scale(1.1); }

        /* --- BOTTOM SHEET (Menú de Pulsación Larga) --- */
        .sheet-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 999;
            opacity: 0; pointer-events: none; transition: opacity 0.3s; backdrop-filter: blur(3px);
        }
        .sheet-overlay.show { opacity: 1; pointer-events: auto; }
        
        .bottom-sheet {
            position: fixed; bottom: -100%; left: 0; width: 100%; background: var(--surface);
            border-radius: 25px 25px 0 0; z-index: 1000; transition: bottom 0.3s cubic-bezier(0.175, 0.885, 0.32, 1);
            padding: 20px 20px 40px 20px; box-shadow: 0 -10px 40px rgba(0,0,0,0.2);
        }
        .bottom-sheet.show { bottom: 0; }
        
        .sheet-handle { width: 40px; height: 5px; background: var(--border); border-radius: 5px; margin: 0 auto 20px auto; }
        .sheet-title { text-align: center; font-weight: 600; margin-bottom: 20px; color: var(--text-muted); font-size: 0.9rem; }
        
        .sheet-option {
            display: flex; align-items: center; gap: 15px; padding: 16px; border-radius: 15px;
            cursor: pointer; font-size: 1.1rem; font-weight: 500; transition: background 0.2s; color: var(--text-main);
        }
        .sheet-option:hover { background: var(--bg-body); }
        .sheet-option i { font-size: 1.4rem; color: var(--primary); }
        .sheet-option.danger { color: #ff4757; }
        .sheet-option.danger i { color: #ff4757; }

        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -100%; height: 100%; width: 280px; box-shadow: 10px 0 30px rgba(0,0,0,0.1); }
            .sidebar.open { left: 0; }
            .menu-toggle { display: block; color: var(--text-main); }
            .editor-wrapper { padding: 20px 15px; border-radius: 12px; }
            .title-input { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

    <!-- Modal de Bienvenida -->
    <div id="welcomeModal" class="welcome-modal">
        <div class="welcome-content">
            <i class='bx bxs-heart heart-icon'></i>
            <div class="welcome-text" id="welcomeText">Cargando amor...</div>
            <button class="btn-enter" onclick="closeWelcome()">Abrazar mis notas ✨</button>
        </div>
    </div>

    <!-- Menú Bottom Sheet (Pulsación Larga) -->
    <div class="sheet-overlay" id="sheetOverlay" onclick="closeContextMenu()"></div>
    <div class="bottom-sheet" id="bottomSheet">
        <div class="sheet-handle"></div>
        <div class="sheet-title" id="sheetTitle">Opciones de la Nota</div>
        
        <div class="sheet-option" onclick="actionPinNote()">
            <i class='bx bx-pin' id="sheetPinIcon"></i> <span id="sheetPinText">Fijar arriba</span>
        </div>
        <div class="sheet-option" onclick="actionDuplicateNote()">
            <i class='bx bx-copy'></i> Duplicar nota
        </div>
        <div class="sheet-option danger" onclick="actionDeleteNote()">
            <i class='bx bx-trash'></i> Eliminar nota
        </div>
    </div>

    <!-- Panel Lateral -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="brand"><i class='bx bxs-heart-circle'></i> Nova</div>
            <button class="theme-toggle" onclick="toggleGlobalTheme()"><i class='bx bx-moon' id="themeIcon"></i></button>
            <button class="menu-toggle" onclick="toggleSidebar()" style="display: none; color: white;" id="closeSidebarBtn"><i class='bx bx-x'></i></button>
        </div>
        <button class="btn-new" onclick="createNewNote()"><i class='bx bx-plus'></i> Escribir algo nuevo</button>
        <div class="note-list" id="noteList"></div>
    </aside>

    <!-- Contenido Principal -->
    <main class="main-content">
        <header class="toolbar">
            <button class="menu-toggle" onclick="toggleSidebar()"><i class='bx bx-menu'></i></button>
            <div class="tool-group">
                <select class="tool-select" onchange="formatDoc('fontName', this.value)">
                    <option value="Poppins">Normal</option>
                    <option value="'Caveat', cursive">Marcador Fino</option>
                    <option value="Georgia">Elegante</option>
                </select>
                <select class="tool-select" onchange="formatDoc('formatBlock', this.value)">
                    <option value="P">Texto</option>
                    <option value="H1">Título</option>
                    <option value="H2">Subtítulo</option>
                </select>
            </div>
            <div class="tool-group">
                <button class="tool-btn" onclick="formatDoc('bold')"><i class='bx bx-bold'></i></button>
                <button class="tool-btn" onclick="formatDoc('italic')"><i class='bx bx-italic'></i></button>
            </div>
            <div class="tool-group">
                <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="insertImage(event)">
                <button class="tool-btn" onclick="document.getElementById('imageInput').click()"><i class='bx bx-image-add'></i></button>
            </div>
            <div class="tool-group" style="margin-left: auto;">
                <button class="tool-btn" onclick="toggleThemePalette()" title="Fondo de la nota"><i class='bx bx-palette'></i></button>
            </div>
        </header>

        <div class="theme-palette" id="themePalette">
            <div class="color-dot" style="background: var(--surface); border: 1px solid #ccc;" onclick="setNoteTheme('default')"></div>
            <div class="color-dot" style="background: #ffb3c6;" onclick="setNoteTheme('theme-sakura')"></div>
            <div class="color-dot" style="background: #fdf5e6;" onclick="setNoteTheme('theme-papel')"></div>
            <div class="color-dot" style="background: #ffccd5;" onclick="setNoteTheme('theme-amor')"></div>
            <div class="color-dot" style="background: #1a1a2e;" onclick="setNoteTheme('theme-noche')"></div>
        </div>

        <div class="editor-container" onclick="focusEditor(event)">
            <div class="editor-wrapper" id="editorWrapper">
                <input type="text" class="title-input" id="noteTitle" placeholder="Título..." oninput="triggerSave()">
                <div class="editor-area" id="noteEditor" contenteditable="true" placeholder="Escribe aquí, mi amor..." oninput="triggerSave()"></div>
            </div>
        </div>

        <div class="image-toolbar" id="imageToolbar">
            <input type="range" class="img-slider" id="imgSizeSlider" min="20" max="100" value="50" oninput="resizeImage(this.value)">
            <button class="img-btn" onclick="alignImage('left')"><i class='bx bx-align-left'></i></button>
            <button class="img-btn" onclick="alignImage('center')"><i class='bx bx-align-middle'></i></button>
            <button class="img-btn" onclick="alignImage('right')"><i class='bx bx-align-right'></i></button>
        </div>
    </main>

    <script>
        const frasesAmor = [
            "Eres el resumen de todo lo hermoso que tiene la vida.", "Pensarte es mi pasatiempo favorito.", "Haces que mi mundo gire más bonito.",
            "Si me dieran a elegir, te elegiría a ti mil veces más.", "Tus ojos son mi paisaje favorito.", "Eres la casualidad más perfecta.",
            "Me encantas, de principio a fin.", "Contigo todo es mejor.", "Eres mi lugar seguro.", "Te amo más de lo que las palabras pueden explicar.",
            "Verte sonreír es mi mayor victoria.", "No hay momento en el día que no piense en ti.", "Tú eres mi 'para siempre'.",
            "Eres la mejor parte de mi vida.", "Haces que cada día valga la pena.", "Te elegiría en esta y en todas las vidas."
            // (La lista se mantiene, acortada aquí por estética del código visual, pero en la realidad usas la larga)
        ];

        let notes = JSON.parse(localStorage.getItem('nova_romance')) || [];
        let currentNoteId = null;
        let saveTimeout;
        let selectedImage = null; 
        
        // Variables para la pulsación larga
        let pressTimer;
        let isLongPressing = false;
        let contextNoteId = null;

        const titleEl = document.getElementById('noteTitle');
        const editorEl = document.getElementById('noteEditor');
        const listEl = document.getElementById('noteList');
        const wrapperEl = document.getElementById('editorWrapper');
        const imgToolbar = document.getElementById('imageToolbar');
        const sheet = document.getElementById('bottomSheet');
        const overlay = document.getElementById('sheetOverlay');

        function initApp() {
            const msg = frasesAmor[Math.floor(Math.random() * frasesAmor.length)];
            document.getElementById('welcomeText').innerText = msg;

            if(localStorage.getItem('nova_global_theme') === 'dark') toggleGlobalTheme(true);

            if (notes.length === 0) {
                notes.push({
                    id: Date.now().toString(),
                    title: 'Amor de mi vida...',
                    content: '<p style="font-family: \'Caveat\', cursive; font-size: 1.5rem;">Escribí esto pensando en ti.</p><p>Mantén presionado tu dedo sobre esta nota en el menú izquierdo para ver la magia.</p>',
                    theme: 'theme-amor',
                    pinned: true,
                    timestamp: Date.now()
                });
                saveData();
            }
            renderList();
            if(notes.length > 0) openNote(notes[0].id);
            checkMobileMenu();
        }

        function closeWelcome() { document.getElementById('welcomeModal').classList.add('hidden'); }

        function formatDoc(command, value = null) { document.execCommand(command, false, value); editorEl.focus(); triggerSave(); }

        /* --- Imágenes --- */
        function insertImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) { 
                    const imgHtml = `<img src="${e.target.result}" style="width: 80%; display: block; margin: 15px auto; clear: both;">`;
                    formatDoc('insertHTML', imgHtml);
                };
                reader.readAsDataURL(file);
            }
            event.target.value = ''; 
        }

        editorEl.addEventListener('click', (e) => {
            if (e.target.tagName === 'IMG') {
                if (selectedImage) selectedImage.classList.remove('selected-img');
                selectedImage = e.target;
                selectedImage.classList.add('selected-img');
                imgToolbar.classList.add('show');
                document.getElementById('imgSizeSlider').value = parseInt(selectedImage.style.width) || 50;
            } else {
                if (selectedImage) selectedImage.classList.remove('selected-img');
                selectedImage = null;
                imgToolbar.classList.remove('show');
            }
        });

        function resizeImage(val) { if (selectedImage) { selectedImage.style.width = val + '%'; triggerSave(); } }
        function alignImage(position) {
            if (!selectedImage) return;
            if (position === 'left') { selectedImage.style.display = 'inline'; selectedImage.style.float = 'left'; selectedImage.style.margin = '0 15px 10px 0'; } 
            else if (position === 'right') { selectedImage.style.display = 'inline'; selectedImage.style.float = 'right'; selectedImage.style.margin = '0 0 10px 15px'; } 
            else { selectedImage.style.display = 'block'; selectedImage.style.float = 'none'; selectedImage.style.margin = '15px auto'; }
            triggerSave();
        }

        /* --- Temas --- */
        function toggleThemePalette() { document.getElementById('themePalette').classList.toggle('show'); }
        function setNoteTheme(themeClass) {
            wrapperEl.className = 'editor-wrapper'; 
            if (themeClass !== 'default') wrapperEl.classList.add(themeClass);
            const noteIndex = notes.findIndex(n => n.id === currentNoteId);
            if (noteIndex !== -1) { notes[noteIndex].theme = themeClass; saveData(); }
            document.getElementById('themePalette').classList.remove('show');
        }

        /* --- Gestión de Notas y PULSACIÓN LARGA --- */
        function renderList() {
            listEl.innerHTML = '';
            
            // Ordenar: Primero las fijadas (pinned), luego por fecha
            let sortedNotes = notes.sort((a, b) => {
                if (a.pinned === b.pinned) return b.timestamp - a.timestamp;
                return a.pinned ? -1 : 1;
            });

            sortedNotes.forEach(note => {
                const div = document.createElement('div');
                div.className = `note-item ${note.id === currentNoteId ? 'active' : ''}`;
                
                // Lógica de Pulsación Larga (Touch & Mouse)
                const startPress = (e) => {
                    isLongPressing = false;
                    pressTimer = setTimeout(() => {
                        isLongPressing = true;
                        if (navigator.vibrate) navigator.vibrate(50); // Vibración si el teléfono lo soporta
                        openContextMenu(note.id);
                    }, 500); // Medio segundo para activar
                };
                
                const cancelPress = () => { clearTimeout(pressTimer); };

                div.addEventListener('touchstart', startPress, {passive: true});
                div.addEventListener('touchend', cancelPress);
                div.addEventListener('touchmove', cancelPress);
                div.addEventListener('mousedown', startPress);
                div.addEventListener('mouseup', cancelPress);
                div.addEventListener('mouseleave', cancelPress);
                
                // Click normal (si no fue pulsación larga)
                div.addEventListener('click', (e) => {
                    cancelPress();
                    if (isLongPressing) {
                        e.preventDefault();
                        isLongPressing = false;
                        return;
                    }
                    openNote(note.id);
                });

                // Evitar el click derecho genérico del navegador
                div.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    openContextMenu(note.id);
                });

                const plainText = note.content.replace(/<[^>]+>/g, '') || '';
                const preview = plainText.substring(0, 35) + '...';
                
                // Icono de chincheta si está fijada
                const pinHtml = note.pinned ? `<i class='bx bxs-pin pinned-icon'></i>` : ``;

                div.innerHTML = `
                    <div class="note-title-list">
                        <span style="overflow: hidden; text-overflow: ellipsis;">${note.title || 'Nueva nota'}</span>
                        ${pinHtml}
                    </div>
                    <div style="font-size: 0.8rem; color: var(--text-muted);">${preview}</div>
                `;
                listEl.appendChild(div);
            });
        }

        /* --- Opciones del Bottom Sheet --- */
        function openContextMenu(id) {
            contextNoteId = id;
            const note = notes.find(n => n.id === id);
            
            // Actualizar textos del menú según el estado de la nota
            document.getElementById('sheetTitle').innerText = `Opciones: ${note.title || 'Nota sin título'}`;
            
            const pinIcon = document.getElementById('sheetPinIcon');
            const pinText = document.getElementById('sheetPinText');
            if (note.pinned) {
                pinIcon.className = 'bx bx-pin'; // Icono normal
                pinText.innerText = 'Desfijar nota';
            } else {
                pinIcon.className = 'bx bxs-pin'; // Icono relleno
                pinText.innerText = 'Fijar arriba';
            }

            sheet.classList.add('show');
            overlay.classList.add('show');
        }

        function closeContextMenu() {
            sheet.classList.remove('show');
            overlay.classList.remove('show');
            setTimeout(() => { contextNoteId = null; }, 300);
        }

        function actionPinNote() {
            const noteIndex = notes.findIndex(n => n.id === contextNoteId);
            if (noteIndex !== -1) {
                notes[noteIndex].pinned = !notes[noteIndex].pinned;
                saveData();
                renderList();
            }
            closeContextMenu();
        }

        function actionDuplicateNote() {
            const original = notes.find(n => n.id === contextNoteId);
            if (original) {
                const copy = JSON.parse(JSON.stringify(original)); // Clonar profundo
                copy.id = Date.now().toString();
                copy.title = `${original.title} (Copia)`;
                copy.timestamp = Date.now();
                copy.pinned = false; // Las copias no nacen fijadas
                notes.push(copy);
                saveData();
                renderList();
                openNote(copy.id);
            }
            closeContextMenu();
        }

        function actionDeleteNote() {
            if (confirm('¿Estás segura de eliminarla, amor?')) {
                notes = notes.filter(n => n.id !== contextNoteId);
                saveData();
                
                // Si eliminó la nota que tenía abierta, abrir otra
                if (currentNoteId === contextNoteId) {
                    if (notes.length > 0) openNote(notes[0].id);
                    else { currentNoteId = null; titleEl.value = ''; editorEl.innerHTML = ''; wrapperEl.className = 'editor-wrapper'; }
                }
                renderList();
            }
            closeContextMenu();
        }


        function openNote(id) {
            currentNoteId = id;
            const note = notes.find(n => n.id === id);
            if (note) {
                titleEl.value = note.title;
                editorEl.innerHTML = note.content;
                wrapperEl.className = 'editor-wrapper';
                if(note.theme && note.theme !== 'default') wrapperEl.classList.add(note.theme);
            }
            if (selectedImage) { selectedImage.classList.remove('selected-img'); selectedImage = null; imgToolbar.classList.remove('show'); }
            renderList();
            if (window.innerWidth <= 768) toggleSidebar(); 
        }

        function createNewNote() {
            const newNote = { id: Date.now().toString(), title: '', content: '', theme: 'default', pinned: false, timestamp: Date.now() };
            notes.push(newNote);
            currentNoteId = newNote.id;
            saveData();
            openNote(newNote.id);
            titleEl.focus();
        }

        function triggerSave() {
            if (!currentNoteId) return;
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                const noteIndex = notes.findIndex(n => n.id === currentNoteId);
                if (noteIndex !== -1) {
                    notes[noteIndex].title = titleEl.value;
                    notes[noteIndex].content = editorEl.innerHTML;
                    notes[noteIndex].timestamp = Date.now();
                    saveData();
                    renderList();
                }
            }, 500);
        }

        function saveData() { localStorage.setItem('nova_romance', JSON.stringify(notes)); }

        function toggleGlobalTheme(forceDark = false) {
            const body = document.body;
            const icon = document.getElementById('themeIcon');
            if (forceDark || body.getAttribute('data-theme') !== 'dark') {
                body.setAttribute('data-theme', 'dark'); icon.className = 'bx bx-sun';
                localStorage.setItem('nova_global_theme', 'dark');
            } else {
                body.removeAttribute('data-theme'); icon.className = 'bx bx-moon';
                localStorage.setItem('nova_global_theme', 'light');
            }
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); checkMobileMenu(); }
        function checkMobileMenu() {
            const closeBtn = document.getElementById('closeSidebarBtn');
            if(window.innerWidth <= 768) closeBtn.style.display = document.getElementById('sidebar').classList.contains('open') ? 'block' : 'none';
            else closeBtn.style.display = 'none';
        }
        function focusEditor(e) { if (e.target.id === 'editorWrapper' || e.target.id === 'noteEditor') editorEl.focus(); }

        window.addEventListener('resize', checkMobileMenu);
        initApp();
    </script>
</body>
</html>
