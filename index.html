<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nova Pro · Para ti 🖤</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,600&family=Caveat:wght@500;700&family=Playfair+Display:wght@400;700&family=Montserrat:wght@400;600&family=Roboto:wght@400;700&family=Lora:wght@400;700&family=Dancing+Script:wght@400;700&family=Pacifico&family=Indie+Flower&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <style>
        :root {
            --bg-body: #f4f7fe;
            --surface: #ffffff;
            --primary: #FF4B72;
            --text-main: #2b3674;
            --text-muted: #a3aed1;
            --border: #e2e8f0;
            --shadow: 0 12px 40px rgba(255, 75, 114, 0.08);
            --menu-bg: #111111;
            --menu-text: #ffffff;
            --bezier: cubic-bezier(0.25, 1, 0.5, 1);
        }

        [data-theme="dark"] {
            --bg-body: #070b19;
            --surface: #0e152e;
            --primary: #FF708F;
            --text-main: #f0f2f8;
            --text-muted: #7483a8;
            --border: #1a2342;
            --shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
            --menu-bg: #1e1e2e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-body); color: var(--text-main);
            display: flex; height: 100dvh; overflow: hidden;
            font-family: 'Poppins', sans-serif;
            transition: background-color 0.4s var(--bezier), color 0.4s var(--bezier);
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        /* UI Base & Modals */
        .welcome-modal {
            position: fixed; inset: 0; background: rgba(255,255,255,0.2);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            z-index: 9999; display: flex; align-items: center; justify-content: center;
            transition: opacity 0.5s var(--bezier);
        }
        [data-theme="dark"] .welcome-modal { background: rgba(0,0,0,0.4); }
        .welcome-modal.hidden { opacity: 0; pointer-events: none; }
        .welcome-content {
            background: var(--surface); padding: 45px 35px; border-radius: 35px;
            text-align: center; max-width: 90%; width: 380px; box-shadow: var(--shadow);
            border: 1px solid var(--border);
            animation: popIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.85) translateY(30px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .heart-icon { font-size: 5rem; color: #000; animation: heartbeat 1.8s infinite var(--bezier); filter: drop-shadow(0 10px 15px rgba(0,0,0,0.15)); margin-bottom: 20px; }
        [data-theme="dark"] .heart-icon { color: var(--primary); filter: drop-shadow(0 0 20px rgba(255,112,143,0.4)); }
        @keyframes heartbeat { 0%,100%{transform:scale(1);} 15%{transform:scale(1.15);} 30%{transform:scale(1);} 45%{transform:scale(1.15);} }
        .welcome-text { font-family: 'Caveat', cursive; font-size: 2.2rem; color: var(--text-main); margin-bottom: 30px; line-height: 1.1; }
        .btn-enter {
            background: var(--text-main); color: var(--surface); border: none; padding: 18px 35px;
            border-radius: 50px; font-size: 1.1rem; font-weight: 600; cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); width: 100%; transition: all 0.2s;
        }
        .btn-enter:active { transform: scale(0.96); box-shadow: 0 5px 10px rgba(0,0,0,0.1); }

        /* Sidebar */
        .sidebar {
            width: 320px; background: var(--surface); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; z-index: 20; transition: transform 0.4s var(--bezier);
        }
        .sidebar-header { padding: 25px 20px; background: transparent; color: var(--text-main); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .brand { font-size: 1.4rem; font-weight: 700; font-family: 'Playfair Display', serif; }
        .theme-toggle, .menu-toggle { background: none; border: none; color: var(--text-main); font-size: 1.6rem; cursor: pointer; padding: 5px; border-radius: 50%; transition: background 0.2s; }
        .theme-toggle:active, .menu-toggle:active { background: var(--border); }
        .btn-new {
            background: var(--primary); color: white; border: none; padding: 16px; border-radius: 16px;
            width: calc(100% - 40px); margin: 20px auto; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 1.05rem;
            box-shadow: 0 8px 20px rgba(255, 75, 114, 0.3); transition: transform 0.2s;
        }
        .btn-new:active { transform: scale(0.96); }
        .note-list { flex: 1; overflow-y: auto; padding: 0 20px 20px; }
        .note-item {
            padding: 18px; margin-bottom: 12px; border-radius: 16px; cursor: pointer;
            background: var(--bg-body); transition: all 0.3s var(--bezier); border: 1px solid transparent;
        }
        .note-item.active { background: var(--surface); border: 1px solid var(--primary); box-shadow: var(--shadow); transform: translateX(5px); }
        .note-item.creating { animation: insertAnim 0.5s var(--bezier) forwards; }
        @keyframes insertAnim { from{opacity:0;transform:translateY(-20px) scale(0.95);} to{opacity:1;transform:translateY(0) scale(1);} }
        .note-item.deleting { animation: deleteAnim 0.4s var(--bezier) forwards; }
        @keyframes deleteAnim { 0%{transform:scale(1);opacity:1;} 100%{transform:scale(0.8) translateX(100%);opacity:0;} }
        .note-title-list { font-weight: 600; font-size: 1rem; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
        .pinned-icon { color: var(--primary); font-size: 1.2rem; }
        
        .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 15; opacity: 0; pointer-events: none; transition: 0.4s var(--bezier); }
        .sidebar-overlay.show { opacity: 1; pointer-events: auto; }

        /* Main Content & Toolbar */
        .main-content { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        .toolbar {
            padding: 12px 15px; background: rgba(var(--surface-rgb), 0.85);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            display: flex; align-items: center; gap: 8px; z-index: 10;
            overflow-x: auto; white-space: nowrap; scrollbar-width: none; border-bottom: 1px solid var(--border);
        }
        .toolbar::-webkit-scrollbar { display: none; }
        .tool-group {
            display: flex; align-items: center; gap: 4px;
            background: var(--bg-body); padding: 6px 8px; border-radius: 12px; border: 1px solid var(--border);
        }
        .tool-btn {
            background: none; border: none; min-width: 38px; height: 38px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            color: var(--text-main); font-size: 1.2rem; transition: all 0.2s;
        }
        .tool-btn:active { transform: scale(0.9); background: var(--border); }
        .tool-select { border: none; background: transparent; color: var(--text-main); outline: none; padding: 0 8px; font-size: 0.95rem; cursor: pointer; font-family: inherit; font-weight: 500; height: 38px; }
        
        /* Editor Area */
        .editor-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; justify-content: center; scroll-behavior: smooth; }
        .editor-wrapper {
            width: 100%; max-width: 850px; padding: 40px; border-radius: 24px;
            box-shadow: var(--shadow); min-height: calc(100vh - 60px); height: fit-content;
            transition: background 0.5s, color 0.5s; background: var(--surface); position: relative;
        }
        .title-input {
            width: 100%; border: none; outline: none; font-size: 2.5rem; font-weight: 700;
            color: var(--text-main); margin-bottom: 25px; background: transparent;
            line-height: 1.2; padding: 0; font-family: 'Playfair Display', serif;
        }
        .title-input::placeholder { color: var(--text-muted); opacity: 0.6; }
        .editor-area {
            min-height: 50vh; outline: none; font-size: 1.1rem; line-height: 1.8;
            color: var(--text-main); padding-bottom: 150px;
            word-wrap: break-word; overflow-wrap: break-word; user-select: text;
        }
        .editor-area[placeholder]:empty:before { content: attr(placeholder); color: var(--text-muted); opacity: 0.6; pointer-events: none; }
        .editor-area img, .editor-area video { border-radius: 16px; cursor: pointer; max-width: 100%; height: auto; transition: box-shadow 0.2s; }
        .editor-area img.selected-img, .editor-area video.selected-img { box-shadow: 0 0 0 4px var(--primary); }
        .editor-area ul, .editor-area ol { margin-left: 25px; margin-bottom: 15px; }
        .editor-area li { margin-bottom: 8px; }

        /* Floating Menus */
        .floating-text-menu {
            position: absolute; display: none; background: var(--menu-bg); color: var(--menu-text);
            border-radius: 20px; padding: 6px 10px; box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            z-index: 1000; align-items: center; gap: 4px; transition: opacity 0.2s;
            backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1);
            white-space: nowrap; overflow-x: auto; max-width: 95vw;
        }
        .floating-text-menu::after {
            content: ''; position: absolute; top: -6px; left: 50%; transform: translateX(-50%);
            border-width: 0 6px 6px; border-style: solid; border-color: transparent transparent var(--menu-bg) transparent;
        }
        .ft-btn {
            background: none; border: none; color: white; width: 34px; height: 34px;
            border-radius: 10px; font-size: 1.1rem; cursor: pointer; display: flex;
            align-items: center; justify-content: center; transition: 0.2s; flex-shrink: 0;
        }
        .ft-btn:active { background: rgba(255,255,255,0.2); transform: scale(0.9); }
        .ft-divider { width: 1px; height: 20px; background: rgba(255,255,255,0.2); margin: 0 6px; flex-shrink: 0; }

        /* Bottom Sheet */
        .bottom-sheet { position: fixed; bottom: -100%; left: 0; width: 100%; background: var(--surface); border-radius: 30px 30px 0 0; z-index: 1000; transition: bottom 0.4s var(--bezier); padding: 25px 25px 45px; box-shadow: 0 -15px 40px rgba(0,0,0,0.15); }
        .bottom-sheet.show { bottom: 0; }
        .sheet-handle { width: 50px; height: 6px; background: var(--border); border-radius: 10px; margin: 0 auto 25px; }
        .sheet-title { text-align: center; font-weight: 600; margin-bottom: 25px; color: var(--text-muted); font-size: 1rem; }
        .sheet-option { display: flex; align-items: center; gap: 15px; padding: 18px; border-radius: 16px; cursor: pointer; font-size: 1.15rem; font-weight: 500; transition: background 0.2s; color: var(--text-main); }
        .sheet-option:active { background: var(--bg-body); transform: scale(0.98); }
        .sheet-option i { font-size: 1.5rem; color: var(--text-main); }
        .sheet-option.danger { color: #ff4757; }
        .sheet-option.danger i { color: #ff4757 !important; }

        /* Themes setup */
        .theme-sakura { background: linear-gradient(135deg, #fff0f3, #ffb3c6) !important; color: #5c1a2d; }
        .theme-papel { background: #fdf5e6 !important; color: #3d3122; background-image: repeating-linear-gradient(transparent, transparent 31px, rgba(216, 208, 193, 0.4) 31px, rgba(216, 208, 193, 0.4) 32px); }
        .theme-noche { background: linear-gradient(135deg, #1a1a2e, #16213e) !important; color: #e1e1e6; }
        .theme-sakura .title-input, .theme-papel .title-input, .theme-noche .title-input { color: inherit; }
        .theme-sakura .editor-area, .theme-papel .editor-area, .theme-noche .editor-area { color: inherit; }

        @media (max-width:768px) {
            .sidebar { position: fixed; left: -100%; height: 100%; width: 85%; max-width: 340px; box-shadow: 15px 0 40px rgba(0,0,0,0.15); }
            .sidebar.open { left: 0; transform: translateX(0); }
            .editor-wrapper { padding: 25px 20px; border-radius: 16px; }
            .title-input { font-size: 2rem; }
            .toolbar { padding: 8px 10px; }
            .tool-btn { min-width: 44px; height: 44px; } /* AAA Mobile Touch Target Rule */
        }
    </style>
</head>
<body>

<div id="welcomeModal" class="welcome-modal">
    <div class="welcome-content">
        <i class='bx bxs-heart heart-icon'></i>
        <div class="welcome-text">Hola, mi amor. 🖤</div>
        <p style="color:var(--text-muted);margin-bottom:25px;font-size:0.95rem;">Tienes una nueva carta esperándote...</p>
        <button class="btn-enter" onclick="closeWelcome()">Leer mi carta ✨</button>
    </div>
</div>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<div class="sidebar-overlay" id="sheetOverlay" style="z-index: 999;" onclick="closeContextMenu()"></div>

<div class="bottom-sheet" id="bottomSheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="sheetTitle">Opciones de la Nota</div>
    <div class="sheet-option" onclick="actionPinNote()"><i class='bx bx-pin' id="sheetPinIcon"></i> <span id="sheetPinText">Fijar arriba</span></div>
    <div class="sheet-option" onclick="actionDuplicateNote()"><i class='bx bx-copy'></i> Duplicar nota</div>
    <div class="sheet-option danger" onclick="actionDeleteNote()"><i class='bx bx-trash'></i> Eliminar nota</div>
</div>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div class="brand">Nova Notes</div>
        <div>
            <button class="theme-toggle" onclick="toggleGlobalTheme()"><i class='bx bx-moon' id="themeIcon"></i></button>
            <button class="menu-toggle" onclick="toggleSidebar()" style="display:none;" id="closeSidebarBtn"><i class='bx bx-x'></i></button>
        </div>
    </div>
    <button class="btn-new" onclick="createNewNote()"><i class='bx bx-plus'></i> Escribir nota</button>
    <div class="note-list" id="noteList"></div>
</aside>

<main class="main-content">
    <header class="toolbar">
        <button class="tool-btn" onclick="toggleSidebar()"><i class='bx bx-menu-alt-left'></i></button>
        <div class="ft-divider" style="background: var(--border);"></div>

        <div class="tool-group">
            <select class="tool-select" onmousedown="event.preventDefault(); saveSelection()" onchange="handleFontChange('fontName', this.value)">
                <option value="Poppins">Normal</option>
                <option value="Playfair Display, serif">Elegante</option>
                <option value="Caveat, cursive">Marcador</option>
                <option value="Dancing Script, cursive">Cursiva</option>
            </select>
        </div>

        <div class="tool-group">
            <button class="tool-btn" onmousedown="event.preventDefault(); saveSelection()" onclick="applyFormatting('bold')" title="Negrita"><i class='bx bx-bold'></i></button>
            <button class="tool-btn" onmousedown="event.preventDefault(); saveSelection()" onclick="applyFormatting('italic')" title="Cursiva"><i class='bx bx-italic'></i></button>
            <button class="tool-btn" onmousedown="event.preventDefault(); saveSelection()" onclick="applyFormatting('underline')" title="Subrayado"><i class='bx bx-underline'></i></button>
        </div>

        <div class="tool-group">
            <button class="tool-btn" onmousedown="event.preventDefault(); saveSelection()" onclick="applyFormatting('justifyLeft')"><i class='bx bx-align-left'></i></button>
            <button class="tool-btn" onmousedown="event.preventDefault(); saveSelection()" onclick="applyFormatting('justifyCenter')"><i class='bx bx-align-middle'></i></button>
            <button class="tool-btn" onmousedown="event.preventDefault(); saveSelection()" onclick="applyFormatting('justifyRight')"><i class='bx bx-align-right'></i></button>
        </div>

        <div class="tool-group">
            <button class="tool-btn" onmousedown="event.preventDefault(); saveSelection()" onclick="applyFormatting('insertUnorderedList')" title="Viñetas"><i class='bx bx-list-ul'></i></button>
            <button class="tool-btn" onmousedown="event.preventDefault(); saveSelection()" onclick="applyFormatting('insertOrderedList')" title="Números"><i class='bx bx-list-ol'></i></button>
        </div>

        <div class="tool-group" style="margin-left:auto; border: none; background: transparent;">
            <button class="tool-btn" onclick="cycleTheme()" title="Cambiar Fondo"><i class='bx bx-palette'></i></button>
        </div>
    </header>

    <div class="editor-container" id="editorContainer">
        <div class="editor-wrapper" id="editorWrapper">
            <input type="text" class="title-input" id="noteTitle" placeholder="Escribe un título..." oninput="triggerSave()">
            <div class="editor-area" id="noteEditor" contenteditable="true" placeholder="Empieza a escribir tu historia aquí..." oninput="triggerSave()"></div>

            <div class="floating-text-menu" id="floatingTextMenu">
                <button class="ft-btn" onmousedown="event.preventDefault(); restoreSelection();" onclick="safeExec(() => document.execCommand('copy'))"><i class='bx bx-copy'></i></button>
                <button class="ft-btn" onmousedown="event.preventDefault(); restoreSelection();" onclick="safeExec(() => document.execCommand('cut'))"><i class='bx bx-cut'></i></button>
                <div class="ft-divider"></div>
                <button class="ft-btn" onmousedown="event.preventDefault(); restoreSelection();" onclick="applyFormatting('bold')"><i class='bx bx-bold'></i></button>
                <button class="ft-btn" onmousedown="event.preventDefault(); restoreSelection();" onclick="applyFormatting('italic')"><i class='bx bx-italic'></i></button>
                <div class="ft-divider"></div>
                <button class="ft-btn" style="color:#FF4B72;" onmousedown="event.preventDefault(); restoreSelection();" onclick="applyFormatting('foreColor', '#FF4B72')"><i class='bx bxs-circle'></i></button>
                <button class="ft-btn" style="color:#2b3674;" onmousedown="event.preventDefault(); restoreSelection();" onclick="applyFormatting('foreColor', '#2b3674')"><i class='bx bxs-circle'></i></button>
                <button class="ft-btn" onmousedown="event.preventDefault(); restoreSelection();" onclick="applyFormatting('removeFormat')"><i class='bx bx-eraser'></i></button>
            </div>
        </div>
    </div>
</main>

<script>
    // ── Arquitectura de Datos Robusta ──
    const StorageKey = 'nova_pro_notes';
    function safeExec(fn) { try { fn(); } catch(e) { console.warn("Ejecución prevenida: ", e); } }
    function safeGet(key, def) { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch(e) { return def; } }
    function safeSet(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {} }

    let notes = safeGet(StorageKey, []);
    let currentNoteId = null;
    let saveTimeout;
    let savedRange = null;
    let contextNoteId = null;
    let lastFocusedEditable = 'editor';

    // ── Referencias DOM ──
    const titleEl = document.getElementById('noteTitle');
    const editorEl = document.getElementById('noteEditor');
    const listEl = document.getElementById('noteList');
    const wrapperEl = document.getElementById('editorWrapper');
    const floatMenu = document.getElementById('floatingTextMenu');
    const sheet = document.getElementById('bottomSheet');
    const overlaySheet = document.getElementById('sheetOverlay');
    const sidebar = document.getElementById('sidebar');

    // ── Gestión de Selección (Word-style Mobile Fix) ──
    titleEl.addEventListener('focus', () => lastFocusedEditable = 'title');
    editorEl.addEventListener('focus', () => lastFocusedEditable = 'editor');

    function saveSelection() {
        const sel = window.getSelection();
        if (sel.rangeCount > 0 && editorEl.contains(sel.anchorNode)) {
            savedRange = sel.getRangeAt(0).cloneRange();
        }
    }

    function restoreSelection() {
        if (savedRange) {
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(savedRange);
        }
    }

    function applyFormatting(command, value = null) {
        // Haptic feedback sutil (Premium feel)
        if (navigator.vibrate) navigator.vibrate(15); 
        
        if (lastFocusedEditable === 'title') {
            if (command === 'bold') titleEl.style.fontWeight = titleEl.style.fontWeight === '700' ? '400' : '700';
            else if (command === 'italic') titleEl.style.fontStyle = titleEl.style.fontStyle === 'italic' ? 'normal' : 'italic';
            else if (command === 'justifyLeft') titleEl.style.textAlign = 'left';
            else if (command === 'justifyCenter') titleEl.style.textAlign = 'center';
            else if (command === 'justifyRight') titleEl.style.textAlign = 'right';
            triggerSave();
            return;
        }

        restoreSelection();
        editorEl.focus();
        document.execCommand('styleWithCSS', false, true);
        document.execCommand(command, false, value);
        triggerSave();
    }

    function handleFontChange(type, value) {
        if (lastFocusedEditable === 'title') {
            titleEl.style.fontFamily = value;
            triggerSave();
            return;
        }
        applyFormatting('fontName', value);
    }

    // ── Interfaz Flotante Inteligente ──
    document.addEventListener('selectionchange', () => {
        const sel = window.getSelection();
        if (!sel.rangeCount || sel.isCollapsed) {
            floatMenu.style.display = 'none';
            savedRange = null;
            return;
        }
        
        if (editorEl.contains(sel.anchorNode)) {
            savedRange = sel.getRangeAt(0).cloneRange();
            const rect = savedRange.getBoundingClientRect();
            
            floatMenu.style.display = 'flex';
            
            // Cálculo seguro para no salirse de la pantalla
            let topPos = rect.top - floatMenu.offsetHeight - 15;
            if (topPos < 50) topPos = rect.bottom + 10; // Mostrar abajo si no hay espacio arriba
            
            let left = rect.left + (rect.width / 2) - (floatMenu.offsetWidth / 2);
            left = Math.max(10, Math.min(left, window.innerWidth - floatMenu.offsetWidth - 10));
            
            floatMenu.style.top = `${topPos}px`;
            floatMenu.style.left = `${left}px`;
        }
    });

    // ── Lógica de Notas ──
    function renderList() {
        listEl.innerHTML = '';
        const sorted = [...notes].sort((a,b) => (a.pinned === b.pinned ? b.timestamp - a.timestamp : a.pinned ? -1 : 1));
        
        sorted.forEach(note => {
            const div = document.createElement('div');
            div.className = `note-item ${note.id === currentNoteId ? 'active' : ''}`;
            div.id = `note-${note.id}`;
            
            // Long press robusto para móvil
            let timer;
            const startPress = () => { timer = setTimeout(() => { openContextMenu(note.id); if(navigator.vibrate)navigator.vibrate(30); }, 500); };
            const cancelPress = () => clearTimeout(timer);
            
            div.addEventListener('touchstart', startPress, {passive:true});
            div.addEventListener('touchend', cancelPress);
            div.addEventListener('touchmove', cancelPress);
            div.addEventListener('mousedown', startPress);
            div.addEventListener('mouseup', cancelPress);
            div.addEventListener('mouseleave', cancelPress);
            
            div.addEventListener('click', () => { cancelPress(); openNote(note.id); });
            div.addEventListener('contextmenu', e => { e.preventDefault(); openContextMenu(note.id); });
            
            const plain = note.content.replace(/<[^>]+>/g,'') || 'Sin contenido adicional...';
            div.innerHTML = `
                <div class="note-title-list">
                    <span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${note.title || 'Nueva nota'}</span>
                    ${note.pinned ? '<i class="bx bxs-pin pinned-icon"></i>' : ''}
                </div>
                <div style="font-size:0.85rem;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${plain}</div>
            `;
            listEl.appendChild(div);
        });
    }

    function openNote(id) {
        currentNoteId = id;
        const note = notes.find(n => n.id === id);
        if (note) {
            titleEl.value = note.title;
            editorEl.innerHTML = note.content;
            wrapperEl.className = `editor-wrapper ${note.theme || 'default'}`;
        }
        renderList();
        if (window.innerWidth <= 768 && sidebar.classList.contains('open')) toggleSidebar();
    }

    function createNewNote() {
        const nn = { id: Date.now().toString(), title: '', content: '', theme: 'default', pinned: false, timestamp: Date.now() };
        notes.unshift(nn); // Añadir al principio
        saveData();
        openNote(nn.id);
        titleEl.focus();
        
        // Animación de entrada
        setTimeout(() => { 
            const el = document.getElementById(`note-${nn.id}`); 
            if(el) el.classList.add('creating'); 
        }, 10);
    }

    function triggerSave() {
        if (!currentNoteId || currentNoteId === 'nota_magica_diaria') return;
        clearTimeout(saveTimeout);
        saveTimeout = setTimeout(() => {
            const idx = notes.findIndex(n => n.id === currentNoteId);
            if (idx !== -1) {
                notes[idx].title = titleEl.value;
                notes[idx].content = editorEl.innerHTML;
                notes[idx].timestamp = Date.now();
                saveData();
                renderList();
            }
        }, 600); // Debounce ligeramente mayor para rendimiento
    }

    function saveData() { safeSet(StorageKey, notes); }

    // ── Context Menu (Bottom Sheet) ──
    function openContextMenu(id) {
        contextNoteId = id;
        const note = notes.find(n => n.id === id);
        document.getElementById('sheetTitle').innerText = `Opciones de nota`;
        
        const icon = document.getElementById('sheetPinIcon');
        const txt = document.getElementById('sheetPinText');
        if (note.pinned) { icon.className = 'bx bx-pin'; txt.innerText = 'Desfijar nota'; }
        else { icon.className = 'bx bxs-pin'; txt.innerText = 'Fijar arriba'; }
        
        sheet.classList.add('show');
        overlaySheet.classList.add('show');
    }
    
    function closeContextMenu() { 
        sheet.classList.remove('show'); 
        overlaySheet.classList.remove('show'); 
        contextNoteId = null; 
    }
    
    function actionPinNote() {
        const idx = notes.findIndex(n => n.id === contextNoteId);
        if (idx !== -1) { notes[idx].pinned = !notes[idx].pinned; saveData(); renderList(); }
        closeContextMenu();
    }
    
    function actionDuplicateNote() {
        const orig = notes.find(n => n.id === contextNoteId);
        if (orig) {
            const copy = JSON.parse(JSON.stringify(orig));
            copy.id = Date.now().toString();
            copy.title = orig.title + ' (Copia)';
            copy.timestamp = Date.now();
            notes.unshift(copy);
            saveData(); renderList(); openNote(copy.id);
        }
        closeContextMenu();
    }
    
    function actionDeleteNote() {
        if (contextNoteId === 'nota_magica_diaria') { 
            alert('¡Esta nota especial no se puede borrar! 🖤'); 
            closeContextMenu(); 
            return; 
        }
        const idDel = contextNoteId; closeContextMenu();
        const el = document.getElementById(`note-${idDel}`);
        
        if (el) {
            el.classList.add('deleting');
            setTimeout(() => { executeDelete(idDel); }, 400); // Esperar animación
        } else {
            executeDelete(idDel);
        }
    }

    function executeDelete(id) {
        notes = notes.filter(n => n.id !== id);
        saveData();
        if (currentNoteId === id) openNote(notes[0]?.id || null);
        renderList();
    }

    // ── Temas y Diseño ──
    const themes = ['default', 'theme-sakura', 'theme-papel', 'theme-noche'];
    function cycleTheme() {
        if (!currentNoteId) return;
        const note = notes.find(n => n.id === currentNoteId);
        const currentIndex = themes.indexOf(note.theme || 'default');
        const nextTheme = themes[(currentIndex + 1) % themes.length];
        
        wrapperEl.className = `editor-wrapper ${nextTheme}`;
        note.theme = nextTheme;
        saveData();
    }

    function toggleGlobalTheme() {
        const body = document.body, icon = document.getElementById('themeIcon');
        if (body.getAttribute('data-theme') !== 'dark') {
            body.setAttribute('data-theme', 'dark'); 
            icon.className = 'bx bx-sun';
            safeSet('nova_global_theme', 'dark');
        } else {
            body.removeAttribute('data-theme'); 
            icon.className = 'bx bx-moon';
            safeSet('nova_global_theme', 'light');
        }
    }

    function toggleSidebar() {
        sidebar.classList.toggle('open');
        document.getElementById('sidebarOverlay').classList.toggle('show', sidebar.classList.contains('open'));
        
        const btn = document.getElementById('closeSidebarBtn');
        if (window.innerWidth <= 768) {
            btn.style.display = sidebar.classList.contains('open') ? 'block' : 'none';
        }
    }

    function closeWelcome() { document.getElementById('welcomeModal').classList.add('hidden'); }

    // ── Limpieza de Pegado (Paste Sanitize) ──
    editorEl.addEventListener('paste', (e) => {
        e.preventDefault();
        const text = (e.originalEvent || e).clipboardData.getData('text/plain');
        document.execCommand('insertText', false, text);
    });

    // ── Inicialización ──
    function init() {
        if (safeGet('nova_global_theme', 'light') === 'dark') toggleGlobalTheme();

        const cartaDiaria = "Hola, Gabriela preciosa. Escribo esto para recordarte lo especial que eres para mí...";
        const formatted = `<div style="font-family:Caveat,cursive;font-size:1.7rem;line-height:1.6;text-align:center;">${cartaDiaria}</div>`;

        let magicIdx = notes.findIndex(n => n.id === 'nota_magica_diaria');
        if (magicIdx === -1) {
            notes.unshift({ id: 'nota_magica_diaria', title: '💌 Para ti, hoy...', content: formatted, theme: 'theme-sakura', pinned: true, timestamp: Date.now() + 9999999 });
        }
        
        saveData();
        renderList();
        if(notes.length > 0) openNote(notes[0].id);
    }

    init();
</script>
</body>
</html>
