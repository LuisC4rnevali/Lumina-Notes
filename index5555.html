        const floatMenu = document.getElementById('floatingTextMenu');
        const emptyMenu = document.getElementById('emptySpaceMenu');
        const editorContainer = document.getElementById('editorContainer');
        const emojiPanel = document.getElementById('emojiPanel');
        const imgSizeSlider = document.getElementById('imgSizeSlider');
        const imgMarginHSlider = document.getElementById('imgMarginHSlider');
        const imgMarginVSlider = document.getElementById('imgMarginVSlider');
        const urlModal = document.getElementById('urlModal');
        const urlInput = document.getElementById('urlInput');
        const urlModalTitle = document.getElementById('urlModalTitle');
        const insertMenu = document.getElementById('floatingInsertMenu');

        const emojis = ['❤️', '😊', '🌟', '🎉', '🔥', '😢', '😂', '💕', '✨', '🥰', '😍', '💔', '👍', '🙏', '💪', '🤗', '🎂', '💋', '🌈', '🦋'];

        // --- OBTENER EDITOR ACTIVO (incluye diario) ---
        function getActiveEditor() {
            const active = document.activeElement;
            if (active && active.closest && active.closest('.diary-container')) {
                // Devuelve la página del diario con el foco
                return active.closest('.page');
            }
            // Si el editor normal tiene el foco o es el contenedor
            if (editorEl.contains(active) || active === editorEl) return editorEl;
            // Si el foco está en el título
            if (active === titleEl) return titleEl;
            // Por defecto, el editor normal
            return editorEl;
        }

        // --- INICIO ---
        function initApp() {
            try {
                if (safeGetStorage('nova_global_theme', 'light') === 'dark') toggleGlobalTheme(true);
                // Carta mágica diaria
                const randomLetter = cartasAmor[Math.floor(Math.random() * cartasAmor.length)];
                const formattedLetter = `<div style="font-family: Caveat, cursive; font-size: 1.65rem; line-height: 1.7; text-align: center; padding: 20px 10px;">${randomLetter}<br><br><span style="color: #000; font-size: 2.5rem; animation: heartbeat 1.5s infinite; display: inline-block;">🖤</span></div>`;
                let magicNoteIndex = notes.findIndex(n => n.id === 'nota_magica_diaria');
                if (magicNoteIndex === -1) {
                    notes.unshift({ id: 'nota_magica_diaria', title: '💌 Para ti, hoy...', content: formattedLetter, theme: 'theme-amor', pinned: true, diaryMode: false, timestamp: Date.now() + 9999999 });
                } else {
                    notes[magicNoteIndex].content = formattedLetter;
                    notes[magicNoteIndex].timestamp = Date.now() + 9999999;
                }
                saveData();
                renderList();
                openNote('nota_magica_diaria', false);
                checkMobileMenu();

                editorEl.addEventListener('paste', handlePaste);
                emojis.forEach(emoji => {
                    const btn = document.createElement('button');
                    btn.className = 'emoji-btn';
                    btn.textContent = emoji;
                    btn.addEventListener('click', () => { insertEmojiAtCursor(emoji); hideInsertMenu(); });
                    emojiPanel.appendChild(btn);
                });

                // Eventos para selección de medios (delegados)
                document.addEventListener('pointerdown', handlePointerDownGlobal);
                document.addEventListener('pointerup', handlePointerUpGlobal);
                document.addEventListener('pointerleave', handlePointerLeaveGlobal);
                editorContainer.addEventListener('scroll', () => { if (selectedMedia) updateMediaToolbarPosition(selectedMedia); });
                window.addEventListener('resize', () => { if (selectedMedia) updateMediaToolbarPosition(selectedMedia); });

                // Eventos de espacio vacío (delegados)
                document.addEventListener('pointerdown', handleEmptyPressStart, true);
                document.addEventListener('pointerup', handleEmptyPressEnd);
                document.addEventListener('pointermove', handleEmptyPressEnd);
                document.addEventListener('mouseleave', handleEmptyPressEnd);
            } catch (e) { console.error(e); document.getElementById('welcomeModal').classList.add('hidden'); }
        }

        function closeWelcome() { document.getElementById('welcomeModal').classList.add('hidden'); }

        // --- RESTAURAR SELECCIÓN ---
        function restoreSelection() {
            if (savedRange) {
                try {
                    const sel = window.getSelection();
                    sel.removeAllRanges();
                    sel.addRange(savedRange);
                } catch (e) {}
            }
        }

        // --- MANEJO DE MEDIA (DELEGADO) ---
        function handlePointerDownGlobal(e) {
            const target = e.target.closest('img, video');
            if (!target || (!editorEl.contains(target) && !target.closest('.diary-container'))) return;
            pointerDownTime = Date.now();
            pointerDownTarget = target;
            isMediaLongPress = false;
        }
        function handlePointerUpGlobal(e) {
            if (!pointerDownTarget) return;
            const duration = Date.now() - pointerDownTime;
            const target = pointerDownTarget;
            pointerDownTarget = null;
            pointerDownTime = 0;
            if (duration > 400) {
                e.preventDefault();
                isMediaLongPress = true;
                selectMediaElement(target);
                if (navigator.vibrate) navigator.vibrate(50);
            } else {
                isMediaLongPress = false;
                target.focus();
            }
        }
        function handlePointerLeaveGlobal(e) { pointerDownTarget = null; pointerDownTime = 0; }

        document.addEventListener('click', (e) => {
            const target = e.target.closest('img, video');
            if (target && (editorEl.contains(target) || target.closest('.diary-container'))) {
                if (!isMediaLongPress) selectMediaElement(target);
                isMediaLongPress = false;
                e.stopPropagation();
            } else {
                deselectMedia();
            }
        });

        // --- FORMATO DE DOCUMENTO ---
        function formatDoc(command, value = null) {
            const activeEditor = getActiveEditor();
            if (activeEditor === titleEl) {
                if (command === 'foreColor') titleEl.style.color = value;
                else if (command === 'hiliteColor') titleEl.style.backgroundColor = value;
                else if (command === 'fontName') titleEl.style.fontFamily = value;
                else if (command === 'fontSize') {
                    const sizes = {1: '1.2rem', 2: '1.5rem', 3: '2rem', 4: '2.4rem', 5: '3rem', 6: '3.8rem'};
                    titleEl.style.fontSize = sizes[parseInt(value)] || '2rem';
                }
                return;
            }
            // Editor normal o diario
            if (!activeEditor || !activeEditor.isContentEditable) return;
            activeEditor.focus();
            document.execCommand('styleWithCSS', true, null);
            if (command === 'fontName') document.execCommand('fontName', false, value);
            else if (command === 'bold' || command === 'italic' || command === 'underline' || command === 'strikeThrough') {
                const currentFont = document.queryCommandValue('fontName');
                document.execCommand(command, false, null);
                if (currentFont && currentFont !== 'Poppins') {
                    document.execCommand('fontName', false, currentFont);
                }
            } else {
                document.execCommand(command, false, value);
            }
            triggerSave();
        }

        function execFloating(command, value = null) {
            restoreSelection();
            try {
                const currentFont = document.queryCommandValue('fontName');
                if (['bold','italic','underline','strikeThrough'].includes(command)) {
                    document.execCommand(command, false, null);
                    if (currentFont && currentFont !== 'Poppins') {
                        document.execCommand('fontName', false, currentFont);
                    }
                } else if (command === 'fontName') {
                    document.execCommand('fontName', false, value);
                } else {
                    document.execCommand(command, false, value);
                }
                triggerSave();
                getActiveEditor().focus();
            } catch (e) {}
        }

        function changeLineSpacing(value) {
            const editor = getActiveEditor();
            if (!editor || !editor.isContentEditable) return;
            editor.focus();
            document.execCommand('styleWithCSS', true, null);
            // Usamos CSS para modificar el line-height del bloque actual
            const selection = window.getSelection();
            if (selection.rangeCount) {
                const range = selection.getRangeAt(0);
                const block = range.commonAncestorContainer.closest('p, div, li, h1, h2, h3, h4, h5, h6');
                if (block) {
                    block.style.lineHeight = value;
                } else {
                    document.execCommand('insertHTML', false, `<span style="line-height: ${value};">${range.toString()}</span>`);
                }
            }
            triggerSave();
        }

        // --- PASTE ---
        function handlePaste(e) {
            const items = (e.clipboardData || window.clipboardData).items;
            for (let i = 0; i < items.length; i++) {
                if (items[i].type.indexOf('image') !== -1) {
                    e.preventDefault();
                    const blob = items[i].getAsFile();
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        const img = document.createElement('img');
                        img.src = event.target.result;
                        img.style.width = '80%';
                        img.style.display = 'block';
                        img.style.margin = '15px auto';
                        const sel = window.getSelection();
                        if (sel.rangeCount) {
                            const range = sel.getRangeAt(0);
                            range.deleteContents();
                            range.insertNode(img);
                            range.setStartAfter(img);
                            range.collapse(true);
                            sel.removeAllRanges();
                            sel.addRange(range);
                        } else {
                            editorEl.appendChild(img);
                            focusEditorAtEnd();
                        }
                        triggerSave();
                        getActiveEditor().focus();
                    };
                    reader.readAsDataURL(blob);
                    break;
                }
            }
        }

        // --- INSERCIÓN HTML ---
        function insertHtmlAtCursor(html) {
            const activeEditor = getActiveEditor();
            if (!activeEditor || !activeEditor.isContentEditable) return;
            const sel = window.getSelection();
            if (sel.rangeCount) {
                const range = sel.getRangeAt(0);
                range.deleteContents();
                const fragment = range.createContextualFragment(html);
                range.insertNode(fragment);
                range.setStartAfter(fragment);
                range.collapse(true);
                sel.removeAllRanges();
                sel.addRange(range);
                activeEditor.focus();
                triggerSave();
            } else {
                activeEditor.focus();
                document.execCommand('insertHTML', false, html);
                triggerSave();
                focusEditorAtEnd();
            }
        }

        function focusEditorAtEnd() {
            const active = getActiveEditor();
            if (active && active.isContentEditable) {
                active.focus();
                const range = document.createRange();
                range.selectNodeContents(active);
                range.collapse(false);
                const sel = window.getSelection();
                sel.removeAllRanges();
                sel.addRange(range);
            }
        }

        // --- MEDIA ---
        function selectMediaElement(target) {
            if (selectedMedia && selectedMedia !== target) selectedMedia.classList.remove('selected-img');
            selectedMedia = target;
            selectedMedia.classList.add('selected-img');
            const currentWidth = parseInt(selectedMedia.style.width) || (target.tagName === 'VIDEO' ? 50 : 80);
            imgSizeSlider.value = currentWidth;
            const currentMarginH = parseInt(selectedMedia.style.marginLeft) || 15;
            imgMarginHSlider.value = currentMarginH;
            const currentMarginV = parseInt(selectedMedia.style.marginTop) || 10;
            imgMarginVSlider.value = currentMarginV;
            updateMediaToolbarPosition(target);
            imgToolbar.classList.add('show');
            floatMenu.style.display = 'none';
            emptyMenu.style.display = 'none';
        }
        function deselectMedia() {
            if (selectedMedia) { selectedMedia.classList.remove('selected-img'); selectedMedia = null; }
            imgToolbar.classList.remove('show');
        }
        function updateMediaToolbarPosition(mediaEl) {
            const rect = mediaEl.getBoundingClientRect();
            const toolbarW = imgToolbar.offsetWidth;
            const toolbarH = imgToolbar.offsetHeight;
            let top = rect.bottom + 12;
            let left = rect.left + rect.width / 2 - toolbarW / 2;
            if (top + toolbarH > window.innerHeight - 20) top = rect.top - toolbarH - 12;
            if (left < 10) left = 10;
            if (left + toolbarW > window.innerWidth - 10) left = window.innerWidth - toolbarW - 10;
            imgToolbar.style.top = top + 'px';
            imgToolbar.style.left = left + 'px';
        }
        function resizeMedia(val) {
            if (selectedMedia) { selectedMedia.style.width = val + '%'; updateMediaToolbarPosition(selectedMedia); triggerSave(); }
            deselectMedia();
            focusEditorAtEnd();
        }
        function changeMargin(type, val) {
            if (!selectedMedia) return;
            if (type === 'horizontal') { selectedMedia.style.marginLeft = val + 'px'; selectedMedia.style.marginRight = val + 'px'; }
            else { selectedMedia.style.marginTop = val + 'px'; selectedMedia.style.marginBottom = val + 'px'; }
            updateMediaToolbarPosition(selectedMedia);
            triggerSave();
            deselectMedia();
            focusEditorAtEnd();
        }
        function alignMedia(position) {
            if (!selectedMedia) return;
            const vMargin = imgMarginVSlider.value;
            const hMargin = imgMarginHSlider.value;
            if (position === 'left') { selectedMedia.style.display = 'inline'; selectedMedia.style.float = 'left'; selectedMedia.style.margin = vMargin + 'px ' + hMargin + 'px'; }
            else if (position === 'right') { selectedMedia.style.display = 'inline'; selectedMedia.style.float = 'right'; selectedMedia.style.margin = vMargin + 'px ' + hMargin + 'px'; }
            else { selectedMedia.style.display = 'block'; selectedMedia.style.float = 'none'; selectedMedia.style.margin = vMargin + 'px auto'; }
            updateMediaToolbarPosition(selectedMedia);
            triggerSave();
            deselectMedia();
            focusEditorAtEnd();
        }
        function copyMedia() {
            if (!selectedMedia) return;
            const clone = selectedMedia.cloneNode(true);
            const range = document.createRange();
            range.selectNode(clone);
            window.getSelection().removeAllRanges();
            window.getSelection().addRange(range);
            try { document.execCommand('copy'); } catch (e) {}
            window.getSelection().removeAllRanges();
            deselectMedia();
            focusEditorAtEnd();
        }
        function duplicateMedia() {
            if (!selectedMedia) return;
            const clone = selectedMedia.cloneNode(true);
            clone.classList.remove('selected-img');
            if (selectedMedia.nextSibling) editorEl.insertBefore(clone, selectedMedia.nextSibling);
            else editorEl.appendChild(clone);
            triggerSave();
            deselectMedia();
            placeCursorAfterElement(clone);
        }
        function deleteMedia() {
            if (!selectedMedia) return;
            const prevSibling = selectedMedia.previousSibling;
            selectedMedia.remove();
            triggerSave();
            deselectMedia();
            if (prevSibling && prevSibling.nodeType === 1 && (prevSibling.tagName === 'IMG' || prevSibling.tagName === 'VIDEO')) placeCursorAfterElement(prevSibling);
            else focusEditorAtEnd();
        }
        function insertMedia(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    let mediaHtml = '';
                    if (file.type.startsWith('video/')) mediaHtml = `<video src="${e.target.result}" controls style="width: 50%; display: block; margin: 15px auto;"></video>`;
                    else mediaHtml = `<img src="${e.target.result}" style="width: 80%; display: block; margin: 15px auto; clear: both;">`;
                    insertHtmlAtCursor(mediaHtml);
                };
                reader.readAsDataURL(file);
            }
            event.target.value = '';
        }
        function insertMediaFromMenu(event) { insertMedia(event); hideInsertMenu(); }
        function openUrlModal(type) {
            pendingMediaType = type;
            urlInput.value = '';
            urlModalTitle.textContent = type === 'image' ? 'Pega la URL del GIF/Sticker' : 'Pega la URL del video (YouTube, Vimeo o directo)';
            urlModal.style.display = 'flex';
            setTimeout(() => urlInput.focus(), 100);
        }
        function closeUrlModal() { urlModal.style.display = 'none'; pendingMediaType = null; }
        function confirmInsertUrl() {
            const url = urlInput.value.trim();
            if (!url) { alert('Por favor pega una URL válida.'); return; }
            closeUrlModal();
            insertMediaFromUrl(pendingMediaType, url);
        }
        function insertMediaFromUrl(type, url) {
            let mediaHtml = '';
            if (type === 'image') {
                mediaHtml = `<img src="${url}" style="width: 80%; display: block; margin: 15px auto; clear: both;" onerror="this.style.display='none'">`;
            } else if (type === 'video') {
                const ytMatch = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|v\/))([\w-]{11})/);
                const vimeoMatch = url.match(/vimeo\.com\/(\d+)/);
                if (ytMatch) mediaHtml = `<div style="position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; max-width: 100%;"><iframe src="https://www.youtube.com/embed/${ytMatch[1]}" frameborder="0" allowfullscreen style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;"></iframe></div>`;
                else if (vimeoMatch) mediaHtml = `<div style="position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; max-width: 100%;"><iframe src="https://player.vimeo.com/video/${vimeoMatch[1]}" frameborder="0" allowfullscreen style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;"></iframe></div>`;
                else mediaHtml = `<video src="${url}" controls style="width: 80%; display: block; margin: 15px auto;"></video>`;
            }
            insertHtmlAtCursor(mediaHtml);
        }
        function openUrlModalFromInsert(type) { hideInsertMenu(); openUrlModal(type); }

        // --- MENÚ DE SÍMBOLOS ---
        function toggleSymbolPicker() {
            const symbols = ['∞', '∑', 'π', '√', 'Δ', 'Ω', '→', '←', '↑', '↓', '↔', '↕', '•', '★', '✔', '✘', '♥', '♦', '♣', '♠', '©', '®', '™', '€', '£', '¥', '…', '—', '–', '‘', '’', '“', '”'];
            let html = '<div style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; color: white; padding: 20px; border-radius: 20px; z-index: 9999; max-width: 90vw; display: flex; flex-wrap: wrap; gap: 6px; justify-content: center;">';
            symbols.forEach(sym => {
                html += `<button style="background: #333; border: none; color: white; font-size: 1.4rem; width: 40px; height: 40px; border-radius: 8px; cursor: pointer;" onclick="insertSymbol('${sym}')">${sym}</button>`;
            });
            html += '<button style="margin-top: 10px; background: #555; border: none; color: white; padding: 8px 15px; border-radius: 10px; cursor: pointer;" onclick="this.parentElement.remove()">Cerrar</button></div>';
            document.body.insertAdjacentHTML('beforeend', html);
        }
        function insertSymbol(sym) {
            insertHtmlAtCursor(sym);
            const popup = document.querySelector('div[style*="position: fixed"][style*="z-index: 9999"]');
            if (popup) popup.remove();
        }

        // --- MENÚ FLOTANTE DE INSERCIÓN ---
        function showFloatingInsertMenu() {
            const sel = window.getSelection();
            if (!sel.rangeCount) return;
            const range = sel.getRangeAt(0);
            const rect = range.getBoundingClientRect();
            const containerRect = editorContainer.getBoundingClientRect();
            insertMenu.style.display = 'flex';
            insertMenu.style.left = (rect.left - containerRect.left + editorContainer.scrollLeft) + 'px';
            insertMenu.style.top = (rect.top - containerRect.top + editorContainer.scrollTop - insertMenu.offsetHeight - 5) + 'px';
            setTimeout(() => {
                const clickHandler = (e) => { if (!insertMenu.contains(e.target)) { insertMenu.style.display = 'none'; document.removeEventListener('click', clickHandler); } };
                document.addEventListener('click', clickHandler);
            }, 100);
        }
        function hideInsertMenu() { insertMenu.style.display = 'none'; }

        // --- BARRA DE ESPACIO VACÍO ---
        function handleEmptyPressStart(e) {
            if (e.pointerType !== 'touch' && e.pointerType !== 'mouse') return;
            const target = e.target.closest ? e.target.closest('[contenteditable="true"]') : null;
            if (!target || (!editorEl.contains(target) && !target.closest('.diary-container'))) return;
            isEmptyPress = false;
            clearTimeout(emptyPressTimer);
            emptyPressTimer = setTimeout(() => {
                isEmptyPress = true;
                showEmptyMenu(e);
                if (navigator.vibrate) navigator.vibrate(30);
            }, 500);
        }
        function handleEmptyPressEnd(e) { clearTimeout(emptyPressTimer); }
        function showEmptyMenu(e) {
            const containerRect = editorContainer.getBoundingClientRect();
            const x = e.clientX - containerRect.left + editorContainer.scrollLeft;
            const y = e.clientY - containerRect.top + editorContainer.scrollTop - 50;
            emptyMenu.style.display = 'flex';
            emptyMenu.style.left = (x - emptyMenu.offsetWidth / 2) + 'px';
            emptyMenu.style.top = y + 'px';
            setTimeout(() => {
                if (emptyMenu.style.display === 'flex') {
                    emptyMenu.style.display = 'none';
                }
            }, 5000);
        }
        function insertEmptySymbol(symbol) {
            insertHtmlAtCursor(symbol);
            emptyMenu.style.display = 'none';
        }

        // --- SELECCIÓN DE TEXTO -> BARRA FLOTANTE ---
        document.addEventListener('selectionchange', () => {
            const selection = window.getSelection();
            if (selectedMedia) { floatMenu.style.display = 'none'; savedRange = null; return; }
            if (selection.rangeCount > 0 && !selection.isCollapsed) {
                const activeEditor = getActiveEditor();
                if (!activeEditor || !activeEditor.isContentEditable) { floatMenu.style.display = 'none'; savedRange = null; return; }
                savedRange = selection.getRangeAt(0).cloneRange();
                const range = selection.getRangeAt(0);
                const rect = range.getBoundingClientRect();
                const containerRect = editorContainer.getBoundingClientRect();
                floatMenu.style.display = 'flex';
                let topPos = (rect.top - containerRect.top) + editorContainer.scrollTop - floatMenu.offsetHeight - 10;
                if (topPos < 0) topPos = (rect.bottom - containerRect.top) + editorContainer.scrollTop + 10;
                floatMenu.style.top = topPos + 'px';
                const centerX = (rect.left - containerRect.left) + (rect.width / 2);
                const menuWidth = floatMenu.offsetWidth;
                let left = centerX - menuWidth / 2;
                if (left < 0) left = 0;
                if (left + menuWidth > containerRect.width) left = containerRect.width - menuWidth;
                floatMenu.style.left = left + 'px';
            } else {
                floatMenu.style.display = 'none';
                savedRange = null;
            }
        });

        // --- LISTAS DE TAREAS ---
        function insertChecklist() {
            const id = Date.now();
            const html = `<div class="task-list-container" data-id="${id}">
                <ul class="task-list">
                    <li>
                        <input type="checkbox" id="task-${id}-1" onchange="triggerSave()">
                        <span class="task-text" contenteditable="true">Nueva tarea</span>
                        <button class="delete-task" onclick="deleteTask(this); triggerSave();">🗑️</button>
                    </li>
                    <li>
                        <input type="checkbox" id="task-${id}-2" onchange="triggerSave()">
                        <span class="task-text" contenteditable="true">Otra tarea</span>
                        <button class="delete-task" onclick="deleteTask(this); triggerSave();">🗑️</button>
                    </li>
                </ul>
                <div style="margin-top:5px;">
                    <button onclick="addTask('${id}')" style="background:transparent; border:1px solid var(--border); padding:2px 10px; border-radius:15px; cursor:pointer; font-size:0.8rem;">+ Añadir tarea</button>
                </div>
            </div>`;
            insertHtmlAtCursor(html);
            setTimeout(() => {
                const container = document.querySelector(`[data-id="${id}"]`);
                if (container) {
                    container.querySelectorAll('input[type="checkbox"]').forEach(cb => {
                        cb.addEventListener('change', function() {
                            const li = this.closest('li');
                            if (this.checked) li.classList.add('done');
                            else li.classList.remove('done');
                            triggerSave();
                        });
                    });
                }
            }, 100);
        }
        function addTask(containerId) {
            const container = document.querySelector(`[data-id="${containerId}"]`);
            if (!container) return;
            const ul = container.querySelector('.task-list');
            const newId = Date.now();
            const li = document.createElement('li');
            li.innerHTML = `
                <input type="checkbox" id="task-${containerId}-${newId}" onchange="triggerSave()">
                <span class="task-text" contenteditable="true">Nueva tarea</span>
                <button class="delete-task" onclick="deleteTask(this); triggerSave();">🗑️</button>
            `;
            ul.appendChild(li);
            li.querySelector('input[type="checkbox"]').addEventListener('change', function() {
                const li = this.closest('li');
                if (this.checked) li.classList.add('done');
                else li.classList.remove('done');
                triggerSave();
            });
        }
        function deleteTask(btn) {
            const li = btn.closest('li');
            li.style.transition = 'all 0.2s';
            li.style.transform = 'scale(0.9)';
            li.style.opacity = '0';
            setTimeout(() => { li.remove(); triggerSave(); }, 200);
        }

        // --- RECUADROS Y EFECTOS ---
        function toggleRecuadro(type) {
            restoreSelection();
            const sel = window.getSelection();
            if (!sel.rangeCount) return;
            const range = sel.getRangeAt(0);
            if (range.collapsed) return;
            let node = range.commonAncestorContainer;
            let found = false;
            let targetClass = '';
            let openChar = '', closeChar = '';
            switch(type) {
                case 'parentesis': targetClass = 'recuadro-parentesis'; openChar = '('; closeChar = ')'; break;
                case 'corchetes': targetClass = 'recuadro-corchetes'; openChar = '['; closeChar = ']'; break;
                case 'llaves': targetClass = 'recuadro-llaves'; openChar = '{'; closeChar = '}'; break;
                case 'comillas': targetClass = 'recuadro-comillas'; openChar = '"'; closeChar = '"'; break;
                case 'cuadrado': targetClass = 'recuadro-cuadrado'; openChar = '◻'; closeChar = '◻'; break;
                default: return;
            }
            if (node.nodeType === 3) node = node.parentNode;
            if (node.classList && node.classList.contains(targetClass)) {
                // Desactivar: eliminar el recuadro y dejar el texto
                const parent = node.parentNode;
                const content = node.innerHTML;
                const textNode = document.createTextNode(content);
                parent.replaceChild(textNode, node);
                const newRange = document.createRange();
                newRange.selectNodeContents(textNode);
                sel.removeAllRanges();
                sel.addRange(newRange);
                triggerSave();
                return;
            }
            // Activar: envolver el texto seleccionado en el recuadro
            const fragment = range.extractContents();
            const span = document.createElement('span');
            span.className = targetClass;
            if (type === 'comillas') {
                span.innerHTML = '"' + fragment.textContent + '"';
            } else if (type === 'cuadrado') {
                span.innerHTML = '◻' + fragment.textContent + '◻';
            } else {
                span.appendChild(fragment);
            }
            range.insertNode(span);
            const newRange = document.createRange();
            newRange.setStartAfter(span);
            newRange.collapse(true);
            sel.removeAllRanges();
            sel.addRange(newRange);
            triggerSave();
            getActiveEditor().focus();
        }

        function showEffectMenu() {
            floatMenu.style.display = 'none';
            const menu = document.createElement('div');
            menu.style.position = 'fixed';
            menu.style.top = '50%';
            menu.style.left = '50%';
            menu.style.transform = 'translate(-50%, -50%)';
            menu.style.background = '#111';
            menu.style.color = 'white';
            menu.style.padding = '20px';
            menu.style.borderRadius = '20px';
            menu.style.zIndex = '9999';
            menu.style.boxShadow = '0 20px 60px rgba(0,0,0,0.5)';
            menu.style.display = 'flex';
            menu.style.flexDirection = 'column';
            menu.style.gap = '10px';
            menu.style.minWidth = '280px';
            menu.style.maxWidth = '90vw';
            menu.innerHTML = `
                <div style="font-weight:600; text-align:center; margin-bottom:10px;">✨ Efectos para el texto seleccionado</div>
                <button style="width:100%; padding:10px; background:#333; color:white; border:none; border-radius:8px; cursor:pointer;" onclick="toggleEffect('anim-float')">🌊 Flotante</button>
                <button style="width:100%; padding:10px; background:#333; color:white; border:none; border-radius:8px; cursor:pointer;" onclick="toggleEffect('anim-heart')">❤️ Latido</button>
                <button style="width:100%; padding:10px; background:#333; color:white; border:none; border-radius:8px; cursor:pointer;" onclick="toggleEffect('anim-rainbow')">🌈 Arcoíris</button>
                <button style="width:100%; padding:10px; background:#333; color:white; border:none; border-radius:8px; cursor:pointer;" onclick="toggleEffect('anim-typewriter')">⌨️ Máquina</button>
                <button style="width:100%; padding:10px; background:#333; color:white; border:none; border-radius:8px; cursor:pointer;" onclick="toggleEffect('anim-shake')">🌪️ Temblor</button>
                <button style="width:100%; padding:10px; background:#333; color:white; border:none; border-radius:8px; cursor:pointer;" onclick="toggleEffect('anim-spin')">🌀 Giro</button>
                <button style="width:100%; padding:10px; background:#333; color:white; border:none; border-radius:8px; cursor:pointer;" onclick="toggleEffect('anim-fade-in')">✨ Aparición</button>
                <button style="width:100%; padding:10px; background:#333; color:white; border:none; border-radius:8px; cursor:pointer;" onclick="toggleEffect('anim-bounce')">🤸 Rebote</button>
                <button style="width:100%; padding:10px; background:#333; color:white; border:none; border-radius:8px; cursor:pointer;" onclick="toggleEffect('anim-pulse')">💓 Pulso</button>
                <button style="width:100%; padding:10px; background:#333; color:white; border:none; border-radius:8px; cursor:pointer;" onclick="toggleEffect('anim-glow')">🌟 Brillo</button>
                <button style="width:100%; padding:10px; background:#333; color:white; border:none; border-radius:8px; cursor:pointer;" onclick="toggleEffect('anim-wiggle')">🤪 Onda</button>
                <button style="width:100%; padding:10px; background:#555; color:white; border:none; border-radius:8px; cursor:pointer; margin-top:5px;" onclick="closeEffectMenu()">Cancelar</button>
            `;
            document.body.appendChild(menu);
        }
        function closeEffectMenu() {
            const menus = document.querySelectorAll('div[style*="z-index: 9999"]');
            menus.forEach(m => m.remove());
        }
        function toggleEffect(className) {
            closeEffectMenu();
            restoreSelection();
            const sel = window.getSelection();
            if (!sel.rangeCount) return;
            const range = sel.getRangeAt(0);
            let node = range.commonAncestorContainer;
            if (node.nodeType === 3) node = node.parentNode;
            if (node.classList && node.classList.contains(className)) {
                // Desactivar
                node.classList.remove(className);
                if (node.classList.length === 0 && node.tagName === 'SPAN') {
                    const parent = node.parentNode;
                    const content = node.innerHTML;
                    const textNode = document.createTextNode(content);
                    parent.replaceChild(textNode, node);
                }
                const newRange = document.createRange();
                newRange.selectNodeContents(node);
                sel.removeAllRanges();
                sel.addRange(newRange);
                triggerSave();
                getActiveEditor().focus();
                return;
            }
            // Activar
            let selectedText = range.toString().trim();
            if (!selectedText) {
                selectedText = prompt("No hay texto seleccionado. Escribe el texto que quieres animar:", "Tu texto aquí ✨");
                if (selectedText === null || selectedText.trim() === '') return;
                const html = `<span class="${className}">${selectedText}</span>`;
                insertHtmlAtCursor(html);
                return;
            }
            const fragment = range.extractContents();
            const span = document.createElement('span');
            span.className = className;
            span.appendChild(fragment);
            range.insertNode(span);
            const newRange = document.createRange();
            newRange.setStartAfter(span);
            newRange.collapse(true);
            sel.removeAllRanges();
            sel.addRange(newRange);
            triggerSave();
            getActiveEditor().focus();
        }

        // --- MODO DIARIO ---
        function toggleDiaryMode(diaryNote) {
            const wrapper = document.getElementById('editorWrapper');
            const title = document.getElementById('noteTitle');
            const editor = document.getElementById('noteEditor');
            if (diaryNote) {
                wrapper.classList.add('diary-mode');
                title.style.display = 'none';
                editor.style.display = 'none';
                let container = wrapper.querySelector('.diary-container');
                if (!container) {
                    container = document.createElement('div');
                    container.className = 'diary-container';
                    container.innerHTML = `
                        <div class="page-wrapper">
                            <div class="page-slider" id="pageSlider">
                                <div class="page" id="diaryPage0" contenteditable="true" spellcheck="false">
                                    📓 Mi Diario<br><br>
                                    <p>Hoy quiero recordar lo mucho que te amo, Gabi.</p>
                                    <div style="margin-top:20px;">
                                        <button onclick="insertGrid()" style="background:transparent; border:1px solid #b0a090; padding:4px 12px; border-radius:15px; cursor:pointer; font-family: 'Caveat', cursive;">📊 Insertar Cuadrícula</button>
                                    </div>
                                </div>
                            </div>
                            <div class="diary-nav">
                                <button onclick="changePage(-1)">◀ Anterior</button>
                                <button onclick="changePage(1)">Siguiente ▶</button>
                            </div>
                            <div class="diary-tools">
                                <button onclick="insertGrid()">📊 Cuadrícula</button>
                                <button onclick="addPage()">➕ Página</button>
                            </div>
                        </div>
                    `;
                    wrapper.appendChild(container);
                    const pages = container.querySelectorAll('.page');
                    pages.forEach(page => {
                        page.addEventListener('input', triggerSave);
                        page.addEventListener('blur', triggerSave);
                        page.addEventListener('keydown', function(e) {
                            if (e.key === 'Enter') {
                                document.execCommand('insertLineBreak');
                                e.preventDefault();
                            }
                        });
                    });
                }
                const note = notes.find(n => n.id === currentNoteId);
                if (note) {
                    try {
                        const pagesData = JSON.parse(note.content || '[]');
                        if (Array.isArray(pagesData) && pagesData.length > 0) {
                            const slider = document.getElementById('pageSlider');
                            if (slider) {
                                slider.innerHTML = '';
                                pagesData.forEach((text, idx) => {
                                    const div = document.createElement('div');
                                    div.className = 'page';
                                    div.id = `diaryPage${idx}`;
                                    div.contentEditable = true;
                                    div.spellcheck = false;
                                    div.innerHTML = text;
                                    slider.appendChild(div);
                                    div.addEventListener('keydown', function(e) {
                                        if (e.key === 'Enter') {
                                            document.execCommand('insertLineBreak');
                                            e.preventDefault();
                                        }
                                    });
                                });
                                currentPageIndex = 0;
                                slider.style.transform = 'translateX(0)';
                            }
                        }
                    } catch (e) {
                        const page0 = document.getElementById('diaryPage0');
                        if (page0 && note.content && note.content !== '[]') {
                            page0.innerHTML = note.content;
                        }
                    }
                }
                currentPageIndex = 0;
            } else {
                wrapper.classList.remove('diary-mode');
                title.style.display = '';
                editor.style.display = '';
                const container = wrapper.querySelector('.diary-container');
                if (container) container.remove();
            }
        }

        function changePage(direction) {
            const slider = document.getElementById('pageSlider');
            if (!slider) return;
            const totalPages = slider.children.length;
            const newIndex = currentPageIndex + direction;
            if (newIndex < 0 || newIndex >= totalPages) return;
            currentPageIndex = newIndex;
            slider.style.transform = `translateX(-${currentPageIndex * 100}%)`;
        }
        function addPage() {
            const slider = document.getElementById('pageSlider');
            if (!slider) return;
            const newId = slider.children.length;
            const div = document.createElement('div');
            div.className = 'page';
            div.id = `diaryPage${newId}`;
            div.contentEditable = true;
            div.spellcheck = false;
            div.innerHTML = '<br>';
            slider.appendChild(div);
            div.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    document.execCommand('insertLineBreak');
                    e.preventDefault();
                }
            });
            saveDiaryPages();
        }
        function saveDiaryPages() {
            const slider = document.getElementById('pageSlider');
            if (!slider) return;
            const pages = slider.querySelectorAll('.page');
            const data = Array.from(pages).map(page => page.innerHTML);
            const noteIndex = notes.findIndex(n => n.id === currentNoteId);
            if (noteIndex !== -1) {
                notes[noteIndex].content = JSON.stringify(data);
                saveData();
            }
        }
        function insertGrid() {
            const slider = document.getElementById('pageSlider');
            if (!slider) return;
            const currentPage = slider.children[currentPageIndex];
            if (!currentPage) return;
            const gridHtml = `
                <table class="diary-grid">
                    <tr><td></td><td></td><td></td><td></td><td></td></tr>
                    <tr><td></td><td></td><td></td><td></td><td></td></tr>
                    <tr><td></td><td></td><td></td><td></td><td></td></tr>
                    <tr><td></td><td></td><td></td><td></td><td></td></tr>
                    <tr><td></td><td></td><td></td><td></td><td></td></tr>
                </table>
            `;
            const sel = window.getSelection();
            if (currentPage.contains(sel.anchorNode)) {
                const range = sel.getRangeAt(0);
                range.deleteContents();
                const fragment = range.createContextualFragment(gridHtml);
                range.insertNode(fragment);
                range.setStartAfter(fragment);
                range.collapse(true);
                sel.removeAllRanges();
                sel.addRange(range);
            } else {
                currentPage.insertAdjacentHTML('beforeend', gridHtml);
                currentPage.scrollTop = currentPage.scrollHeight;
            }
            setTimeout(() => {
                currentPage.querySelectorAll('.diary-grid td').forEach(td => {
                    td.setAttribute('contenteditable', 'true');
                    td.style.cursor = 'text';
                });
            }, 50);
            saveDiaryPages();
        }

        // --- PESTAÑAS Y RENDER ---
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.sidebar-tab').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            document.getElementById('notes-actions').style.display = tab === 'notes' ? 'block' : 'none';
            document.getElementById('diaries-actions').style.display = tab === 'diaries' ? 'block' : 'none';
            document.getElementById('noteList-notes').classList.toggle('active', tab === 'notes');
            document.getElementById('noteList-diaries').classList.toggle('active', tab === 'diaries');
        }
        function renderList() {
            listNotes.innerHTML = '';
            listDiaries.innerHTML = '';
            let sortedNotes = notes.sort((a, b) => {
                if (a.pinned === b.pinned) return b.timestamp - a.timestamp;
                return a.pinned ? -1 : 1;
            });
            sortedNotes.forEach(note => {
                const div = document.createElement('div');
                div.className = `note-item ${note.id === currentNoteId ? 'active' : ''}`;
                div.id = `note-${note.id}`;
                const startPress = (e) => {
                    isLongPressing = false;
                    pressTimer = setTimeout(() => { isLongPressing = true; if (navigator.vibrate) navigator.vibrate(50); openContextMenu(note.id); }, 500);
                };
                const cancelPress = () => { clearTimeout(pressTimer); };
                div.addEventListener('touchstart', startPress, {passive: true});
                div.addEventListener('touchend', cancelPress);
                div.addEventListener('touchmove', cancelPress);
                div.addEventListener('mousedown', startPress);
                div.addEventListener('mouseup', cancelPress);
                div.addEventListener('mouseleave', cancelPress);
                div.addEventListener('click', (e) => {
                    cancelPress();
                    if (isLongPressing) { e.preventDefault(); isLongPressing = false; return; }
                    openNote(note.id);
                });
                div.addEventListener('contextmenu', (e) => { e.preventDefault(); openContextMenu(note.id); });
                const plainText = (note.content || '').replace(/<[^>]+>/g, '');
                const preview = plainText.substring(0, 35) + (plainText.length > 35 ? '...' : '');
                const pinHtml = note.pinned ? `<i class='bx bxs-pin pinned-icon'></i>` : ``;
                div.innerHTML = `<div class="note-title-list"><span style="overflow: hidden; text-overflow: ellipsis;">${note.title || 'Nueva nota'}</span>${pinHtml}</div><div style="font-size: 0.8rem; color: var(--text-muted);">${preview}</div>`;
                if (note.diaryMode) listDiaries.appendChild(div);
                else listNotes.appendChild(div);
            });
        }
        function openContextMenu(id) {
            contextNoteId = id;
            const note = notes.find(n => n.id === id);
            document.getElementById('sheetTitle').innerText = `Opciones: ${note.title || 'Nota sin título'}`;
            const pinIcon = document.getElementById('sheetPinIcon');
            const pinText = document.getElementById('sheetPinText');
            if (note.pinned) { pinIcon.className = 'bx bx-pin'; pinText.innerText = 'Desfijar nota'; }
            else { pinIcon.className = 'bx bxs-pin'; pinText.innerText = 'Fijar arriba'; }
            sheet.classList.add('show');
            overlaySheet.classList.add('show');
        }
        function closeContextMenu() { sheet.classList.remove('show'); overlaySheet.classList.remove('show'); setTimeout(() => { contextNoteId = null; }, 300); }
        function actionPinNote() { const idx = notes.findIndex(n => n.id === contextNoteId); if (idx !== -1) { notes[idx].pinned = !notes[idx].pinned; saveData(); renderList(); } closeContextMenu(); }
        function actionDuplicateNote() {
            const original = notes.find(n => n.id === contextNoteId);
            if (original) {
                const copy = JSON.parse(JSON.stringify(original));
                copy.id = Date.now().toString();
                copy.title = `${original.title} (Copia)`;
                copy.timestamp = Date.now();
                copy.pinned = false;
                notes.push(copy);
                saveData(); renderList(); openNote(copy.id);
            }
            closeContextMenu();
        }
        function actionDeleteNote() {
            if (contextNoteId === 'nota_magica_diaria') { alert("¡Esta es mi carta diaria para ti! No puedes borrarla, amor. 🖤"); closeContextMenu(); return; }
            if (confirm('¿Estás segura de eliminarla, amor?')) {
                const idToDelete = contextNoteId;
                closeContextMenu();
                notes = notes.filter(n => n.id !== idToDelete);
                saveData();
                if (currentNoteId === idToDelete) {
                    if (notes.length > 0) openNote(notes[0].id);
                    else { currentNoteId = null; titleEl.value = ''; editorEl.innerHTML = ''; wrapperEl.className = 'editor-wrapper'; }
                }
                renderList();
            } else { closeContextMenu(); }
        }
        function openNote(id, autoCloseMenu = true) {
            currentNoteId = id;
            const note = notes.find(n => n.id === id);
            if (note) {
                titleEl.value = note.title || '';
                if (note.diaryMode) {
                    toggleDiaryMode(true);
                } else {
                    toggleDiaryMode(false);
                    editorEl.innerHTML = note.content || '';
                }
                wrapperEl.className = 'editor-wrapper';
                if (note.theme && note.theme !== 'default') wrapperEl.classList.add(note.theme);
            }
            deselectMedia();
            renderList();
            if (autoCloseMenu && window.innerWidth <= 768 && sidebar.classList.contains('open')) toggleSidebar();
        }
        function createNewNote() {
            const newNote = { id: Date.now().toString(), title: '', content: '', theme: 'default', pinned: false, diaryMode: false, timestamp: Date.now() };
            notes.push(newNote);
            currentNoteId = newNote.id;
            saveData();
            openNote(newNote.id);
            titleEl.focus();
        }
        function createNewDiaryNote() {
            const newNote = { id: Date.now().toString(), title: '📓 Mi Diario', content: '[]', theme: 'default', pinned: false, diaryMode: true, timestamp: Date.now() };
            notes.push(newNote);
            currentNoteId = newNote.id;
            saveData();
            openNote(newNote.id);
        }
        function triggerSave() {
            if (!currentNoteId || currentNoteId === 'nota_magica_diaria') return;
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                const noteIndex = notes.findIndex(n => n.id === currentNoteId);
                if (noteIndex !== -1) {
                    const note = notes[noteIndex];
                    note.title = titleEl.value;
                    if (note.diaryMode) {
                        saveDiaryPages();
                    } else {
                        note.content = editorEl.innerHTML;
                    }
                    note.timestamp = Date.now();
                    saveData();
                    renderList();
                }
            }, 500);
        }
        function saveData() { safeSetStorage('nova_romance', notes); }

        function placeCursorAfterElement(element) {
            if (!element || !editorEl.contains(element)) return;
            const range = document.createRange();
            range.setStartAfter(element);
            range.collapse(true);
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
            getActiveEditor().focus();
        }

        function insertEmojiAtCursor(emoji) {
            const sel = window.getSelection();
            if (sel.rangeCount) {
                const range = sel.getRangeAt(0);
                range.deleteContents();
                const textNode = document.createTextNode(emoji);
                range.insertNode(textNode);
                range.setStartAfter(textNode);
                range.collapse(true);
                sel.removeAllRanges();
                sel.addRange(range);
            } else { getActiveEditor().focus(); document.execCommand('insertText', false, emoji); }
            triggerSave();
            getActiveEditor().focus();
        }

        // --- DROPDOWNS DE LA TOOLBAR ---
        function toggleDropdown(id) {
            const dropdown = document.getElementById(id);
            if (!dropdown) return;
            const isOpen = dropdown.classList.contains('show');
            document.querySelectorAll('.toolbar-dropdown').forEach(d => d.classList.remove('show'));
            if (!isOpen) dropdown.classList.add('show');
            if (!isOpen) {
                setTimeout(() => {
                    const handler = (e) => {
                        if (!dropdown.contains(e.target) && !e.target.closest('.toolbar-btn')) {
                            dropdown.classList.remove('show');
                            document.removeEventListener('click', handler);
                        }
                    };
                    document.addEventListener('click', handler);
                }, 10);
            }
        }

        function toggleThemePalette() { document.getElementById('themePalette').classList.toggle('show'); }
        function setNoteTheme(themeClass) {
            wrapperEl.className = 'editor-wrapper';
            if (themeClass !== 'default') wrapperEl.classList.add(themeClass);
            const idx = notes.findIndex(n => n.id === currentNoteId);
            if (idx !== -1) { notes[idx].theme = themeClass; saveData(); }
            document.getElementById('themePalette').classList.remove('show');
        }

        function toggleGlobalTheme(forceDark = false) {
            const body = document.body;
            const icon = document.getElementById('themeIcon');
            if (forceDark || body.getAttribute('data-theme') !== 'dark') {
                body.setAttribute('data-theme', 'dark'); icon.className = 'bx bx-sun';
                safeSetStorage('nova_global_theme', 'dark');
            } else {
                body.removeAttribute('data-theme'); icon.className = 'bx bx-moon';
                safeSetStorage('nova_global_theme', 'light');
            }
        }

        function toggleSidebar() {
            sidebar.classList.toggle('open');
            sidebarOverlay.classList.toggle('show', sidebar.classList.contains('open'));
            checkMobileMenu();
        }
        function checkMobileMenu() {
            const closeBtn = document.getElementById('closeSidebarBtn');
            if (window.innerWidth <= 768) {
                closeBtn.style.display = sidebar.classList.contains('open') ? 'block' : 'none';
                if (!sidebar.classList.contains('open')) sidebarOverlay.classList.remove('show');
            } else { closeBtn.style.display = 'none'; sidebarOverlay.classList.remove('show'); }
        }
        window.addEventListener('resize', checkMobileMenu);

        // --- INICIALIZACIÓN ---
        initApp();
    </script>
</body>
</html>
