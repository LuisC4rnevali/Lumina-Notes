<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nova Pro | Para Ti 🖤</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,600&family=Caveat:wght@500;700&family=Playfair+Display:wght@400;700&family=Montserrat:wght@400;600&family=Roboto:wght@400;700&family=Lora:wght@400;700&family=Dancing+Script:wght@400;700&family=Pacifico&family=Indie+Flower&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <style>
        /* --- CONFIGURACIÓN GENERAL --- */
        :root {
            --bg-body: #f4f7fe;
            --surface: #ffffff;
            --text-main: #2b3674;
            --text-muted: #a3aed1;
            --border: #e2e8f0;
            --sidebar-w: 300px;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        [data-theme="dark"] {
            --bg-body: #070b19;
            --surface: #0e152e;
            --text-main: #f0f2f8;
            --text-muted: #7483a8;
            --border: #1a2342;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg-body); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; transition: var(--transition); }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        /* --- WELCOME MODAL --- */
        .welcome-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(20px); z-index: 9999; display: flex; align-items: center; justify-content: center; transition: opacity 0.6s ease; }
        .welcome-modal.hidden { opacity: 0; pointer-events: none; }
        .welcome-content { background: var(--surface); padding: 40px 30px; border-radius: 30px; text-align: center; max-width: 90%; width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); animation: popIn 0.6s ease; border: 1px solid var(--border); }
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.9) translateY(20px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
        .heart-icon { font-size: 4.5rem; color: #ff4b72; animation: heartbeat 1.5s infinite; margin-bottom: 15px; }
        @keyframes heartbeat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
        .btn-enter { background: #111; color: white; border: none; padding: 15px 30px; border-radius: 50px; font-size: 1.1rem; font-weight: 600; cursor: pointer; width: 100%; transition: transform 0.2s; }
        .btn-enter:active { transform: scale(0.95); }

        /* --- SIDEBAR --- */
        .sidebar { width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 20; transition: transform 0.3s ease; }
        .sidebar-header { padding: 20px; background: #111; color: white; display: flex; justify-content: space-between; align-items: center; }
        .brand { font-size: 1.3rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .theme-toggle, .menu-toggle { background: transparent; border: none; color: white; font-size: 1.5rem; cursor: pointer; transition: transform 0.3s; }
        .theme-toggle:active { transform: rotate(45deg); }

        .sidebar-tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--bg-body); }
        .sidebar-tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; font-size: 0.85rem; font-weight: 500; transition: var(--transition); border-bottom: 2px solid transparent; color: var(--text-muted); }
        .sidebar-tab.active { border-bottom-color: #111; color: var(--text-main); background: var(--surface); }

        .btn-new { background: #111; color: white; border: none; padding: 12px; border-radius: 12px; width: calc(100% - 30px); margin: 15px auto; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: transform 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .btn-new:active { transform: scale(0.95); }

        .note-list { flex: 1; overflow-y: auto; padding: 0 15px 15px 15px; display: none; }
        .note-list.active { display: block; }
        .note-item { padding: 15px; margin-bottom: 10px; border-radius: 12px; cursor: pointer; background: var(--bg-body); transition: var(--transition); border: 1px solid transparent; position: relative; }
        .note-item.active { background: var(--surface); border-left: 4px solid #111; border-color: var(--border); box-shadow: var(--shadow); }
        .note-title-list { font-weight: 600; font-size: 0.95rem; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; justify-content: space-between; align-items: center; color: var(--text-main); }
        .pinned-icon { color: #111; font-size: 1.1rem; }

        .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 15; opacity: 0; pointer-events: none; transition: opacity 0.3s; backdrop-filter: blur(2px); }
        .sidebar-overlay.show { opacity: 1; pointer-events: auto; }

        /* --- MAIN CONTENT --- */
        .main-content { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; }

        /* --- TOOLBAR REDISEÑADA --- */
        .toolbar { padding: 8px 12px; background: rgba(255,255,255,0.9); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; z-index: 10; position: relative; transition: var(--transition); }
        [data-theme="dark"] .toolbar { background: rgba(14, 21, 46, 0.9); }
        .toolbar-group { position: relative; }
        .toolbar-btn { background: transparent; border: none; padding: 6px 10px; border-radius: 8px; cursor: pointer; color: var(--text-main); display: flex; align-items: center; gap: 4px; font-size: 0.9rem; transition: background 0.2s; white-space: nowrap; }
        .toolbar-btn:hover, .toolbar-btn.active { background: var(--border); }
        .toolbar-dropdown { position: absolute; top: calc(100% + 5px); left: 0; background: var(--surface); border-radius: 12px; box-shadow: var(--shadow); border: 1px solid var(--border); padding: 12px; z-index: 50; display: none; flex-direction: column; gap: 10px; min-width: 220px; }
        .toolbar-dropdown.show { display: flex; }
        .dropdown-section { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
        .dropdown-section .tool-btn, .dropdown-section .ft-btn { width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-main); font-size: 1.1rem; background: transparent; border: none; transition: background 0.2s; }
        .dropdown-section .tool-btn:hover, .dropdown-section .ft-btn:hover { background: var(--border); }
        .dropdown-section select, .dropdown-section input[type="color"] { border: 1px solid var(--border); background: var(--surface); color: var(--text-main); padding: 2px 4px; border-radius: 6px; font-size: 0.85rem; }
        .color-picker-wrapper { position: relative; width: 28px; height: 28px; overflow: hidden; border-radius: 5px; cursor: pointer; border: 1px solid var(--border); }
        .color-picker-wrapper input[type="color"] { position: absolute; top: -10px; left: -10px; width: 50px; height: 50px; padding: 0; border: none; }

        /* --- EDITOR Y DIARIO --- */
        .editor-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; justify-content: center; transition: background 0.5s; position: relative; }
        .editor-wrapper { width: 100%; max-width: 800px; padding: 30px; border-radius: 20px; box-shadow: var(--shadow); min-height: calc(100vh - 40px); background: var(--surface); transition: var(--transition); position: relative; }
        .title-input { width: 100%; border: none; outline: none; font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 20px; background: transparent; line-height: 1.2; transition: color 0.3s, background-color 0.3s; padding: 5px 10px; border-radius: 8px; }
        .editor-area { min-height: 50vh; outline: none; font-size: 1rem; line-height: 1.6; color: var(--text-main); transition: color 0.3s; padding-bottom: 150px; word-wrap: break-word; overflow-wrap: break-word; word-break: break-word; hyphens: auto; }
        .editor-area img, .editor-area video { border-radius: 12px; cursor: pointer; max-width: 100%; height: auto; transition: all 0.2s; }
        .editor-area img.selected-img, .editor-area video.selected-img { box-shadow: 0 0 0 4px #111; }

        /* --- MODO DIARIO --- */
        .diary-mode .editor-wrapper {
            all: initial;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #fdf5e6 !important;
            box-shadow: none !important;
            padding: 0 !important;
            width: 100% !important;
            height: 100% !important;
            max-width: 100% !important;
        }
        .diary-mode .title-input { display: none !important; }
        .diary-mode .editor-area { display: none !important; }

        .diary-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 100%;
            background: #fdf5e6;
            border: 1px solid #d8d0c1;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-family: 'Caveat', cursive;
            color: #3d3122;
        }
        .diary-container .page-wrapper {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative;
        }
        .diary-container .page-slider {
            display: flex;
            flex-wrap: nowrap;
            height: 100%;
            width: 100%;
            transition: transform 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
            will-change: transform;
        }
        .diary-container .page {
            flex: 0 0 100%;
            height: 100%;
            padding: 40px 50px;
            overflow-y: auto;
            outline: none;
            word-wrap: break-word;
            overflow-wrap: break-word;
            word-break: break-word;
            hyphens: auto;
            font-family: 'Caveat', cursive;
            font-size: 1.2rem;
            line-height: 2.1rem;
            color: #3d3122;
            background: transparent;
            background-image: repeating-linear-gradient(transparent, transparent 31px, #d8d0c1 31px, #d8d0c1 32px);
            background-position: 0 40px;
        }
        .diary-container .page:focus { outline: none; }
        .diary-container .diary-nav {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 10;
        }
        .diary-container .diary-nav button {
            background: rgba(255,255,255,0.9);
            border: 1px solid #d8d0c1;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            font-size: 0.85rem;
            font-weight: 600;
            color: #3d3122;
        }
        .diary-container .diary-nav button:hover { background: #fff; transform: translateY(-2px); }
        .diary-container .diary-tools {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 6px;
            z-index: 10;
            flex-wrap: wrap;
        }
        .diary-container .diary-tools button {
            background: rgba(255,255,255,0.9);
            border: 1px solid #d8d0c1;
            padding: 4px 10px;
            border-radius: 15px;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.75rem;
            color: #3d3122;
        }
        .diary-container .diary-tools button:hover { background: #fff; }

        .diary-grid {
            border-collapse: collapse;
            width: 100%;
            margin: 15px 0;
            font-family: 'Caveat', cursive;
            font-size: 1rem;
            line-height: 1.8rem;
        }
        .diary-grid td, .diary-grid th {
            border: 1px solid #b0a090;
            padding: 6px;
            min-width: 30px;
            height: 28px;
            text-align: center;
            background: rgba(253, 245, 230, 0.3);
            word-wrap: break-word;
        }
        .diary-grid th { background: rgba(200, 190, 180, 0.2); font-weight: 700; }

        /* --- BARRA FLOTANTE --- */
        .floating-text-menu {
            position: absolute; display: none; background: #111; color: white; border-radius: 30px;
            padding: 4px 8px; box-shadow: 0 8px 30px rgba(0,0,0,0.3); z-index: 1000;
            align-items: center; gap: 3px; transition: opacity 0.2s ease, transform 0.2s ease;
            backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1);
            white-space: nowrap; overflow-x: auto; max-width: 90vw;
            transform-origin: top center;
            scrollbar-width: none;
        }
        .floating-text-menu::-webkit-scrollbar { display: none; }
        .floating-text-menu::after {
            content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%);
            border-width: 6px 6px 0; border-style: solid; border-color: #111 transparent transparent transparent;
        }
        .ft-btn { background: transparent; border: none; color: white; width: 24px; height: 24px; border-radius: 50%; font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.1s; flex-shrink: 0; }
        .ft-btn:active { transform: scale(0.85); background: rgba(255,255,255,0.2); }
        .ft-btn-wide { width: 32px; height: 32px; font-size: 1rem; }
        .ft-divider { width: 1px; height: 14px; background: rgba(255,255,255,0.2); margin: 0 2px; flex-shrink: 0; }
        .ft-select { background: none; color: white; border: none; font-size: 0.7rem; cursor: pointer; margin: 0 1px; flex-shrink: 0; }
        .ft-select option { background: #111; }
        .ft-color-wrapper { position: relative; width: 18px; height: 18px; overflow: hidden; border-radius: 50%; cursor: pointer; border: 1px solid rgba(255,255,255,0.3); flex-shrink: 0; }
        .ft-color-wrapper input[type="color"] { position: absolute; top: -6px; left: -6px; width: 30px; height: 30px; border: none; padding: 0; cursor: pointer; }

        /* --- BARRA DE ESPACIO VACÍO --- */
        .empty-space-menu {
            position: absolute; display: none; background: #111; color: white; border-radius: 30px;
            padding: 4px 8px; box-shadow: 0 8px 30px rgba(0,0,0,0.3); z-index: 1000;
            align-items: center; gap: 3px; transition: opacity 0.2s ease;
            backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1);
            white-space: nowrap; overflow-x: auto; max-width: 90vw;
            scrollbar-width: none;
        }
        .empty-space-menu::-webkit-scrollbar { display: none; }
        .empty-space-menu::after {
            content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%);
            border-width: 6px 6px 0; border-style: solid; border-color: #111 transparent transparent transparent;
        }
        .es-btn { background: transparent; border: none; color: white; width: 28px; height: 28px; border-radius: 50%; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.1s; flex-shrink: 0; }
        .es-btn:active { transform: scale(0.85); background: rgba(255,255,255,0.2); }
        .es-divider { width: 1px; height: 14px; background: rgba(255,255,255,0.2); margin: 0 2px; flex-shrink: 0; }

        /* --- MENÚ INSERTAR FLOTANTE --- */
        .floating-insert-menu {
            position: absolute; display: none; background: #111; color: white; border-radius: 20px;
            padding: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); z-index: 1001;
            flex-direction: column; gap: 8px; backdrop-filter: blur(12px);
        }
        .floating-insert-menu .emoji-row { display: flex; flex-wrap: wrap; gap: 4px; max-width: 260px; }
        .floating-insert-menu .emoji-btn { background: transparent; border: none; font-size: 1.2rem; cursor: pointer; padding: 4px; border-radius: 6px; }
        .floating-insert-menu .emoji-btn:hover { background: rgba(255,255,255,0.15); }

        /* --- IMÁGENES --- */
        .image-toolbar {
            position: fixed; opacity: 0; pointer-events: none;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            padding: 8px 12px; border-radius: 30px; display: flex; gap: 6px; align-items: center;
            transition: opacity 0.2s; z-index: 1001; white-space: nowrap;
            box-shadow: 0 8px 25px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.15);
            max-width: calc(100vw - 20px); overflow-x: auto;
        }
        .image-toolbar.show { opacity: 1; pointer-events: auto; }
        .img-btn { background: none; border: none; color: white; font-size: 1.2rem; cursor: pointer; transition: transform 0.1s; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .img-btn:active { transform: scale(0.85); background: rgba(255,255,255,0.15); }
        .img-slider { width: 50px; accent-color: #fff; flex-shrink: 0; }
        .img-slider-label { color: rgba(255,255,255,0.8); font-size: 0.6rem; font-weight: 500; flex-shrink: 0; }

        /* --- TEMAS --- */
        .theme-sakura { background: linear-gradient(to bottom right, #ffe1e8, #ffb3c6) !important; color: #5c1a2d; }
        .theme-papel { background: #fdf5e6 !important; color: #3d3122; background-image: repeating-linear-gradient(transparent, transparent 31px, #d8d0c1 31px, #d8d0c1 32px); }
        .theme-amor { background: radial-gradient(circle, #fcfcfc 0%, #e6e6e6 100%) !important; color: #111; }
        .theme-noche { background: linear-gradient(135deg, #1a1a2e, #16213e) !important; color: #e1e1e6; }
        .theme-fuego { background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('assets/themes/fuego.jpg'); background-size: cover; background-position: center; color: #fff !important; }
        .theme-tortugas { background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('assets/themes/tortugas.jpg'); background-size: cover; background-position: center; color: #fff !important; }
        .theme-neon { background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('assets/themes/perfil.jpg'); background-size: cover; background-position: center; color: #fff !important; }

        .theme-palette { display: none; position: absolute; top: 60px; right: 20px; background: var(--surface); padding: 10px; border-radius: 12px; box-shadow: var(--shadow); border: 1px solid var(--border); z-index: 50; gap: 6px; flex-wrap: wrap; }
        .theme-palette.show { display: flex; animation: insertAnim 0.3s forwards; }
        .color-dot { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.2s; }
        .color-dot:hover { transform: scale(1.1); }

        /* --- ANIMACIONES DE TEXTO --- */
        .anim-float { display: inline-block; animation: floatText 3s ease-in-out infinite; }
        @keyframes floatText { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .anim-heart { display: inline-block; animation: heartbeat 1.5s ease-in-out infinite; color: #ff4757; }
        .anim-rainbow { background: linear-gradient(45deg, #ff6b6b, #feca57, #48dbfb, #1dd1a1, #ff9ff3); background-size: 300% 300%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: rainbowMove 4s ease infinite; font-weight: bold; }
        @keyframes rainbowMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .anim-typewriter { overflow: hidden; white-space: nowrap; border-right: 2px solid var(--text-main); animation: typewriter 2s steps(30) 1s both, blink 0.8s step-end infinite; display: inline-block; }
        @keyframes typewriter { from { width: 0; } to { width: 100%; } }
        @keyframes blink { 0%, 100% { border-color: transparent; } 50% { border-color: var(--text-main); } }
        .anim-shake { display: inline-block; animation: shake 0.5s ease-in-out infinite; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
        .anim-spin { display: inline-block; animation: spin 2s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .anim-fade-in { display: inline-block; animation: fadeIn 2s ease-in forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .anim-bounce { display: inline-block; animation: bounce 1s ease infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-18px); } }
        .anim-pulse { display: inline-block; animation: pulse 1.5s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
        .anim-glow { display: inline-block; animation: glow 2s ease-in-out infinite; text-shadow: 0 0 5px rgba(255,255,255,0.5); }
        @keyframes glow { 0%, 100% { text-shadow: 0 0 5px rgba(255,255,255,0.5); } 50% { text-shadow: 0 0 20px rgba(255,255,255,0.8); } }
        .anim-wiggle { display: inline-block; animation: wiggle 1s ease-in-out infinite; }
        @keyframes wiggle { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-5deg); } 75% { transform: rotate(5deg); } }

        /* --- RECUADROS --- */
        .recuadro-parentesis {
            display: inline-block;
            border: 1px solid #aaa;
            border-radius: 12px;
            padding: 2px 8px;
            background: rgba(0,0,0,0.03);
            transition: var(--transition);
            font-family: inherit;
            font-size: inherit;
        }
        .recuadro-corchetes {
            display: inline-block;
            border: 1px solid #888;
            border-radius: 4px;
            padding: 2px 8px;
            background: rgba(0,0,0,0.02);
            transition: var(--transition);
            font-family: inherit;
            font-size: inherit;
        }
        .recuadro-llaves {
            display: inline-block;
            border: 1px solid #666;
            border-radius: 0;
            padding: 2px 8px;
            background: rgba(0,0,0,0.01);
            transition: var(--transition);
            font-family: inherit;
            font-size: inherit;
        }
        .recuadro-comillas {
            display: inline-block;
            border: none;
            padding: 2px 4px;
            color: #666;
            font-style: italic;
            transition: var(--transition);
            font-family: inherit;
            font-size: inherit;
        }
        .recuadro-cuadrado {
            display: inline-block;
            border: 2px solid #999;
            border-radius: 0;
            padding: 4px 8px;
            background: rgba(0,0,0,0.02);
            transition: var(--transition);
            font-family: inherit;
            font-size: inherit;
        }

        /* --- CHECKLIST --- */
        .task-list-container { margin: 15px 0; }
        .task-list { list-style: none; padding: 0; margin: 0; }
        .task-list li {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 0;
            border-bottom: 1px solid rgba(0,0,0,0.04);
            transition: var(--transition);
            font-size: 1rem;
        }
        .task-list li input[type="checkbox"] {
            appearance: none; -webkit-appearance: none;
            width: 18px; height: 18px;
            border: 2px solid var(--border);
            border-radius: 50%;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
            flex-shrink: 0;
            background: var(--surface);
        }
        .task-list li input[type="checkbox"]:checked {
            background: #111;
            border-color: #111;
        }
        .task-list li input[type="checkbox"]:checked::after {
            content: '✓';
            color: white;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 0.7rem;
            font-weight: bold;
        }
        .task-list li .task-text {
            flex: 1; padding: 2px 5px; border-radius: 4px; outline: none;
            cursor: text; word-break: break-word;
        }
        .task-list li .task-text:focus { background: rgba(0,0,0,0.03); }
        .task-list li.done .task-text {
            text-decoration: line-through;
            opacity: 0.5;
        }
        .task-list li .delete-task {
            background: transparent; border: none;
            color: #ff4757; cursor: pointer;
            font-size: 0.8rem; padding: 2px 4px;
            border-radius: 4px;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .task-list li .delete-task:hover { background: rgba(255,71,87,0.1); }

        /* --- OTROS --- */
        .sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 999; opacity: 0; pointer-events: none; transition: opacity 0.3s; backdrop-filter: blur(3px); }
        .sheet-overlay.show { opacity: 1; pointer-events: auto; }
        .bottom-sheet { position: fixed; bottom: -100%; left: 0; width: 100%; background: var(--surface); border-radius: 25px 25px 0 0; z-index: 1000; transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1); padding: 20px 20px 40px 20px; box-shadow: 0 -10px 40px rgba(0,0,0,0.2); }
        .bottom-sheet.show { bottom: 0; }
        .sheet-handle { width: 40px; height: 5px; background: var(--border); border-radius: 5px; margin: 0 auto 20px auto; }
        .sheet-option { display: flex; align-items: center; gap: 15px; padding: 16px; border-radius: 15px; cursor: pointer; font-size: 1rem; font-weight: 500; transition: background 0.2s, transform 0.1s; color: var(--text-main); }
        .sheet-option:hover { background: var(--bg-body); }

        .sheet-option i { font-size: 1.4rem; color: #111; }

        .sheet-title { text-align: center; font-weight: 600; margin-bottom: 20px; color: var(--text-muted); font-size: 0.9rem; }

        @media (max-width: 768px) {
